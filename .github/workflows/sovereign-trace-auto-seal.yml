name: Sovereign Trace Auto-Seal

on:
  issues:
    types: [labeled]

jobs:
  seal-and-ledger:
    if: github.event.label.name == 'pending-seal'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract issue data and determine template
        id: issue
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_CREATED: ${{ github.event.issue.created_at }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_user=$ISSUE_USER" >> $GITHUB_OUTPUT
          echo "issue_created=$ISSUE_CREATED" >> $GITHUB_OUTPUT

          # Mapping from first word of title (inside brackets) to template_type folder name
          # Complete list for all 31 templates (00 excluded)
          case "$ISSUE_TITLE" in
            "[STP-SUBMISSION]"*)      echo "template_type=ai-failure" ;;
            "[STP-RESEARCH]"*)        echo "template_type=research-priority" ;;
            "[STP-EVIDENCE]"*)        echo "template_type=evidence-chain" ;;
            "[STP-CREATIVE]"*)        echo "template_type=creative-priority" ;;
            "[STP-CLINICAL]"*)        echo "template_type=clinical-record" ;;
            "[STP-SCOPE]"*)           echo "template_type=scope-anchor" ;;
            "[STP-FORESIGHT]"*)       echo "template_type=foresight-seal" ;;
            "[WEBEATER]"*)            echo "template_type=webeater-link" ;;
            "[STP-PROMPT]"*)          echo "template_type=prompt-seal" ;;
            "[STP-MODEL]"*)           echo "template_type=model-weights-seal" ;;
            "[STP-DATASET]"*)         echo "template_type=dataset-declaration" ;;
            "[STP-AGREEMENT]"*)       echo "template_type=agreement-seal" ;;
            "[STP-RELEASE]"*)         echo "template_type=release-seal" ;;
            "[STP-DECISION]"*)        echo "template_type=decision-record" ;;
            "[STP-VULN]"*)            echo "template_type=vulnerability-timeline" ;;
            "[STP-OUTPUT]"*)          echo "template_type=ai-output-sample" ;;
            "[STP-BIAS]"*)            echo "template_type=bias-audit-record" ;;
            "[STP-REDTEAM]"*)         echo "template_type=red-team-engagement" ;;
            "[STP-MODELCARD]"*)       echo "template_type=model-card-seal" ;;
            "[STP-OVERSIGHT]"*)       echo "template_type=human-oversight-log" ;;
            "[STP-CODE]"*)            echo "template_type=code-snippet-seal" ;;
            "[STP-LOGBOOK]"*)         echo "template_type=research-logbook" ;;
            "[STP-IDENTITY]"*)        echo "template_type=identity-anchor" ;;
            "[STP-COMMIT]"*)          echo "template_type=temporal-commitment" ;;
            "[AUDIT-COMPLETE]"*)      echo "template_type=audit-completion" ;;
            "[AUDIT-REQUEST]"*)       echo "template_type=audit-request-tier1-5" ;;
            "[SNAPSHOT]"*)            echo "template_type=audit-request-snapshot" ;;
            "[AUDITOR-APPLICATION]"*) echo "template_type=auditor-application" ;;
            "[INTEGRITY-VIOLATION]"*) echo "template_type=integrity-violation" ;;
            "[NEAR-MISS]"*)           echo "template_type=near-miss" ;;
            * )                       echo "template_type=general-trace" ;;
          esac >> $GITHUB_OUTPUT

          # REF_SEAL validation — WEBEATER only
          if [[ "$ISSUE_TITLE" == "[WEBEATER]"* ]]; then
            REF_SEAL=$(echo "$ISSUE_BODY" | grep -oE '[a-f0-9]{64}' | head -1)
            if [ -z "$REF_SEAL" ]; then
              echo "ref_seal_valid=false" >> $GITHUB_OUTPUT
            else
              echo "ref_seal_valid=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "ref_seal_valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Reject invalid REF_SEAL
        if: steps.issue.outputs.ref_seal_valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ WEBEATER LINK REJECTED — Invalid Reference Seal',
                '',
                'The **Reference Seal** field must contain a valid 64-character SHA-256 hex string.',
                '',
                'This submission was not stamped. No ledger entry was created.',
                '',
                'Please close this issue and resubmit with a valid seal from a previously sealed trace.',
                '',
                '---',
                '*Sovereign Trace Protocol · FROZEN-4.0 · Sheldon K. Salmon*'
              ].join('\n')
            });

      - name: Halt on invalid REF_SEAL
        if: steps.issue.outputs.ref_seal_valid == 'false'
        run: exit 1

      - name: Run FROZEN-4.0 stamp and write hierarchical ledger
        id: stamp
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          TEMPLATE_TYPE: ${{ steps.issue.outputs.template_type }}
        run: |
          python3 - <<'PYEOF'
          import os, json, datetime, sys, re

          sys.path.insert(0, 'stamp')

          try:
              from sovereign_trace_stamp import stamp, to_dict
          except ImportError as e:
              print(f"FATAL: Could not import sovereign_trace_stamp — {e}")
              sys.exit(1)

          title   = os.environ['ISSUE_TITLE']
          body    = os.environ['ISSUE_BODY']
          number  = os.environ['ISSUE_NUMBER']
          user    = os.environ['ISSUE_USER']
          url     = os.environ['ISSUE_URL']
          ttype   = os.environ['TEMPLATE_TYPE']

          seal_content = f"STP-{ttype.upper()} | Issue #{number} | {user} | {title}\n\n{body}"

          ts = stamp(seal_content)
          ts_dict = to_dict(ts)

          # Parse Gregorian date for hierarchical folder structure
          greg_str = ts_dict["gregorian"]   # e.g., "June 4, 2026"
          date_obj = datetime.datetime.strptime(greg_str, "%B %d, %Y")
          year = date_obj.strftime("%Y")
          month = date_obj.strftime("%m")

          # Build ledger ID and hierarchical path
          date_str = datetime.datetime.utcnow().strftime('%Y-%m-%d')
          ledger_id = f"STP-{ttype.upper()}-{date_str}-{number.zfill(6)}"
          target_dir = os.path.join("ledger", ttype, year, month)
          os.makedirs(target_dir, exist_ok=True)
          ledger_path = os.path.join(target_dir, f"{ledger_id}.json")

          entry = {
              "ledger_id":      ledger_id,
              "template_type":  ttype,
              "issue_number":   int(number),
              "issue_url":      url,
              "submitter":      user,
              "title":          title,
              "seal": {
                  "sha256":         ts_dict["seal"],
                  "gregorian":      ts_dict["gregorian"],
                  "hebrew":         ts_dict["hebrew"],
                  "dreamspell":     ts_dict["dreamspell"],
                  "unix_utc":       ts_dict["unix_utc"],
                  "frozen_version": "FROZEN-4.0"
              },
              "status": "SEALED"
          }

          with open(ledger_path, 'w') as f:
              json.dump(entry, f, indent=2)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as gh_out:
              gh_out.write(f"ledger_id={ledger_id}\n")
              gh_out.write(f"sha256={ts_dict['seal']}\n")
              gh_out.write(f"gregorian={ts_dict['gregorian']}\n")
              gh_out.write(f"hebrew={ts_dict['hebrew']}\n")
              gh_out.write(f"dreamspell={ts_dict['dreamspell']}\n")
              gh_out.write(f"ledger_path={ledger_path}\n")

          print(f"Sealed: {ledger_id}")
          print(f"SHA-256: {ts_dict['seal']}")
          PYEOF

      - name: Commit ledger entry
        run: |
          git config user.name  "Sovereign Trace Protocol"
          git config user.email "aionsystem@outlook.com"
          git add ledger/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "SEAL: ${{ steps.stamp.outputs.ledger_id }}"
          git push

      - name: Post seal receipt to issue
        if: steps.stamp.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const ledger_id   = '${{ steps.stamp.outputs.ledger_id }}';
            const sha256      = '${{ steps.stamp.outputs.sha256 }}';
            const gregorian   = '${{ steps.stamp.outputs.gregorian }}';
            const hebrew      = '${{ steps.stamp.outputs.hebrew }}';
            const dreamspell  = '${{ steps.stamp.outputs.dreamspell }}';

            const body = [
              '## ✅ SOVEREIGN TRACE SEAL — COMPLETE',
              '',
              '```',
              `Ledger ID:    ${ledger_id}`,
              `SHA-256:      ${sha256}`,
              '```',
              '',
              '**Triple-Time Stamp (FROZEN-4.0):**',
              `📅 Gregorian:  ${gregorian}`,
              `🌑 Hebrew:     ${hebrew}`,
              `🌀 Dreamspell: ${dreamspell}`,
              '',
              '**Status:** `SEALED` — This record is permanent and immutable.',
              'It cannot be altered or deleted after this point.',
              '',
              'Your Ledger ID is your receipt. Keep it.',
              '',
              '---',
              '*Sovereign Trace Protocol · FROZEN-4.0 · Sheldon K. Salmon*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Update label — pending-seal to sealed
        if: steps.stamp.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              name: 'pending-seal'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              labels: ['sealed']
            });
