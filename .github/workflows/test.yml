name: Test Suite

on:
  push:
    branches: [ "MASTER", "main" ]
  pull_request:
    branches: [ "MASTER", "main" ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # ============================================================
      # Precondition (CAL FTT-1): declare what must be known
      # ============================================================
      - name: Verify Python version and packaging tools
        run: |
          python --version
          pip --version
          # Ensure build dependencies are available
          pip install --upgrade pip setuptools wheel

      # ============================================================
      # Install from pyproject.toml (no requirements.txt fallback)
      # ============================================================
      - name: Install package and test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio hypothesis
          pip install -e .

      # ============================================================
      # Verify CLI version matches expected (PDE vulnerability fix)
      # ============================================================
      - name: Verify STP CLI version
        run: |
          EXPECTED_VERSION=$(python -c "from sovereign_trace import __version__; print(__version__)")
          ACTUAL_VERSION=$(sovereign-trace --version)
          if [ "$EXPECTED_VERSION" != "$ACTUAL_VERSION" ]; then
            echo "❌ Version mismatch: expected $EXPECTED_VERSION, got $ACTUAL_VERSION"
            exit 1
          fi
          echo "✅ Version check passed: $ACTUAL_VERSION"

      # ============================================================
      # Run tests with coverage threshold (EAE ruled-out fix)
      # ============================================================
      - name: Run tests with coverage (minimum 80%)
        run: |
          pytest tests/ \
            --cov=sovereign_trace \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=80

      # ============================================================
      # Upload coverage (optional, does not block CI)
      # ============================================================
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

      # ============================================================
      # Self-test must pass (CAL FTT-2 – no silent failure)
      # ============================================================
      - name: Run STP self-test
        run: |
          sovereign-trace self-test
        # no continue-on-error – failure will break the build

      # ============================================================
      # Ledger verification (PDE Gaps fix)
      # ============================================================
      - name: Verify entire ledger
        run: |
          sovereign-trace verify --all
        continue-on-error: false

      # ============================================================
      # Additional check: no maxlength in issue templates (PDE Vuln)
      # ============================================================
      - name: Validate issue templates
        run: |
          if grep -r "maxlength" .github/ISSUE_TEMPLATE/; then
            echo "❌ maxlength attribute found – not allowed in GitHub issue forms"
            exit 1
          fi
          echo "✅ No maxlength violations"

      # ============================================================
      # Postcondition (CAL FTT-6): summary of what was achieved
      # ============================================================
      - name: Summary
        run: |
          echo "✅ Tests passed, coverage ≥80%, ledger verified, templates valid"