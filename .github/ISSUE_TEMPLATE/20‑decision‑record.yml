name: "Decision Record — Sovereign Trace Protocol"
description: "Seal an architectural, governance, or board decision at the moment it is made. Prevents revisionist history in organizations."
title: "[STP-DECISION] — [DECISION TOPIC] — [DATE]"
labels: ["decision-record", "pending-seal"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Decision Record – Sovereign Trace Protocol (FROZEN‑4.0)

        This form is for sealing a significant organizational, architectural, or governance decision at the moment it is made.

        When the decision is later questioned — why was this direction chosen, who approved it, what alternatives were considered — the sealed record is the immutable answer.

        **⚠️ CRITICAL WARNINGS – READ BEFORE PROCEEDING ⚠️**
        - The decision text, rationale, and dissent (if provided) are **public** and **permanent**.
        - Do not include trade secrets, pending litigation strategy, or personally identifiable information (PII) unless you accept permanent public exposure.
        - Your GitHub username is **publicly linked** to this seal.
        - **Do not edit this issue after the workflow seals it** – the hash will change.
        - **This record is retained permanently** in the STP ledger and GitHub issue history.
        - Supporting files are **not** cryptographically bound unless you provide their SHA‑256 hashes.
        - A correction creates a new entry; the original remains.

        **Fields marked with `*` are required.**

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for an anonymous seal."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: organization
    attributes:
      label: "Organization or Team *"
      description: "The organization or team making this decision."
      placeholder: "e.g., AionSystem, Engineering, Board of Directors"
    validations:
      required: true

  - type: input
    id: decision_topic
    attributes:
      label: "Decision Topic *"
      description: "A short title for this decision (e.g., 'Adopt Postgres over MongoDB', 'End support for v1 API')."
      placeholder: "e.g., Migration to microservices architecture"
    validations:
      required: true

  - type: input
    id: decision_id
    attributes:
      label: "Internal Decision ID (Optional)"
      description: "Your organization's internal reference number for tracking."
      placeholder: "e.g., DEC-2026-042, BOARD-12"
    validations:
      required: false

  - type: input
    id: decision_date
    attributes:
      label: "Date of Decision *"
      description: "The date the decision was finalized. Format: YYYY-MM-DD"
      placeholder: "2026-06-02"
    validations:
      required: true

  - type: textarea
    id: decision_text
    attributes:
      label: "The Decision *"
      description: "State the decision clearly. What was decided? What will happen as a result? Keep under 10,000 characters."
      placeholder: "We have decided to... The implementation will begin on..."
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "Rationale *"
      description: "Why was this decision made? What alternatives were considered and rejected? Keep under 10,000 characters."
      placeholder: "We chose this path because... Alternatives considered: X (rejected because...), Y (rejected because...)"
    validations:
      required: true

  - type: textarea
    id: dissent
    attributes:
      label: "Dissenting Views (Optional)"
      description: "If anyone disagreed with the decision, record their view here. An honest record includes dissent. Keep under 5,000 characters."
      placeholder: "Name (optional): reason for disagreement..."
    validations:
      required: false

  - type: textarea
    id: supporting_urls
    attributes:
      label: "Supporting Files URLs (Optional)"
      description: "One permanent URL per line (IPFS, GitHub gist, etc.). The stamp seals only the URLs, not the content. For cryptographic integrity, also provide SHA‑256 hashes below."
      placeholder: "https://ipfs.io/ipfs/Qm...\nhttps://gist.github.com/..."
    validations:
      required: false

  - type: textarea
    id: supporting_hashes
    attributes:
      label: "Supporting file SHA‑256 hashes (optional, recommended)"
      description: "One SHA‑256 hash per file, in the same order as the URLs. This cryptographically binds the seal to the exact file content."
      placeholder: "a3f9c12e7d... (64 hex chars)\nb4c8d3e2f1a..."
    validations:
      required: false

  - type: input
    id: correction_of
    attributes:
      label: "Correction / Resubmission of (optional)"
      description: "If this decision record corrects a previous decision seal, provide the previous ledger entry ID or SHA‑256 hash."
      placeholder: "a3f9c12e7d... or #42"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration *"
      options:
        - label: "I affirm this is an accurate record of the decision as made on the date stated."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing. A correction creates a new entry but does not delete the original."
          required: true
        - label: "I understand that my GitHub username is publicly linked to this seal, and the decision record is public."
          required: true
        - label: "If I provided supporting file URLs, I have also provided their SHA‑256 hashes to cryptographically bind the content."
          required: false
        - label: "I understand that this submission is permanent – a correction creates a new entry but does not delete the original."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **Data retention:** This record is retained permanently. You cannot delete it.

        **After submission**: The STP auto‑seal workflow will generate a triple‑time stamp and SHA‑256 hash. You will receive a comment with the seal and ledger entry ID. Do not edit the issue after sealing.

        **Contact:** `aionsystem@outlook.com` (for technical issues only). All seals are final.

        **Verification**: Every decision record can be independently verified using the STP pip package: `sovereign-trace verify --entry-id <ID> --hash <SHA-256>`.
