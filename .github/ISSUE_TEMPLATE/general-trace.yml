```yaml
name: "General Trace — Sovereign Trace Protocol"
description: "Seal any observation, decision, position, or record that does not fit another template. If you know what you need to seal but it does not belong in a specific category — this is your form."
title: "[STP-TRACE] — [CATEGORY] — [DATE]"
labels: ["general-trace", "pending-seal"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## General Trace Seal

        This form is for anything that needs to be sealed permanently and does not fit
        a more specific template.

        The stamp function does not care what it seals.
        A sealed moment is a sealed moment.

        **Write exactly what is true right now.**
        No narrative arc. No hedging beyond what is genuinely uncertain.
        Present-moment. Exact. Specific.

        The seal will bind to whatever you write here.
        Make it worth sealing.

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for an anonymous trace."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: category
    attributes:
      label: "Category"
      description: "What kind of trace is this? Choose the closest description."
      placeholder: "Personal observation / Decision record / NASA / Government record / Architectural decision / Other"
    validations:
      required: true

  - type: input
    id: trace_date
    attributes:
      label: "Date of the Moment Being Sealed"
      description: "The date this observation, decision, or record was made. Format: YYYY-MM-DD"
      placeholder: "2026-03-07"
    validations:
      required: true

  - type: textarea
    id: trace_entry
    attributes:
      label: "Your Trace Entry"
      description: "Write exactly what is true right now. Present-moment. Exact. No narrative arc. This is what the seal will bind to — make it specific enough to be unambiguous later."
      placeholder: "Write your trace entry here. Exact. Specific. Present-moment."
    validations:
      required: true

  - type: textarea
    id: why_this_matters
    attributes:
      label: "Why This Moment Deserves Sealing (Optional)"
      description: "Optional context. Why does this need to be permanently recorded? This field is for your own clarity — not required for the seal to be valid."
      placeholder: "Why does this moment matter enough to seal?"
    validations:
      required: false

  - type: textarea
    id: supporting_links
    attributes:
      label: "Supporting Files or Links (Optional)"
      description: "GitHub CDN URLs for any files attached to this issue. These URLs become part of the sealed record."
      placeholder: "Paste GitHub CDN URLs for any attached files."
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration"
      options:
        - label: "I affirm that this entry accurately represents my observation, position, or record at the time of sealing."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Completeness check — The Sovereign Trace Protocol office reviews for completeness.
        2. Sealing — Your submission is sealed with a FROZEN-2.0 triple-time cryptographic stamp.
        3. Ledger entry — Your submission enters the Sovereign Trace ledger with the seal timestamp and SHA-256 hash.
        4. Notification — You receive your ledger entry ID and SHA-256 hash.

        The seal is permanent. The seal is the resolution.

        Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem2026@gmail.com
```

