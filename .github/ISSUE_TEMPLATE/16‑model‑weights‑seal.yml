name: "Model Weights Seal — Sovereign Trace Protocol"
description: "Seal the hash of AI model weights before release or training. Proves the exact model version at a point in time."
title: "[STP-MODEL] — [MODEL NAME] — [DATE]"
labels: ["model-weights-seal", "pending-seal"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## Model Weights Seal

        This form is for sealing the cryptographic hash of AI model weights before release, before training begins, or at any point where the exact version of the model needs to be permanently recorded.

        This creates an independent, tamper‑evident record of the model artifact — separate from any repository, registry, or platform.

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for an anonymous seal."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: model_name
    attributes:
      label: "Model Name or Identifier"
      description: "The name, version, or identifier for this model (e.g., Internal‑LLM‑v3, ResNet‑50‑finetuned)."
      placeholder: "e.g., MyModel-7B-Instruct-v2"
    validations:
      required: true

  - type: input
    id: hash_algorithm
    attributes:
      label: "Hash Algorithm"
      description: "The algorithm used to generate the hash (e.g., SHA‑256, BLAKE2b)."
      placeholder: "SHA‑256"
    validations:
      required: true

  - type: textarea
    id: model_hash
    attributes:
      label: "Model Weights Hash"
      description: "The full hash value of the model weights file(s). Paste the exact hash string."
      placeholder: "e.g., a3f9c12e7d4b8f..."
    validations:
      required: true

  - type: input
    id: artifact_date
    attributes:
      label: "Date of the Model Artifact"
      description: "The date this version of the model was finalized. Format: YYYY-MM-DD"
      placeholder: "2026-06-02"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Model Description (Optional)"
      description: "Brief description of the model — architecture, training data, intended use."
      placeholder: "Describe the model's architecture, training scope, and intended use."
    validations:
      required: false

  - type: upload
    id: supporting_files
    attributes:
      label: "Supporting Files (Optional)"
      description: "Upload any related files — model card, training configuration, architecture diagram."
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration"
      options:
        - label: "I affirm the hash above is the exact cryptographic hash of the model weights as described."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Completeness check — Reviewed for completeness.
        2. Sealing — Sealed with a FROZEN‑4.0 triple‑time cryptographic stamp. Permanent.
        3. Ledger entry — Enters the Sovereign Trace ledger with timestamp and SHA‑256 hash.
        4. Notification — You receive your ledger entry ID and SHA‑256 hash.

        The seal is permanent. The seal is the resolution.

        Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem2026@gmail.com
