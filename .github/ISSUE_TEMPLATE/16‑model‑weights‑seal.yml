name: "Model Weights Seal — Sovereign Trace Protocol"
description: "Seal the hash of AI model weights before release or training. Proves the exact model version at a point in time."
title: "[STP-MODEL] — [MODEL NAME] — [DATE]"
labels: ["model-weights-seal", "pending-seal"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Model Weights Seal – Sovereign Trace Protocol (FROZEN‑4.0)

        This form is for sealing the cryptographic hash of AI model weights before release, before training begins, or at any point where the exact version of the model needs to be permanently recorded.

        This creates an independent, tamper‑evident record of the model artifact — separate from any repository, registry, or platform.

        **⚠️ CRITICAL WARNINGS – READ BEFORE PROCEEDING ⚠️**
        - The model hash you provide is **public** and **permanent**.
        - Your GitHub username is **publicly linked** to this seal.
        - **Do not edit this issue after the workflow seals it** – the hash will change.
        - **This record is retained permanently** in the STP ledger and GitHub issue history.
        - Supporting files are **not** cryptographically bound unless you provide their SHA‑256 hashes.
        - A correction creates a new entry; the original remains.

        **Fields marked with `*` are required.**

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for an anonymous seal."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: model_name
    attributes:
      label: "Model Name or Identifier *"
      description: "The name, version, or identifier for this model (e.g., Internal‑LLM‑v3, ResNet‑50‑finetuned)."
      placeholder: "e.g., MyModel-7B-Instruct-v2"
    validations:
      required: true

  - type: input
    id: hash_algorithm
    attributes:
      label: "Hash Algorithm *"
      description: "The algorithm used to generate the hash (e.g., SHA‑256, BLAKE2b)."
      placeholder: "SHA‑256"
    validations:
      required: true

  - type: textarea
    id: model_hash
    attributes:
      label: "Model Weights Hash *"
      description: "The full hash value of the model weights file(s). Paste the exact hash string. Keep under 10,000 characters."
      placeholder: "e.g., a3f9c12e7d4b8f..."
    validations:
      required: true

  - type: input
    id: artifact_date
    attributes:
      label: "Date of the Model Artifact *"
      description: "The date this version of the model was finalized. Format: YYYY-MM-DD"
      placeholder: "2026-06-02"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Model Description (Optional)"
      description: "Brief description of the model — architecture, training data, intended use. Keep under 5,000 characters."
      placeholder: "Describe the model's architecture, training scope, and intended use."
    validations:
      required: false

  - type: textarea
    id: supporting_urls
    attributes:
      label: "Supporting Files URLs (Optional)"
      description: "One permanent URL per line (IPFS, GitHub gist, etc.). The stamp seals only the URLs, not the content. For cryptographic integrity, also provide SHA‑256 hashes below."
      placeholder: "https://ipfs.io/ipfs/Qm...\nhttps://gist.github.com/..."
    validations:
      required: false

  - type: textarea
    id: supporting_hashes
    attributes:
      label: "Supporting file SHA‑256 hashes (optional, recommended)"
      description: "One SHA‑256 hash per file, in the same order as the URLs. This cryptographically binds the seal to the exact file content."
      placeholder: "a3f9c12e7d... (64 hex chars)\nb4c8d3e2f1a..."
    validations:
      required: false

  - type: input
    id: correction_of
    attributes:
      label: "Correction / Resubmission of (optional)"
      description: "If this seal corrects a previous model weights seal, provide the previous ledger entry ID or SHA‑256 hash."
      placeholder: "a3f9c12e7d... or #42"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration *"
      options:
        - label: "I affirm the hash above is the exact cryptographic hash of the model weights as described."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing. A correction creates a new entry but does not delete the original."
          required: true
        - label: "I understand that my GitHub username is publicly linked to this seal, and the model hash is public."
          required: true
        - label: "If I provided supporting file URLs, I have also provided their SHA‑256 hashes to cryptographically bind the content."
          required: false
        - label: "I understand that this submission is permanent – a correction creates a new entry but does not delete the original."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **Data retention:** This record is retained permanently. You cannot delete it.

        **After submission**: The STP auto‑seal workflow will generate a triple‑time stamp and SHA‑256 hash. You will receive a comment with the seal and ledger entry ID. Do not edit the issue after sealing.

        **Contact:** `aionsystem@outlook.com` (for technical issues only). All seals are final.

        **Verification**: Every model weights seal can be independently verified using the STP pip package: `sovereign-trace verify --entry-id <ID> --hash <SHA-256>`.
