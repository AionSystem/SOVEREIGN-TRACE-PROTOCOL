name: "Evidence Chain Seal — Sovereign Trace Protocol"
description: "Seal a document, source communication, or evidence chain at the moment of receipt. Establishes tamper-evident chain of custody."
title: "[STP-EVIDENCE] — [TYPE] — [DATE]"
labels: ["evidence-chain", "pending-seal"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## Evidence Chain Seal

        This form seals a document, communication, or piece of evidence at the exact moment you received or created it.

        **The seal proves:** You had this material, in this exact form, on this exact date. It has not been altered since.

        **Source protection:** You are not required to name your source. Seal only what you intend to make permanent.

        This is chain of custody infrastructure — not a complaint form.

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name or Publication (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for anonymous chain of custody."
      placeholder: "Name, publication, or organization — or leave blank"
    validations:
      required: false

  - type: input
    id: evidence_type
    attributes:
      label: "Evidence Type"
      description: "What kind of material is being sealed?"
      placeholder: "Document / Source Communication / Transcript / Photograph / Data / Other"
    validations:
      required: true

  - type: input
    id: receipt_date
    attributes:
      label: "Date Material Was Received or Created"
      description: "The date you received or created this material. Format: YYYY-MM-DD"
      placeholder: "2026-03-07"
    validations:
      required: true

  - type: textarea
    id: material_description
    attributes:
      label: "Description of Material"
      description: "Describe what it is, what it pertains to, and what it shows. No source-identifying information unless intended for the permanent record."
      placeholder: "Describe the material and what it establishes."
    validations:
      required: true

  - type: textarea
    id: source_context
    attributes:
      label: "Context (Optional)"
      description: "How was this material obtained? Do not include source-identifying information unless intended for the permanent record."
      placeholder: "Context for the material — optional."
    validations:
      required: false

  - type: input
    id: disclosure_timeline
    attributes:
      label: "Intended Disclosure Timeline (Optional)"
      description: "When do you plan to publish or disclose? Establishes that the seal predates the public record."
      placeholder: "Pre-publication / Expected: April 2026 / Ongoing investigation"
    validations:
      required: false

  - type: upload
    id: evidence_files
    attributes:
      label: "Evidence Files (Optional)"
      description: "Upload documents, screenshots, or files. These become part of the sealed record."
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration"
      options:
        - label: "I affirm this description accurately represents the material I received or created on the stated date."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing."
          required: true
        - label: "I understand the protocol seals my account of receiving the material — not the authenticity of the material itself."
          required: true
        - label: "I have not included information in this submission that would endanger any individual."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Completeness check — Reviewed for completeness.
        2. Sealing — Sealed with a FROZEN-2.0 triple-time cryptographic stamp. Permanent.
        3. Ledger entry — Enters the Sovereign Trace ledger with timestamp and SHA-256 hash.
        4. Notification — You receive your ledger entry ID and SHA-256 hash.

        The seal is permanent. The seal is the chain of custody.

        Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem2026@gmail.com
