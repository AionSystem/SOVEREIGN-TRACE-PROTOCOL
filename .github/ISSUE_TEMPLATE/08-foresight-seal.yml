name: Foresight Seal
description: "Seal a dated prediction about a company, industry, or technology before it resolves. Cryptographic proof you saw it first."
title: "[STP-FORESIGHT] — [SUBJECT] — [DATE]"
labels: ["foresight-seal", "pending-seal"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Foresight Seal – Sovereign Trace Protocol (FROZEN‑4.0)

        This form seals a prediction — about a company, industry, technology, or regulatory development —
        at the exact moment you make it.

        **What the seal gives you:** Cryptographic proof, dated today, that you held this foresight
        before it became obvious. When the prediction resolves, the ledger entry proves you saw it first.
        No one can claim you revised it after the fact. The timestamp is the record.

        **What this is:** Timestamped professional opinion and foresight based on your analysis.
        **The seal proves existence, not correctness.** A wrong prediction is still a valid foresight record.

        **What this is not:** A factual assertion that the predicted event has occurred.
        Do not submit predictions framed as established facts. Seal what you foresee — not what you accuse.

        **⚠️ CRITICAL WARNINGS – READ BEFORE PROCEEDING ⚠️**
        - The SHA‑256 hash of your prediction is **public**. If your prediction contains low‑entropy secrets or identifies individuals in a harmful way, reconsider.
        - Your GitHub username is **publicly linked** to this sealed prediction. If you require anonymity, create a separate GitHub account with no identifying information.
        - The stamp seals **exactly the text you write** – not any external files. Use permanent URLs (IPFS, archive.is) for supporting documents and **provide SHA‑256 hashes** of those files to cryptographically bind their content.
        - **This record is retained permanently.** You cannot delete it.
        - **Do not edit this issue after sealing** – the hash will change and the seal will be invalid.

        **Fields marked with `*` are required.**

  - type: input
    id: submitter_name
    attributes:
      label: "Your Full Name or Professional Name *"
      description: "The name attached to this foresight record."
      placeholder: "First Last or Professional Name"
    validations:
      required: true

  - type: input
    id: subject
    attributes:
      label: "Subject of Prediction *"
      description: "Who or what is this prediction about?"
      placeholder: "Company name / Industry sector / Technology / Regulatory domain"
    validations:
      required: true

  - type: input
    id: prediction_date
    attributes:
      label: "Date of This Prediction *"
      description: "Today's date — the date this prediction is being sealed. Format: YYYY-MM-DD"
      placeholder: "2026-03-07"
    validations:
      required: true

  - type: input
    id: resolution_timeframe
    attributes:
      label: "Expected Resolution Timeframe *"
      description: "When do you expect this prediction to resolve — prove true or false?"
      placeholder: "Within 12 months / By Q4 2027 / Within 3 years"
    validations:
      required: true

  - type: textarea
    id: prediction
    attributes:
      label: "The Prediction — Exact *"
      description: "State your prediction precisely. Specific enough to be verifiable when it resolves. Keep under 10,000 characters."
      placeholder: "State the prediction exactly. Be specific about what you foresee, for whom, and under what conditions."
    validations:
      required: true

  - type: textarea
    id: reasoning
    attributes:
      label: "Reasoning and Evidence Basis *"
      description: "What analysis, signals, or patterns lead you to this foresight?"
      placeholder: "Describe the reasoning, signals, or evidence base that supports this prediction."
    validations:
      required: true

  - type: textarea
    id: implication
    attributes:
      label: "Implication If Correct *"
      description: "If this prediction resolves true — what does it mean for the subject? For the industry?"
      placeholder: "Describe what it means if this prediction is correct."
    validations:
      required: true

  - type: textarea
    id: falsification
    attributes:
      label: "Falsification Condition *"
      description: "What specific outcome would prove this prediction wrong?"
      placeholder: "Describe what would falsify this prediction."
    validations:
      required: true

  - type: dropdown
    id: confidence_level
    attributes:
      label: "Confidence Level *"
      options:
        - "High – strong evidence base"
        - "Moderate – plausible but uncertain"
        - "Speculative – educated guess"
        - "Other (specify in reasoning)"
      default: 0
    validations:
      required: true

  - type: input
    id: correction_of
    attributes:
      label: "Correction / Retraction of (optional)"
      description: "If this foresight corrects or retracts a previous sealed prediction, provide the previous ledger entry ID or SHA‑256 hash."
      placeholder: "e.g., a3f9c12e7d..."
    validations:
      required: false

  - type: textarea
    id: supporting_urls
    attributes:
      label: "Supporting Analysis URLs (optional)"
      description: "One permanent URL per line (IPFS, archive.is, GitHub gist). The stamp seals only the URLs, not the content. For cryptographic binding, also provide SHA‑256 hashes below."
      placeholder: "https://ipfs.io/ipfs/Qm...\nhttps://archive.is/abc123"
    validations:
      required: false

  - type: textarea
    id: supporting_hashes
    attributes:
      label: "Supporting File SHA‑256 Hashes (optional, recommended)"
      description: "One SHA‑256 hash per file, in the same order as the URLs. This cryptographically binds the seal to the exact file content."
      placeholder: "a3f9c12e7d... (64 hex chars)\nb4c8d3e2f1a..."
    validations:
      required: false

  - type: input
    id: submitter_identity_alias
    attributes:
      label: "Submitter identity for ledger (optional)"
      description: "If you want a different name to appear in the STP ledger than your GitHub username, enter it here. The ledger entry will use this value."
      placeholder: "e.g., Anonymous Analyst, John Doe (pseudonym)"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration *"
      description: "You must confirm all of the following to proceed."
      options:
        - label: "I affirm this is my genuine professional opinion and foresight — not a factual claim that this event has occurred."
          required: true
        - label: "I affirm the reasoning basis described is my honest analysis — not fabricated to support a predetermined conclusion."
          required: true
        - label: "I affirm that this prediction is based on publicly available information and does not violate any confidentiality or insider trading laws."
          required: true
        - label: "I understand that this submission is immutable — it cannot be altered after sealing. A correction creates a new entry but does not delete the original."
          required: true
        - label: "I understand that the SHA‑256 hash of my prediction is public and that my GitHub username is publicly linked to this sealed record unless I use an anonymous account."
          required: true
        - label: "I understand that the stamp uses FROZEN‑4.0 and that the seal is generated by `sovereign_trace_stamp.py`. See STP repository for verification."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **Data retention:** This record is retained permanently. You cannot delete it.

        **After submission**: The STP auto‑seal workflow will generate a triple‑time stamp and SHA‑256 hash. You will receive a comment on this issue with the seal and a link to the ledger entry. Do not edit the issue after sealing.

        When your prediction resolves — contact the protocol office with your ledger entry ID. The resolution will be noted in the public record. The timestamp is permanent either way.

        The seal is the proof. The ledger is the track record.

        **Contact:** `aionsystem@outlook.com` (for technical issues only). All seals are final.

        **Verification:** Every sealed foresight can be independently verified using the STP pip package: `sovereign-trace verify --entry-id <ID> --hash <SHA-256>`.
