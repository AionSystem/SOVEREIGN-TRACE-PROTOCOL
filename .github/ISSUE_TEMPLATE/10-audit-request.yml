name: "AUDIT REQUEST: Sheldon K. Salmon — AI Output Review"
description: "Request a certified AI output audit. Read the operating schedule before submitting."
title: "[AUDIT] — [Company Name] — [Tier Selected]"
labels: ["audit-request", "pending-payment-verification"]
body:

  - type: markdown
    attributes:
      value: |
        ## ⚠ READ BEFORE SUBMITTING

        **Intake days: Monday and Tuesday only.**
        Issues submitted on any other day of the week are **voided and non-refundable.**
        No exceptions. No appeals. The schedule is the filter.

        **Delivery: Weekends.** Reports are delivered Saturday or Sunday via scheduled reply.
        Standard turnaround is same weekend or following weekend depending on tier and submission date.

        **Expedited work** is available at a daily multiplier. Work required in under 4 hours is not accepted.

        **Payment verification:** Submit your Stripe transaction code below.
        Send the payment screenshot to the contact email on file.
        I match the transaction code in this issue to your email and Stripe. All three must align before work begins.

        If they do not align — the issue is closed. No refund.

  - type: input
    id: company_name
    attributes:
      label: "Company / Organization Name"
      placeholder: "Acme AI Corp"
    validations:
      required: true

  - type: input
    id: contact_email
    attributes:
      label: "Contact Email"
      description: "Must match the email the payment screenshot was sent from."
      placeholder: "contact@yourcompany.com"
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: "Audit Tier"
      description: "Select the tier that matches your payment."
      options:
        - "Snapshot — 10 outputs — $2,500"
        - "Standard — 20 outputs — $5,000"
        - "Extended — 30 outputs — $7,500"
        - "Full — 50 outputs — $12,500"
        - "Enterprise — 100 outputs — $25,000"
    validations:
      required: true

  - type: input
    id: transaction_code
    attributes:
      label: "Stripe Transaction Code"
      description: "The transaction ID from your Stripe payment. Format: ch_xxxxxxxxxxxxxxxxxxxxxxxx"
      placeholder: "ch_3xxxxxxxxxxxxxxxxxxxxxxxxx"
    validations:
      required: true

  - type: dropdown
    id: expedited
    attributes:
      label: "Expedited Delivery?"
      description: "Standard delivery is weekend. Expedited adds a daily multiplier to the base price. Under 4 hours is not accepted."
      options:
        - "No — standard weekend delivery"
        - "Yes — 1 week turnaround"
        - "Yes — 3 day turnaround"
        - "Yes — 48 hour turnaround"
        - "Yes — 24 hour turnaround"
    validations:
      required: true

  - type: textarea
    id: output_description
    attributes:
      label: "AI Outputs to Review"
      description: "Briefly describe the outputs. Attach files below. Do not paste raw text here."
      placeholder: "10 GPT-4o outputs from our customer support pipeline, March 2026. PDF attached."
    validations:
      required: true

  - type: input
    id: ai_system
    attributes:
      label: "AI System(s) Used"
      placeholder: "GPT-4o, Claude Sonnet, Gemini 1.5 Pro"
    validations:
      required: true

  - type: textarea
    id: file_upload
    attributes:
      label: "File Upload"
      description: "Upload your AI output files here. PDF, screenshots, or exported logs accepted. Max 10 files per submission."
    validations:
      required: false

  - type: checkboxes
    id: schedule_acknowledgment
    attributes:
      label: "Schedule Acknowledgment"
      options:
        - label: "I understand that intake is Monday and Tuesday only. Submissions on any other day are voided and non-refundable."
          required: true
        - label: "I understand that delivery occurs on weekends and the standard turnaround is same or following weekend."
          required: true
        - label: "I understand that payment verification requires my transaction code in this issue AND a screenshot sent to the contact email. Both must match before work begins."
          required: true
        - label: "I understand that expedited work under 4 hours is not accepted."
          required: true

  - type: checkboxes
    id: legal_declaration
    attributes:
      label: "Legal Declaration"
      options:
        - label: "I confirm I am authorized to submit these AI outputs for external review. I have read and agree to the Terms of Service."
          required: true
        - label: "I understand that the completed audit report will be sealed using Sovereign Trace Protocol FROZEN-2.0 and permanently recorded in the public ledger."
          required: true
