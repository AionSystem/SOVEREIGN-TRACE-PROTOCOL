name: "Release Seal — Sovereign Trace Protocol"
description: "Seal a software release — commit hash, build artifact checksum, and release notes. Converts a GitHub release into a cryptographically permanent event."
title: "[STP-RELEASE] — [PRODUCT/VERSION] — [DATE]"
labels: ["release-seal", "pending-seal"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Release Seal – Sovereign Trace Protocol (FROZEN‑4.0)

        This form is for sealing a software release at the moment it is shipped. It creates a permanent, independent record of the exact artifacts, commit, and release notes — outside of any platform's edit history.

        **⚠️ CRITICAL WARNINGS – READ BEFORE PROCEEDING ⚠️**
        - The commit hash, artifact checksums, and release notes you provide are **public** and **permanent**.
        - Your GitHub username is **publicly linked** to this seal.
        - **Do not edit this issue after the workflow seals it** – the hash will change.
        - **This record is retained permanently** in the STP ledger and GitHub issue history.
        - Supporting files are **not** cryptographically bound unless you provide their SHA‑256 hashes.
        - A correction creates a new entry; the original remains.

        **Fields marked with `*` are required.**

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for an anonymous seal."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: product_name
    attributes:
      label: "Product or Project Name *"
      description: "The name of the software or project being released."
      placeholder: "e.g., sovereign-trace, MyApp"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "Version Number *"
      description: "The version string for this release."
      placeholder: "e.g., 4.0.0, v2.1.1"
    validations:
      required: true

  - type: input
    id: release_date
    attributes:
      label: "Release Date *"
      description: "The date this version was released. Format: YYYY-MM-DD"
      placeholder: "2026-06-02"
    validations:
      required: true

  - type: input
    id: commit_hash
    attributes:
      label: "Commit Hash *"
      description: "The full Git commit hash that this release was built from. Keep under 100 characters."
      placeholder: "e.g., a1b2c3d4e5f6..."
    validations:
      required: true

  - type: textarea
    id: artifact_checksums
    attributes:
      label: "Build Artifact Checksums *"
      description: "Paste the SHA‑256 (or other algorithm) checksums of the released build artifacts. One per line. Keep under 10,000 characters."
      placeholder: "package.tar.gz: sha256:abc123...\ninstaller.exe: sha256:def456..."
    validations:
      required: true

  - type: textarea
    id: release_notes
    attributes:
      label: "Release Notes *"
      description: "Paste the full release notes as published. This is the text that ships with the release. Keep under 20,000 characters."
      placeholder: "## What's New in vX.Y.Z\n- Feature A\n- Bug fix B\n- Breaking change C"
    validations:
      required: true

  - type: textarea
    id: supporting_urls
    attributes:
      label: "Supporting Files URLs (Optional)"
      description: "One permanent URL per line (IPFS, GitHub gist, etc.). The stamp seals only the URLs, not the content. For cryptographic integrity, also provide SHA‑256 hashes below."
      placeholder: "https://ipfs.io/ipfs/Qm...\nhttps://gist.github.com/..."
    validations:
      required: false

  - type: textarea
    id: supporting_hashes
    attributes:
      label: "Supporting file SHA‑256 hashes (optional, recommended)"
      description: "One SHA‑256 hash per file, in the same order as the URLs. This cryptographically binds the seal to the exact file content."
      placeholder: "a3f9c12e7d... (64 hex chars)\nb4c8d3e2f1a..."
    validations:
      required: false

  - type: input
    id: correction_of
    attributes:
      label: "Correction / Resubmission of (optional)"
      description: "If this seal corrects a previous release seal, provide the previous ledger entry ID or SHA‑256 hash."
      placeholder: "a3f9c12e7d... or #42"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration *"
      options:
        - label: "I affirm the commit hash, artifact checksums, and release notes above are accurate for this release."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing. A correction creates a new entry but does not delete the original."
          required: true
        - label: "I understand that my GitHub username is publicly linked to this seal, and the release data is public."
          required: true
        - label: "If I provided supporting file URLs, I have also provided their SHA‑256 hashes to cryptographically bind the content."
          required: false
        - label: "I understand that this submission is permanent – a correction creates a new entry but does not delete the original."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **Data retention:** This record is retained permanently. You cannot delete it.

        **After submission**: The STP auto‑seal workflow will generate a triple‑time stamp and SHA‑256 hash. You will receive a comment with the seal and ledger entry ID. Do not edit the issue after sealing.

        **Contact:** `aionsystem@outlook.com` (for technical issues only). All seals are final.

        **Verification**: Every release seal can be independently verified using the STP pip package: `sovereign-trace verify --entry-id <ID> --hash <SHA-256>`.
