name: "Research Priority Seal — Sovereign Trace Protocol"
description: "Seal a hypothesis, finding, or framework specification before results are known or work is published."
title: "[STP-RESEARCH] — [FIELD] — [DATE]"
labels: ["research-priority", "pending-seal"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## Research Priority Seal

        This form seals your research hypothesis, methodology, or finding at the exact moment of submission.

        The SHA-256 seal proves you held this position before results were known — not after.
        This is not peer review. This is not publication. This is a tamper-evident timestamp.

        **Identity is optional.** An anonymous sealed record still proves priority. To later claim ownership, provide a public key fingerprint below.

  - type: input
    id: submitter-name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for anonymous priority seal."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: public-key-fingerprint
    attributes:
      label: "Public Key Fingerprint (Optional, for anonymous claims)"
      description: "PGP or SSH fingerprint. Later, sign a message with this key to prove you own the seal."
      placeholder: "e.g. 3B89 7E1D 5D5C 8A4D 9E34  2A3F 6C8A 4B1D 9F2E 7C5A"
    validations:
      required: false

  - type: input
    id: field
    attributes:
      label: "Field / Discipline"
      description: "The academic or professional field this work belongs to."
      placeholder: "e.g. Machine Learning, Clinical Medicine, Economics, AI Safety"
    validations:
      required: true

  - type: input
    id: submission-type
    attributes:
      label: "Submission Type"
      description: "What are you sealing?"
      placeholder: "Hypothesis / Finding / Framework Specification / Methodology / Prediction"
    validations:
      required: true

  - type: textarea
    id: hypothesis-or-claim
    attributes:
      label: "Hypothesis, Finding, or Specification"
      description: "State it exactly. **Keep under 10,000 characters.**"
      placeholder: "State your hypothesis, finding, or specification precisely."
    validations:
      required: true

  - type: textarea
    id: methodology
    attributes:
      label: "Methodology or Derivation"
      description: "How did you arrive at this? **Keep under 5,000 characters.**"
      placeholder: "Describe your methodology or how this was derived."
    validations:
      required: true

  - type: textarea
    id: falsification-condition
    attributes:
      label: "Falsification Condition (Optional but Recommended)"
      description: "What result would prove this hypothesis wrong? **Keep under 2,000 characters.**"
      placeholder: "Describe what would falsify this hypothesis or specification."
    validations:
      required: false

  - type: input
    id: current-status
    attributes:
      label: "Current Status"
      description: "Where is this work right now?"
      placeholder: "Pre-experiment / Pre-submission / Pre-publication / Draft"
    validations:
      required: true

  - type: input
    id: supporting-urls
    attributes:
      label: "Supporting File URLs"
      description: "Upload files to a service (e.g., Zenodo, GitHub release) and paste the links."
      placeholder: "https://example.com/draft.pdf"
    validations:
      required: false

  - type: textarea
    id: supporting-links
    attributes:
      label: "Additional Supporting Links (Optional)"
      placeholder: "Links to prior work, datasets, or related material."
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration"
      options:
        - label: "I affirm this submission represents my genuine position at the time of sealing — not a result known in advance."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing."
          required: true
        - label: "I understand the protocol seals existence at this moment — it does not validate scientific merit."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Completeness check — Reviewed for completeness.
        2. Sealing — Sealed with a **FROZEN-4.0** triple‑time cryptographic stamp. Permanent.
        3. Ledger entry — Enters the Sovereign Trace ledger with timestamp and SHA‑256 hash.
        4. Notification — You receive your ledger entry ID and SHA‑256 hash.

        The protocol does not evaluate the merit of your research. It seals its existence.

        *Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem@outlook.com*
