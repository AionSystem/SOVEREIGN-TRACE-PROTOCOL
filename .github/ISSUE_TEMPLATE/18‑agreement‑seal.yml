name: "Agreement Seal — Sovereign Trace Protocol"
description: "Seal a term sheet, contract, or handshake agreement before formalization. Creates an immutable record of what was agreed."
title: "[STP-AGREEMENT] — [PARTIES / SUBJECT] — [DATE]"
labels: ["agreement-seal", "pending-seal"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Agreement Seal – Sovereign Trace Protocol (FROZEN‑4.0)

        This form is for sealing the terms of an agreement — a term sheet, a handshake deal, a contract draft, or any mutual understanding — before it is formalized or finalized.

        The sealed record proves what was agreed at the moment of decision, even if the final document drifts or is disputed later.

        **⚠️ CRITICAL WARNINGS – READ BEFORE PROCEEDING ⚠️**
        - The agreement terms you write are **public** and **permanent**.
        - Your GitHub username is **publicly linked** to this seal.
        - **Do not edit this issue after the workflow seals it** – the hash will change.
        - **This record is retained permanently** in the STP ledger and GitHub issue history.
        - Supporting files are **not** cryptographically bound unless you provide their SHA‑256 hashes.
        - A correction creates a new entry; the original remains.

        **Fields marked with `*` are required.**

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for an anonymous seal."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: agreement_subject
    attributes:
      label: "Agreement Subject or Title *"
      description: "A short title for this agreement (e.g., 'Q3 Consulting Scope', 'Co‑Founder Equity Split')."
      placeholder: "e.g., Software Development Services Agreement"
    validations:
      required: true

  - type: input
    id: agreement_date
    attributes:
      label: "Date of Agreement *"
      description: "The date the agreement was reached. Format: YYYY-MM-DD"
      placeholder: "2026-06-02"
    validations:
      required: true

  - type: textarea
    id: parties
    attributes:
      label: "Parties to the Agreement *"
      description: "List the names or organizations involved in the agreement. Keep under 5,000 characters."
      placeholder: "Party A: [Name/Company] \nParty B: [Name/Company]"
    validations:
      required: true

  - type: textarea
    id: terms_summary
    attributes:
      label: "Summary of Agreed Terms *"
      description: "Write a concise summary of the agreed terms. Include key dates, deliverables, compensation, and any conditions. Keep under 10,000 characters."
      placeholder: "Summarize the key terms: scope, deliverables, timeline, payment, conditions, and any agreed constraints."
    validations:
      required: true

  - type: textarea
    id: supporting_urls
    attributes:
      label: "Supporting Files URLs (Optional)"
      description: "One permanent URL per line (IPFS, GitHub gist, etc.). The stamp seals only the URLs, not the content. For cryptographic integrity, also provide SHA‑256 hashes below."
      placeholder: "https://ipfs.io/ipfs/Qm...\nhttps://gist.github.com/..."
    validations:
      required: false

  - type: textarea
    id: supporting_hashes
    attributes:
      label: "Supporting file SHA‑256 hashes (optional, recommended)"
      description: "One SHA‑256 hash per file, in the same order as the URLs. This cryptographically binds the seal to the exact file content."
      placeholder: "a3f9c12e7d... (64 hex chars)\nb4c8d3e2f1a..."
    validations:
      required: false

  - type: input
    id: correction_of
    attributes:
      label: "Correction / Resubmission of (optional)"
      description: "If this seal corrects a previous agreement seal, provide the previous ledger entry ID or SHA‑256 hash."
      placeholder: "a3f9c12e7d... or #42"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration *"
      options:
        - label: "I affirm the terms above represent the agreement as understood by all parties at the time of sealing."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing. A correction creates a new entry but does not delete the original."
          required: true
        - label: "I understand that my GitHub username is publicly linked to this seal, and the agreement terms are public."
          required: true
        - label: "If I provided supporting file URLs, I have also provided their SHA‑256 hashes to cryptographically bind the content."
          required: false
        - label: "I understand that this submission is permanent – a correction creates a new entry but does not delete the original."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **Data retention:** This record is retained permanently. You cannot delete it.

        **After submission**: The STP auto‑seal workflow will generate a triple‑time stamp and SHA‑256 hash. You will receive a comment with the seal and ledger entry ID. Do not edit the issue after sealing.

        **Contact:** `aionsystem@outlook.com` (for technical issues only). All seals are final.

        **Verification**: Every agreement seal can be independently verified using the STP pip package: `sovereign-trace verify --entry-id <ID> --hash <SHA-256>`.
