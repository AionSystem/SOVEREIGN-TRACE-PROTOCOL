name: "Agreement Seal — Sovereign Trace Protocol"
description: "Seal a term sheet, contract, or handshake agreement before formalization. Creates an immutable record of what was agreed."
title: "[STP-AGREEMENT] — [PARTIES / SUBJECT] — [DATE]"
labels: ["agreement-seal", "pending-seal"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## Agreement Seal

        This form is for sealing the terms of an agreement — a term sheet, a handshake deal, a contract draft, or any mutual understanding — before it is formalized or finalized.

        The sealed record proves what was agreed at the moment of decision, even if the final document drifts or is disputed later.

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for an anonymous seal."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: agreement_subject
    attributes:
      label: "Agreement Subject or Title"
      description: "A short title for this agreement (e.g., 'Q3 Consulting Scope', 'Co‑Founder Equity Split')."
      placeholder: "e.g., Software Development Services Agreement"
    validations:
      required: true

  - type: input
    id: agreement_date
    attributes:
      label: "Date of Agreement"
      description: "The date the agreement was reached. Format: YYYY-MM-DD"
      placeholder: "2026-06-02"
    validations:
      required: true

  - type: textarea
    id: parties
    attributes:
      label: "Parties to the Agreement"
      description: "List the names or organizations involved in the agreement."
      placeholder: "Party A: [Name/Company] \nParty B: [Name/Company]"
    validations:
      required: true

  - type: textarea
    id: terms_summary
    attributes:
      label: "Summary of Agreed Terms"
      description: "Write a concise summary of the agreed terms. Include key dates, deliverables, compensation, and any conditions."
      placeholder: "Summarize the key terms: scope, deliverables, timeline, payment, conditions, and any agreed constraints."
    validations:
      required: true

  - type: upload
    id: supporting_files
    attributes:
      label: "Supporting Files (Optional)"
      description: "Upload the term sheet, draft contract, email thread, or any document referenced by the agreement."
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration"
      options:
        - label: "I affirm the terms above represent the agreement as understood by all parties at the time of sealing."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Completeness check — Reviewed for completeness.
        2. Sealing — Sealed with a FROZEN‑4.0 triple‑time cryptographic stamp. Permanent.
        3. Ledger entry — Enters the Sovereign Trace ledger with timestamp and SHA‑256 hash.
        4. Notification — You receive your ledger entry ID and SHA‑256 hash.

        The seal is permanent. The seal is the resolution.

        Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem2026@gmail.com
