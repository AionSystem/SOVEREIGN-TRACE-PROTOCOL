name: "AUDIT REQUEST: Tier 1–5 — AI Reliability Audit"
description: "Full constitutional audit. Output‑banded pricing. Architect‑led intake – Monday and Tuesday only."
title: "[AUDIT] — [Company Name] — [Tier Selected]"
labels: ["audit-request", "pending-payment-verification", "architect-led"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## AUDIT REQUEST – Sovereign Trace Protocol (FROZEN‑4.0)

        **⚠️ CRITICAL WARNINGS – READ BEFORE PROCEEDING ⚠️**
        - **Intake days: Monday and Tuesday only.** Issues submitted on any other day are **voided and non-refundable.** No exceptions. No appeals.
        - The completed audit report will be sealed with a **public** SHA‑256 hash and recorded in the **permanent, immutable Trust Registry**.
        - Your company name, system description, and audit results will be publicly linked to your GitHub username.
        - Email attachments (payment screenshots, sample outputs) are **not** cryptographically sealed. Only the final audit report is sealed.
        - For sensitive outputs, use permanent URLs (IPFS, GitHub gist) and **provide SHA‑256 hashes** to cryptographically bind the file content.
        - **Expedited requests requiring work under 4 hours are not accepted** – if your deadline is immediate, do not submit.
        - **This description is permanently sealed. Proofread before submitting.**
        - **Do not edit this issue after the workflow seals it** – the hash will change.
        - **This record is retained permanently** in the STP ledger and GitHub issue history.

        **Payment verification:** Submit your Stripe transaction code below. Send the payment screenshot to `aionsystem@outlook.com`. The transaction code, email, and Stripe record must align before work begins.

        **Audit tiers and pricing (from CERTIFICATION.md):**

        | Tier | Outputs | Price | Validity |
        |------|---------|-------|----------|
        | Tier 1 Starter | 25 | $3,000 | 90 days |
        | Tier 1 Professional | 50 | $6,000 | 90 days |
        | Tier 1 Business | 100 | $10,000 | 90 days |
        | Tier 1 Enterprise | 250 | $18,000 | 90 days |
        | Tier 1 Platform | 500 | $30,000 | 90 days |
        | Tier 1 Constitutional | 1,000 | $50,000 | 90 days |
        | Tier 2 Enterprise Retainer | N/A (quarterly) | $25,000/year | 90 days per cycle |
        | Tier 3 Strategic Retainer | N/A (monthly) | $100,000+/year | 30 days per cycle |
        | Tier 4 Defense & Government | Negotiated | Written contract | 90 days per period |
        | Tier 5 Sovereign Audit | Up to 1,000+ | $15,000 per engagement | 180 days cert / 12‑month badge |

        **Fields marked with `*` are required.**

  - type: input
    id: company_name
    attributes:
      label: "Company / Organization Name *"
      placeholder: "Acme AI Corp"
    validations:
      required: true

  - type: input
    id: contact_email
    attributes:
      label: "Contact Email *"
      description: "Must match the email the payment screenshot was sent from."
      placeholder: "contact@yourcompany.com"
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: "Audit Tier *"
      description: "Select the tier that matches your payment."
      options:
        - "Tier 1 Starter — 25 outputs — $3,000"
        - "Tier 1 Professional — 50 outputs — $6,000"
        - "Tier 1 Business — 100 outputs — $10,000"
        - "Tier 1 Enterprise — 250 outputs — $18,000"
        - "Tier 1 Platform — 500 outputs — $30,000"
        - "Tier 1 Constitutional — 1,000 outputs — $50,000"
        - "Tier 2 Enterprise Retainer — $25,000/year (quarterly audits)"
        - "Tier 3 Strategic Retainer — $100,000+/year (monthly audits)"
        - "Tier 4 Defense & Government — Negotiated (written contract required)"
        - "Tier 5 Sovereign Audit — $15,000 per engagement"
      default: 0
    validations:
      required: true

  - type: input
    id: output_count
    attributes:
      label: "Number of Outputs (for Tier 1 only) *"
      description: "If Tier 1, specify the exact output count (up to the tier limit). Not applicable for retainers or Tier 4/5."
      placeholder: "50"
    validations:
      required: false

  - type: input
    id: transaction_code
    attributes:
      label: "Stripe Transaction Code *"
      description: "For Tier 1 and Tier 5. For retainers (Tier 2/3) and Tier 4, see separate invoicing. Format: `ch_xxxxxxxxxxxxxxxxxxxxxxxx`"
      placeholder: "ch_3xxxxxxxxxxxxxxxxxxxxxxxxx"
    validations:
      required: false

  - type: dropdown
    id: expedited
    attributes:
      label: "Expedited Delivery?"
      description: "Standard delivery is weekend. Expedited adds a daily multiplier. **Requests requiring work under 4 hours are not accepted** – if your deadline is sooner, do not submit. Expedited fees are quoted separately and invoiced."
      options:
        - "No — standard weekend delivery"
        - "Yes — 1 week turnaround"
        - "Yes — 3 day turnaround"
        - "Yes — 48 hour turnaround"
        - "Yes — 24 hour turnaround"
      default: 0
    validations:
      required: true

  - type: textarea
    id: system_description
    attributes:
      label: "AI System Description *"
      description: "Describe the AI system: purpose, domain, scale, deployment environment. Keep under 10,000 characters."
      placeholder: "Customer support chatbot using GPT-4o, deployed on AWS, 500+ daily requests."
    validations:
      required: true

  - type: textarea
    id: output_description
    attributes:
      label: "Outputs to Review (sample or full) *"
      description: "For Tier 1, list output categories or attach examples. Keep under 10,000 characters. For files, upload to permanent URLs (IPFS, GitHub gist) and provide links below. Include SHA‑256 hashes for cryptographic binding."
      placeholder: "We will provide 50 conversation logs from the last 30 days. Files: https://ipfs.io/ipfs/Qm... (SHA‑256: ...)"
    validations:
      required: true

  - type: textarea
    id: output_urls
    attributes:
      label: "URLs to output files (optional)"
      description: "One permanent URL per line (IPFS, GitHub gist, etc.). The seal will cover these URLs (but not the file content). For cryptographic integrity, also provide SHA‑256 hashes below."
      placeholder: "https://ipfs.io/ipfs/Qm...\nhttps://gist.github.com/..."
    validations:
      required: false

  - type: textarea
    id: output_hashes
    attributes:
      label: "Output file SHA‑256 hashes (optional, recommended)"
      description: "One SHA‑256 hash per file, in the same order as the URLs. This cryptographically binds the seal to the exact file content."
      placeholder: "a3f9c12e7d... (64 hex chars)\nb4c8d3e2f1a..."
    validations:
      required: false

  - type: input
    id: correction_of
    attributes:
      label: "Correction / Resubmission of (optional)"
      description: "If this audit request corrects a previous submission, provide the previous issue number or ledger entry ID."
      placeholder: "#42 or a3f9c12e7d..."
    validations:
      required: false

  - type: checkboxes
    id: trust_registry
    attributes:
      label: "Trust Registry Recording *"
      description: "All Tier 1–5 certifications are automatically recorded in the public Trust Registry. This is mandatory and permanent."
      options:
        - label: "I understand that this certification will be permanently recorded in the public Trust Registry."
          required: true

  - type: checkboxes
    id: schedule_acknowledgment
    attributes:
      label: "Schedule Acknowledgment *"
      options:
        - label: "I understand that intake is Monday and Tuesday only. Submissions on any other day are voided and non-refundable."
          required: true
        - label: "I understand that delivery occurs on weekends (Saturday or Sunday)."
          required: true
        - label: "I understand that payment verification requires my transaction code in this issue AND a screenshot sent to `aionsystem@outlook.com`. Both must match before work begins."
          required: true
        - label: "I understand that expedited work under 4 hours is not accepted, and that expedited fees are separate and will be invoiced."
          required: true

  - type: checkboxes
    id: legal_declaration
    attributes:
      label: "Legal Declaration *"
      options:
        - label: "I confirm I am authorised to submit this AI system for external audit and to share the described outputs. I have read and agree to the Terms of Service."
          required: true
        - label: "I understand that the completed audit report will be sealed using Sovereign Trace Protocol FROZEN‑4.0, recorded in the Trust Registry, and permanently stored in the STP ledger."
          required: true
        - label: "I acknowledge that Tier 1–5 certifications follow a 90‑day (Tier 1/2/4) or 30‑day (Tier 3) or 180‑day (Tier 5) validity window and require re‑audit for renewal."
          required: true
        - label: "I understand that my GitHub username is publicly linked to this audit request, and the final audit report does not reveal my GitHub identity unless I disclose it."
          required: true
        - label: "I understand that this submission is immutable – a correction creates a new entry but does not delete the original."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **After submission**: The Architect will review your request on the next Monday or Tuesday. You will receive confirmation of scope, timeline, and any additional requirements. Payment verification must be completed before work begins.

        **Data retention:** This record is retained permanently. You cannot delete it.

        **Contact:** `aionsystem@outlook.com` (for payment issues or questions). All audit reports are final.

        **Verification**: The audit badge and Trust Registry entry can be verified by checking the STP ledger entry ID printed on the report sleeve.
