name: "Dataset Declaration — Sovereign Trace Protocol"
description: "Seal the checksum and description of a dataset before training begins. Prevents after‑the‑fact claims about data provenance."
title: "[STP-DATASET] — [DATASET NAME] — [DATE]"
labels: ["dataset-declaration", "pending-seal"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Dataset Declaration – Sovereign Trace Protocol (FROZEN‑4.0)

        This form is for sealing the identity and checksum of a dataset before it is used for AI training or evaluation.

        When model behavior is later disputed, the sealed record proves exactly what data was authorized — independent of any training platform or data registry.

        **⚠️ CRITICAL WARNINGS – READ BEFORE PROCEEDING ⚠️**
        - The dataset checksum you provide is **public** and **permanent**.
        - Your GitHub username is **publicly linked** to this seal.
        - **Do not edit this issue after the workflow seals it** – the hash will change.
        - **This record is retained permanently** in the STP ledger and GitHub issue history.
        - Supporting files are **not** cryptographically bound unless you provide their SHA‑256 hashes.
        - A correction creates a new entry; the original remains.

        **Fields marked with `*` are required.**

  - type: input
    id: submitter_name
    attributes:
      label: "Your Name (Optional)"
      description: "If provided, becomes part of the permanent record. Leave blank for an anonymous seal."
      placeholder: "First Last or leave blank"
    validations:
      required: false

  - type: input
    id: dataset_name
    attributes:
      label: "Dataset Name or Identifier *"
      description: "The name or identifier for this dataset (e.g., Customer‑Support‑v2, PubMed‑Abstracts‑2025Q4)."
      placeholder: "e.g., Legal‑Contracts‑Corpus‑v1"
    validations:
      required: true

  - type: input
    id: checksum_algorithm
    attributes:
      label: "Checksum Algorithm *"
      description: "The algorithm used to generate the checksum (e.g., SHA‑256, MD5)."
      placeholder: "SHA‑256"
    validations:
      required: true

  - type: textarea
    id: dataset_checksum
    attributes:
      label: "Dataset Checksum *"
      description: "The full checksum hash of the dataset file(s). Paste the exact hash string. Keep under 10,000 characters."
      placeholder: "e.g., b9f2c11e6a3d..."
    validations:
      required: true

  - type: input
    id: dataset_date
    attributes:
      label: "Date of Dataset Finalization *"
      description: "The date this version of the dataset was finalized. Format: YYYY-MM-DD"
      placeholder: "2026-06-02"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Dataset Description *"
      description: "Brief description — source, scope, size, intended use, known limitations. Keep under 10,000 characters."
      placeholder: "Describe the dataset: source, size, scope, intended training/evaluation use, and any known limitations or exclusions."
    validations:
      required: true

  - type: textarea
    id: supporting_urls
    attributes:
      label: "Supporting Files URLs (Optional)"
      description: "One permanent URL per line (IPFS, GitHub gist, etc.). The stamp seals only the URLs, not the content. For cryptographic integrity, also provide SHA‑256 hashes below."
      placeholder: "https://ipfs.io/ipfs/Qm...\nhttps://gist.github.com/..."
    validations:
      required: false

  - type: textarea
    id: supporting_hashes
    attributes:
      label: "Supporting file SHA‑256 hashes (optional, recommended)"
      description: "One SHA‑256 hash per file, in the same order as the URLs. This cryptographically binds the seal to the exact file content."
      placeholder: "a3f9c12e7d... (64 hex chars)\nb4c8d3e2f1a..."
    validations:
      required: false

  - type: input
    id: correction_of
    attributes:
      label: "Correction / Resubmission of (optional)"
      description: "If this seal corrects a previous dataset declaration, provide the previous ledger entry ID or SHA‑256 hash."
      placeholder: "a3f9c12e7d... or #42"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration *"
      options:
        - label: "I affirm the checksum above is the exact cryptographic checksum of the dataset as described."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing. A correction creates a new entry but does not delete the original."
          required: true
        - label: "I understand that my GitHub username is publicly linked to this seal, and the dataset checksum is public."
          required: true
        - label: "If I provided supporting file URLs, I have also provided their SHA‑256 hashes to cryptographically bind the content."
          required: false
        - label: "I understand that this submission is permanent – a correction creates a new entry but does not delete the original."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **Data retention:** This record is retained permanently. You cannot delete it.

        **After submission**: The STP auto‑seal workflow will generate a triple‑time stamp and SHA‑256 hash. You will receive a comment with the seal and ledger entry ID. Do not edit the issue after sealing.

        **Contact:** `aionsystem@outlook.com` (for technical issues only). All seals are final.

        **Verification**: Every dataset declaration can be independently verified using the STP pip package: `sovereign-trace verify --entry-id <ID> --hash <SHA-256>`.
