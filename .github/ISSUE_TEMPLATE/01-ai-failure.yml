name: "AI Failure Submission — Sovereign Trace Protocol"
description: "Submit an AI output failure for permanent ledger entry. Read the legal declaration before proceeding."
title: "[STP-SUBMISSION] — [COMPANY NAME] — [DATE OF OUTPUT]"
labels: ["submission", "pending-verification"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## ⚠ LEGAL NOTICE — READ BEFORE PROCEEDING

        By completing and submitting this form you are entering into a legally binding declaration.

        - Your identity will be verified via the digital signature process described below
        - Your name will be permanently attached to this submission in the Sovereign Trace ledger
        - This record is immutable — it cannot be altered or deleted after sealing
        - Submitting false, fabricated, or materially misleading information exposes you to civil and criminal liability
        - Anonymous submissions are not accepted

        This is not a complaint form. This is a permanent epistemic record.
        The Sovereign Trace Protocol is the notary. You are the witness.

  - type: input
    id: submitter_name
    attributes:
      label: "Your Full Legal Name"
      description: "As it appears on government-issued ID. Becomes part of the permanent record."
      placeholder: "First Last"
    validations:
      required: true

  - type: input
    id: submitter_email
    attributes:
      label: "Your Email Address"
      description: "A DocuSign identity verification link will be sent here. Submission incomplete until verified."
      placeholder: "you@example.com"
    validations:
      required: true

  - type: input
    id: company_name
    attributes:
      label: "Company / Organization Name"
      description: "The company that produced or deployed the AI system in question."
      placeholder: "Full legal company name"
    validations:
      required: true

  - type: input
    id: ai_system
    attributes:
      label: "AI System Name and Version"
      description: "The specific AI system, product, or model that produced the output."
      placeholder: "e.g. GPT-4o via CompanyX API v2, March 2026"
    validations:
      required: true

  - type: input
    id: output_date
    attributes:
      label: "Date of AI Output"
      description: "The date the AI produced the output being submitted. Format: YYYY-MM-DD"
      placeholder: "2026-03-05"
    validations:
      required: true

  - type: textarea
    id: exact_output
    attributes:
      label: "Exact AI Output"
      description: "Copy the exact text. Do not paraphrase. If visual, describe precisely."
      placeholder: "Paste the exact output here."
    validations:
      required: true

  - type: textarea
    id: decision_context
    attributes:
      label: "Decision Context"
      description: "What decision was this AI output used to inform? What was at stake?"
      placeholder: "Describe the decision or action this output was used for."
    validations:
      required: true

  - type: textarea
    id: failure_description
    attributes:
      label: "Failure Description"
      description: "What is the specific failure? Hallucination, false confidence, harmful output, other."
      placeholder: "Describe the failure clearly and specifically."
    validations:
      required: true

  - type: textarea
    id: harm_or_risk
    attributes:
      label: "Harm Occurred or Risk Created"
      description: "What harm resulted or what risk was created? If no harm yet, describe the exposure."
      placeholder: "Describe actual or potential harm."
    validations:
      required: true

  - type: upload
    id: screenshots
    attributes:
      label: "Screenshots / Evidence Files"
      description: "Upload screenshots of the AI output, interface, or any supporting evidence."
    validations:
      required: false

  - type: textarea
    id: additional_links
    attributes:
      label: "Additional Evidence Links (Optional)"
      description: "Any external links supporting this submission."
      placeholder: "Links to supporting evidence."
    validations:
      required: false

  - type: checkboxes
    id: legal_declaration
    attributes:
      label: "Legal Declaration — Required"
      description: "You must affirm all of the following to submit."
      options:
        - label: "I affirm that the information in this submission is true and accurate to the best of my knowledge."
          required: true
        - label: "I understand that my full legal name will be permanently attached to this submission."
          required: true
        - label: "I understand that this submission is immutable — it cannot be altered or deleted after sealing."
          required: true
        - label: "I understand that submitting false or misleading information exposes me to civil and criminal liability."
          required: true
        - label: "I consent to identity verification via DocuSign before this submission is sealed."
          required: true
        - label: "I am not submitting anonymously. My identity is attached to this record."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Identity verification — DocuSign link sent to your email. Submission not accepted until complete.
        2. Completeness check — Reviewed for completeness. Truth verification is your responsibility.
        3. Sealing — Sealed with a FROZEN-2.0 triple-time cryptographic stamp. Permanent.
        4. Ledger entry — Enters the Sovereign Trace public ledger with your name, timestamp, and SHA-256 hash.
        5. Notification — You receive your ledger entry ID and SHA-256 hash.

        The Sovereign Trace Protocol is the notary. You are the witness.

        Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem2026@gmail.com
