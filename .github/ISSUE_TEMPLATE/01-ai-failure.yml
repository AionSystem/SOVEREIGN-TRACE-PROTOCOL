name: "AI Failure Submission — Sovereign Trace Protocol"
description: "Submit an AI output failure for permanent ledger entry. Read the legal declaration before proceeding."
title: "[STP-SUBMISSION] — [COMPANY NAME] — [DATE OF OUTPUT]"
labels: ["submission", "pending-identity-verification"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## ⚠ LEGAL NOTICE — READ BEFORE PROCEEDING

        By completing and submitting this form you are entering into a legally binding declaration.

        - Your identity will be verified via **DocuSign** (link sent after submission)
        - Your **verified legal name** will be permanently attached to this submission
        - This record is immutable — it cannot be altered or deleted after sealing
        - Submitting false, fabricated, or materially misleading information exposes you to civil and criminal liability
        - **Retractions are possible** via a separate `11-retraction-request.yml` template
        - **Data retention:** Evidence files are kept for 7 years, then deleted unless under legal hold

        The Sovereign Trace Protocol is the notary. You are the witness.

  - type: input
    id: submitter_legal_name
    attributes:
      label: "Your Legal Name (as on ID)"
      description: "Must match the name verified via DocuSign. Mismatch will cause rejection."
      placeholder: "First Middle Last"
    validations:
      required: true

  - type: input
    id: submitter_email
    attributes:
      label: "Your Email Address"
      description: "A DocuSign identity verification link will be sent here. Submission incomplete until verified."
      placeholder: "you@example.com"
    validations:
      required: true

  - type: input
    id: company_name
    attributes:
      label: "Company / Organization Name"
      description: "The company that produced or deployed the AI system. Misrepresentation may be treated as fraud."
      placeholder: "Full legal company name"
    validations:
      required: true

  - type: input
    id: company_duns
    attributes:
      label: "Company DUNS Number (optional, recommended)"
      description: "Helps verify company identity for enterprise submissions."
      placeholder: "00-000-0000"
    validations:
      required: false

  - type: input
    id: ai_system
    attributes:
      label: "AI System Name and Version"
      description: "The specific AI system, product, or model that produced the output."
      placeholder: "e.g. GPT-4o via CompanyX API v2, March 2026"
    validations:
      required: true

  - type: input
    id: output_date
    attributes:
      label: "Date of AI Output"
      description: "YYYY-MM-DD"
      placeholder: "2026-03-05"
    validations:
      required: true

  - type: textarea
    id: exact_output
    attributes:
      label: "Exact AI Output"
      description: "Copy the exact text. Max 10,000 characters."
      placeholder: "Paste the exact output here."
      maxlength: 10000
    validations:
      required: true

  - type: textarea
    id: decision_context
    attributes:
      label: "Decision Context"
      description: "What decision was this AI output used to inform? Max 5,000 characters."
      placeholder: "Describe the decision or action this output was used for."
      maxlength: 5000
    validations:
      required: true

  - type: textarea
    id: failure_description
    attributes:
      label: "Failure Description"
      description: "Hallucination, false confidence, harmful output, other. Max 5,000 characters."
      placeholder: "Describe the failure clearly and specifically."
      maxlength: 5000
    validations:
      required: true

  - type: dropdown
    id: failure_severity
    attributes:
      label: "Failure Severity"
      description: "Estimate the impact."
      options:
        - "CRITICAL — caused serious harm or major financial loss"
        - "HIGH — significant risk or moderate harm"
        - "MEDIUM — notable issue but contained"
        - "LOW — minor or no material impact"
    validations:
      required: true

  - type: textarea
    id: harm_or_risk
    attributes:
      label: "Harm Occurred or Risk Created"
      description: "What harm resulted or what risk was created? If no harm yet, describe the exposure. Max 5,000 characters."
      placeholder: "Describe actual or potential harm."
      maxlength: 5000
    validations:
      required: true

  - type: input
    id: evidence_urls
    attributes:
      label: "Evidence URLs (screenshots, logs, etc.)"
      description: "Upload files to a service (e.g., Imgur, GitHub release) and paste the links here. Do not upload directly."
      placeholder: "https://example.com/evidence.png"
    validations:
      required: false

  - type: textarea
    id: additional_links
    attributes:
      label: "Additional Evidence Links (Optional)"
      placeholder: "Links to supporting evidence."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Privacy & Retention

        - Personal data (name, email) processed per the Privacy Policy (see repo).
        - Evidence URLs are stored permanently with the issue.
        - You may request deletion of personal data after 7 years by contacting the Architect.

  - type: checkboxes
    id: legal_declaration
    attributes:
      label: "Legal Declaration — Required"
      description: "You must affirm all of the following to submit."
      options:
        - label: "I affirm that the information in this submission is true and accurate to the best of my knowledge."
          required: true
        - label: "I understand that my verified legal name will be permanently attached to this submission."
          required: true
        - label: "I understand that this submission is immutable — it cannot be altered or deleted after sealing."
          required: true
        - label: "I understand that submitting false or misleading information exposes me to civil and criminal liability."
          required: true
        - label: "I consent to identity verification via DocuSign before this submission is sealed."
          required: true
        - label: "I consent to the processing of my personal data as described in the Privacy Policy."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Identity verification — DocuSign link sent to your email. Submission not accepted until complete.
        2. Name cross‑check — The legal name from DocuSign must match the `submitter_legal_name` field.
        3. Completeness check — Reviewed for completeness. Truth verification is your responsibility.
        4. Sealing — Sealed with a **FROZEN-4.0** triple‑time cryptographic stamp. Permanent.
        5. Ledger entry — Enters the Sovereign Trace public ledger with your name, timestamp, and SHA‑256 hash.
        6. Retraction — If an error is found, file a separate `retraction-request.yml` to attach a correction note.

        The Sovereign Trace Protocol is the notary. You are the witness.

        *Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem@outlook.com*
