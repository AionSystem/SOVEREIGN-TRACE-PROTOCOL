name: "Clinical Record Seal — Sovereign Trace Protocol"
description: "Seal a clinical incident report, trial data declaration, or institutional record before review begins."
title: "[STP-CLINICAL] — [INSTITUTION] — [DATE]"
labels: ["clinical-record", "pending-seal"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## Clinical Record Seal

        ⚠ **HIPAA / PRIVACY NOTICE**

        Do not include patient names, dates of birth, Social Security numbers, addresses,
        or any other protected health information (PHI) in this submission.

        Seal the institutional record — not patient data. Describe events by type, context, and significance only.

        This seal proves the record existed in this exact form before any review, remediation, or external pressure.

  - type: input
    id: submitter-name
    attributes:
      label: "Submitter Name or Role"
      description: "Your name or role. Include institution name if submitting on behalf of an organization."
      placeholder: "Dr. First Last — Institution Name"
    validations:
      required: true

  - type: input
    id: institution
    attributes:
      label: "Institution or Organization"
      description: "The institution this record belongs to."
      placeholder: "Full institutional name"
    validations:
      required: true

  - type: input
    id: record-type
    attributes:
      label: "Record Type"
      description: "What kind of record is being sealed?"
      placeholder: "Incident Report / Trial Data / Protocol Version / Adverse Event / Audit Finding"
    validations:
      required: true

  - type: input
    id: record-date
    attributes:
      label: "Date of Record Creation"
      description: "YYYY-MM-DD"
      placeholder: "2026-03-07"
    validations:
      required: true

  - type: textarea
    id: record-description
    attributes:
      label: "Record Description"
      description: "Describe the record — no PHI. Use de-identified descriptions: event type, department, context, significance. **Keep under 10,000 characters.**"
      placeholder: "Describe the record without any protected health information."
    validations:
      required: true

  - type: input
    id: pre-review-status
    attributes:
      label: "Status at Time of Sealing"
      description: "What is the status right now? Before review, before remediation, before audit."
      placeholder: "Pre-review / Pre-remediation / Pre-audit / Pre-submission"
    validations:
      required: true

  - type: input
    id: regulatory-context
    attributes:
      label: "Regulatory Framework (Optional)"
      description: "What regulatory framework applies to this record?"
      placeholder: "FDA 21 CFR Part 11 / IRB Protocol / CMS / HIPAA / Other"
    validations:
      required: false

  - type: input
    id: supporting-urls
    attributes:
      label: "Supporting File URLs (Optional)"
      description: "Upload de-identified supporting documents to a service (e.g., Google Drive, GitHub release) and paste the links here. No PHI permitted. Do not upload directly."
      placeholder: "https://example.com/deidentified-doc.pdf"
    validations:
      required: false

  - type: input
    id: file-hash
    attributes:
      label: "File SHA-256 Hash (Optional, Recommended)"
      description: "If you host supporting files externally, provide their SHA‑256 hashes to cryptographically bind the seal to the exact files."
      placeholder: "64-character hex string"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration — Required"
      options:
        - label: "I affirm this submission contains no protected health information (PHI) as defined by HIPAA."
          required: true
        - label: "I affirm this record accurately represents the institutional state at the time of sealing."
          required: true
        - label: "I am authorized to submit this record on behalf of my institution."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing."
          required: true
        - label: "I understand the protocol provides a tamper-evident timestamp — not legal or regulatory advice."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. PHI check — Reviewed for any inadvertent PHI before sealing.
        2. Completeness check — Reviewed for completeness.
        3. Sealing — Sealed with a **FROZEN-4.0** triple‑time cryptographic stamp. Permanent.
        4. Ledger entry — Enters the Sovereign Trace ledger with institution name, timestamp, and SHA‑256 hash.
        5. Notification — You receive your ledger entry ID and SHA‑256 hash.

        The seal is permanent. The seal is the pre-review record.

        *Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem@outlook.com*
