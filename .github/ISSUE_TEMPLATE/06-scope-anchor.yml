name: "Scope Anchor Seal — Sovereign Trace Protocol"
description: "Seal an agreed scope, negotiated position, or decision before work begins. Tamper-evident anchor against disputed terms."
title: "[STP-SCOPE] — [PARTIES] — [DATE]"
labels: ["scope-anchor", "pending-seal"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ## Scope Anchor Seal

        This form seals an agreed position, scope, or decision at the exact moment of submission.

        Use this when a project scope has been agreed, a negotiation has reached a position you need to anchor,
        or terms have been discussed verbally and you need a written sealed record before a formal contract is signed.

        **This is not a legal contract.** It is a tamper-evident record of your position at a specific moment.
        This seal complements legal documentation — it does not replace it.

  - type: input
    id: submitter_name
    attributes:
      label: "Your Full Name"
      description: "The name attached to this sealed record."
      placeholder: "First Last"
    validations:
      required: true

  - type: input
    id: other_party
    attributes:
      label: "Other Party or Parties"
      description: "Who is the other party? Company name, individual, or role."
      placeholder: "Acme Corp / Client: First Last / Employer: Company Name"
    validations:
      required: true

  - type: input
    id: agreement_type
    attributes:
      label: "Agreement Type"
      description: "What kind of scope or agreement is being sealed?"
      placeholder: "Project Scope / Contract Terms / Salary Negotiation / Settlement / Business Terms"
    validations:
      required: true

  - type: input
    id: agreement_date
    attributes:
      label: "Date of Agreement or Position"
      description: "The date this scope was agreed or position was reached. Format: YYYY-MM-DD"
      placeholder: "2026-03-07"
    validations:
      required: true

  - type: textarea
    id: scope_or_terms
    attributes:
      label: "Agreed Scope or Position — Exact"
      description: "State exactly what was agreed. Include deliverables, timelines, compensation, exclusions."
      placeholder: "State the agreed scope, terms, or position precisely. Include all material details."
    validations:
      required: true

  - type: textarea
    id: what_is_excluded
    attributes:
      label: "What Is Explicitly Excluded (Optional but Recommended)"
      description: "What is NOT included? Explicit exclusions prevent the most common form of scope creep."
      placeholder: "List what is explicitly outside this scope."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "How was this agreement reached? Verbal conversation, email exchange, meeting?"
      placeholder: "Describe the context in which this agreement was reached."
    validations:
      required: true

  - type: upload
    id: supporting_files
    attributes:
      label: "Supporting Files (Optional)"
      description: "Upload screenshots of email chains, message threads, or documents supporting this agreement."
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration"
      options:
        - label: "I affirm this record accurately represents my understanding of the agreed scope or position at the time of sealing."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing."
          required: true
        - label: "I understand the Sovereign Trace Protocol is not a legal contract and does not constitute legal advice."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Completeness check — Reviewed for completeness.
        2. Sealing — Sealed with a FROZEN-2.0 triple-time cryptographic stamp. Permanent.
        3. Ledger entry — Enters the Sovereign Trace ledger with your name, timestamp, and SHA-256 hash.
        4. Notification — You receive your ledger entry ID and SHA-256 hash.

        Share the ledger entry ID with the other party if appropriate.
        The seal is permanent. The seal is the anchor.

        Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem2026@gmail.com
