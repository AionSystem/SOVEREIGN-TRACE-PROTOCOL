name: "Scope Anchor Seal — Sovereign Trace Protocol"
description: "Seal an agreed scope, negotiated position, or decision before work begins. Tamper-evident anchor against disputed terms."
title: "[STP-SCOPE] — [PARTIES] — [DATE]"
labels: ["scope-anchor", "pending-seal"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Scope Anchor Seal – Sovereign Trace Protocol (FROZEN‑4.0)

        This form seals an agreed position, scope, or decision at the exact moment of submission.

        Use this when a project scope has been agreed, a negotiation has reached a position you need to anchor,
        or terms have been discussed verbally and you need a written sealed record before a formal contract is signed.

        **⚠️ CRITICAL WARNINGS – READ BEFORE PROCEEDING ⚠️**
        - **This is not a legal contract.** It is a tamper-evident record of **your** understanding at a specific moment.
        - **This seal is unilateral** – it reflects your understanding. The other party may not have agreed or may dispute your record.
        - **Your GitHub username is publicly linked to this seal.** If you require privacy, use a separate account.
        - **Sealing a scope that misrepresents the other party's position may have legal consequences.** Be accurate.
        - **If you provide supporting file URLs without SHA‑256 hashes, the seal does NOT bind the file content.**
        - This record is **immutable**. A correction creates a new entry; the original remains.

        This seal complements legal documentation — it does not replace it.

        **Fields marked with `*` are required.**

  - type: input
    id: submitter-name
    attributes:
      label: "Your Full Name *"
      description: "The name attached to this sealed record."
      placeholder: "First Last"
    validations:
      required: true

  - type: input
    id: other-party
    attributes:
      label: "Other Party or Parties *"
      description: "Who is the other party? Company name, individual, or role."
      placeholder: "Acme Corp / Client: First Last / Employer: Company Name"
    validations:
      required: true

  - type: input
    id: counterparty-representative
    attributes:
      label: "Counterparty Representative (Optional)"
      description: "Name or role of the person you dealt with, for reference."
      placeholder: "Jane Doe, Procurement Manager"
    validations:
      required: false

  - type: dropdown
    id: agreement-type
    attributes:
      label: "Agreement Type *"
      options:
        - "Project Scope"
        - "Contract Terms"
        - "Salary Negotiation"
        - "Settlement"
        - "Business Terms"
        - "Other"
      default: 0
    validations:
      required: true

  - type: input
    id: agreement-date
    attributes:
      label: "Date of Agreement or Position *"
      description: "YYYY-MM-DD"
      placeholder: "2026-03-07"
    validations:
      required: true

  - type: input
    id: valid-until
    attributes:
      label: "Valid Until (Optional)"
      description: "If this scope anchor has an expiration date (e.g., offer validity), enter it here. YYYY-MM-DD"
      placeholder: "2026-06-07"
    validations:
      required: false

  - type: textarea
    id: scope-or-terms
    attributes:
      label: "Agreed Scope or Position — Exact *"
      description: "State exactly what was agreed. Include deliverables, timelines, compensation, exclusions. Keep under 10,000 characters."
      placeholder: "State the agreed scope, terms, or position precisely. Include all material details."
    validations:
      required: true

  - type: textarea
    id: what-is-excluded
    attributes:
      label: "What Is Explicitly Excluded (Recommended)"
      description: "What is NOT included? Explicit exclusions prevent the most common form of scope creep. Keep under 5,000 characters."
      placeholder: "List what is explicitly outside this scope."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Context *"
      description: "How was this agreement reached? Verbal conversation, email exchange, meeting? Keep under 5,000 characters."
      placeholder: "Describe the context in which this agreement was reached."
    validations:
      required: true

  - type: textarea
    id: supporting-urls
    attributes:
      label: "Supporting File URLs (Optional)"
      description: "Permanent URLs to screenshots, email chains, or documents (IPFS, GitHub gist). One URL per line. If you provide a URL, you must also provide its SHA‑256 hash below."
      placeholder: "https://ipfs.io/ipfs/Qm...\nhttps://gist.github.com/..."
    validations:
      required: false

  - type: textarea
    id: file-hashes
    attributes:
      label: "File SHA‑256 Hashes (Required if URLs provided)"
      description: "One SHA‑256 hash per file, in the same order as the URLs. This cryptographically binds the seal to the exact file content."
      placeholder: "a3f9c12e7d... (64 hex chars)\nb4c8d3e2f1a..."
    validations:
      required: false

  - type: input
    id: correction-of
    attributes:
      label: "Correction / Retraction of (Optional)"
      description: "If this anchor corrects a previous scope seal, provide the previous ledger entry ID or SHA‑256 hash."
      placeholder: "a3f9c12e7d... or STP‑SCOPE‑xxxx"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Declaration *"
      options:
        - label: "I affirm this record accurately represents my understanding of the agreed scope or position at the time of sealing."
          required: true
        - label: "I understand this submission is immutable — it cannot be altered after sealing. A correction creates a new entry but does not delete the original."
          required: true
        - label: "I understand the Sovereign Trace Protocol is not a legal contract and does not constitute legal advice. This record reflects my understanding only."
          required: true
        - label: "I have not knowingly misrepresented the other party's position. I understand that doing so may have legal consequences."
          required: true
        - label: "I understand that my GitHub username is publicly linked to this seal."
          required: true
        - label: "If I provided supporting file URLs, I have also provided their SHA‑256 hashes to cryptographically bind the content."
          required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## What Happens Next

        1. Completeness check — Reviewed for completeness.
        2. Sealing — Sealed with a **FROZEN-4.0** triple‑time cryptographic stamp. Permanent.
        3. Ledger entry — Enters the Sovereign Trace ledger with your name, timestamp, and SHA‑256 hash.
        4. Notification — You receive your ledger entry ID and SHA‑256 hash.

        **Data retention:** Sealed records are retained permanently.

        Share the ledger entry ID with the other party if appropriate. The seal is permanent. The seal is the anchor.

        *Sovereign Trace Protocol | Sheldon K. Salmon | aionsystem@outlook.com*
