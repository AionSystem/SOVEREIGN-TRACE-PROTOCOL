<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 690 1010" width="690" height="1010" role="img">
  <title>AionSystem Sovereign AI Constitution Seal — Deluxe Sleeve</title>
  <desc>Personal constitution seal sleeve issued by AionSystem. Carries SACS badge, identity block, lifetime validity, and trust registry verification.</desc>

  <defs>
    <!-- Copper/bronze/gold gradients -->
    <linearGradient id="bgDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A140E"/>
      <stop offset="35%" stop-color="#120C08"/>
      <stop offset="65%" stop-color="#1A120C"/>
      <stop offset="100%" stop-color="#0A0604"/>
    </linearGradient>
    <linearGradient id="borderRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD7F32"/>
      <stop offset="20%" stop-color="#D4AF37"/>
      <stop offset="40%" stop-color="#F5E08A"/>
      <stop offset="60%" stop-color="#B87333"/>
      <stop offset="80%" stop-color="#CD7F32"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="innerBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#F5E08A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#CD7F32" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ribbonGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a3e00"/>
      <stop offset="15%" stop-color="#9a7000"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E08A"/>
      <stop offset="65%" stop-color="#D4AF37"/>
      <stop offset="85%" stop-color="#9a7000"/>
      <stop offset="100%" stop-color="#5a3e00"/>
    </linearGradient>
    <linearGradient id="verifyBarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0c08"/>
      <stop offset="100%" stop-color="#080604"/>
    </linearGradient>
    <linearGradient id="holoFoil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="30%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#CD7F32" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="75%" stop-color="#F5E08A" stop-opacity="0.04"/>
      <stop offset="90%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="aiCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001F2E"/>
      <stop offset="30%" stop-color="#00B4D8"/>
      <stop offset="50%" stop-color="#48CAE4"/>
      <stop offset="70%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#001F2E"/>
    </linearGradient>
    <linearGradient id="crimson" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B0000"/>
      <stop offset="50%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#6B0000"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.07"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="depthField" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="gemCenter" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="cyanGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="aionMark" width="272" height="272" patternUnits="userSpaceOnUse" patternTransform="rotate(-28)">
      <text x="0" y="40" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#CD7F32" opacity="0.05" letter-spacing="4">AI/ON</text>
    </pattern>
    <pattern id="hexMesh" width="38" height="33" patternUnits="userSpaceOnUse">
      <polygon points="19,1 37,9 37,23 19,31 1,23 1,9" fill="none" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.05"/>
    </pattern>
    <pattern id="matrix" width="32" height="32" patternUnits="userSpaceOnUse">
      <text x="2" y="16" font-family="'Courier New',monospace" font-size="10" fill="#D4AF37" opacity="0.035">0</text>
      <text x="12" y="26" font-family="'Courier New',monospace" font-size="8" fill="#D4AF37" opacity="0.025">1</text>
      <text x="22" y="10" font-family="'Courier New',monospace" font-size="11" fill="#D4AF37" opacity="0.03">;</text>
    </pattern>
    <clipPath id="cardClip"><rect x="0" y="0" width="690" height="1010" rx="32"/></clipPath>
  </defs>

  <rect x="4" y="8" width="682" height="994" rx="32" fill="#000" fill-opacity="0.55"/>
  <rect width="690" height="1010" rx="32" fill="url(#bgDeep)"/>
  <rect width="690" height="1010" rx="32" fill="url(#aionMark)" clip-path="url(#cardClip)"/>
  <rect width="690" height="1010" rx="32" fill="url(#hexMesh)" clip-path="url(#cardClip)"/>
  <rect width="690" height="1010" rx="32" fill="url(#matrix)" clip-path="url(#cardClip)"/>
  <rect width="690" height="1010" rx="32" fill="url(#holoFoil)" clip-path="url(#cardClip)" opacity="0.32"/>

  <!-- Borders -->
  <rect x="2.5" y="2.5" width="685" height="1005" rx="31" fill="none" stroke="url(#borderRainbow)" stroke-width="3"/>
  <rect x="9" y="9" width="672" height="992" rx="27" fill="none" stroke="url(#innerBorder)" stroke-width="1"/>
  <rect x="15" y="15" width="660" height="980" rx="23" fill="none" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.12"/>

  <!-- Ribbons -->
  <rect x="0" y="50" width="690" height="30" fill="url(#ribbonGold)" opacity="0.97"/>
  <text x="345" y="71" font-family="'Georgia',serif" font-size="14" font-weight="bold" letter-spacing="5" fill="#0a0a14" text-anchor="middle">PERSONAL CONSTITUTION SEAL</text>
  <rect x="0" y="80" width="690" height="22" fill="#0A0604" opacity="0.92"/>
  <text x="345" y="96" font-family="'Georgia',serif" font-size="11" font-weight="bold" letter-spacing="4" fill="#D4AF37" text-anchor="middle">SOVEREIGN AI CONSTITUTION SEAL — PERSONAL TRACK</text>

  <!-- Corner marks -->
  <path d="M30,30 L30,68 M30,30 L68,30" fill="none" stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.5"/>
  <path d="M660,30 L660,68 M660,30 L622,30" fill="none" stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.5"/>
  <path d="M30,980 L30,942 M30,980 L68,980" fill="none" stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.5"/>
  <path d="M660,980 L660,942 M660,980 L622,980" fill="none" stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.5"/>

  <!-- Gem center overlay -->
  <rect width="690" height="1010" rx="32" fill="url(#gemCenter)" clip-path="url(#cardClip)" opacity="0.35"/>

  <!-- Badge zone frame -->
  <rect x="20" y="108" width="650" height="284" rx="16" fill="none" stroke="url(#borderRainbow)" stroke-width="1.8" stroke-opacity="0.3"/>
  <rect x="28" y="116" width="634" height="268" rx="12" fill="none" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- SACS Badge -->
  <rect x="44" y="120" width="270" height="264" rx="8" fill="#0A0604" fill-opacity="0.2"/>
  <image x="50" y="124" width="258" height="256" href="{{SACS_BADGE_URL}}"/>

  <!-- Identity block -->
  <text x="370" y="142" font-family="'Courier New',monospace" font-size="7.5" fill="#D4AF37" opacity="0.7" letter-spacing="3">CONSTITUTION v2.1</text>
  <line x1="370" y1="146" x2="640" y2="146" stroke="#D4AF37" stroke-width="0.4" opacity="0.25"/>

  <text x="370" y="168" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#F5E08A" letter-spacing="1.5">{{REGISTRY_ID}}</text>
  <text x="370" y="186" font-family="'Courier New',monospace" font-size="9" fill="#D4AF37" letter-spacing="2">PERSONAL SEAL</text>

  <line x1="370" y1="195" x2="640" y2="195" stroke="url(#aiCyan)" stroke-width="0.8" opacity="0.5"/>

  <text x="370" y="228" font-family="'Georgia',serif" font-size="22" font-weight="bold" font-style="italic" fill="#E8D5A3" letter-spacing="0.5">{{PERSONAL_NAME}}</text>
  <text x="370" y="248" font-family="'Courier New',monospace" font-size="8.5" fill="#8B6914" letter-spacing="2.5">{{AI_SYSTEM_NAME}}</text>

  <rect x="370" y="275" width="258" height="2.5" fill="url(#crimson)" opacity="0.55"/>

  <!-- AI node network -->
  <rect x="370" y="277" width="258" height="16" fill="#03080F" fill-opacity="0.6"/>
  <circle cx="390" cy="285" r="1.5" fill="#D4AF37" opacity="0.5"/>
  <circle cx="415" cy="281" r="1" fill="#D4AF37" opacity="0.3"/>
  <circle cx="445" cy="287" r="1.3" fill="#D4AF37" opacity="0.4"/>
  <circle cx="500" cy="283" r="2" fill="#D4AF37" opacity="0.65" filter="url(#cyanGlow)"/>
  <circle cx="555" cy="287" r="1.3" fill="#D4AF37" opacity="0.4"/>
  <circle cx="585" cy="281" r="1" fill="#D4AF37" opacity="0.3"/>
  <circle cx="610" cy="285" r="1.5" fill="#D4AF37" opacity="0.5"/>
  <line x1="390" y1="285" x2="415" y2="281" stroke="#D4AF37" stroke-width="0.4" opacity="0.2"/>
  <line x1="415" y1="281" x2="445" y2="287" stroke="#D4AF37" stroke-width="0.4" opacity="0.2"/>
  <line x1="445" y1="287" x2="500" y2="283" stroke="#D4AF37" stroke-width="0.4" opacity="0.25"/>
  <line x1="500" y1="283" x2="555" y2="287" stroke="#D4AF37" stroke-width="0.4" opacity="0.25"/>
  <line x1="555" y1="287" x2="585" y2="281" stroke="#D4AF37" stroke-width="0.4" opacity="0.2"/>
  <line x1="585" y1="281" x2="610" y2="285" stroke="#D4AF37" stroke-width="0.4" opacity="0.2"/>
  <rect x="370" y="293" width="258" height="0.8" fill="url(#aiCyan)" opacity="0.35"/>

  <text x="370" y="314" font-family="'Courier New',monospace" font-size="8" fill="#D4AF37" opacity="0.6" letter-spacing="2">AIONSYSTEM · SOVEREIGN AI CONSTITUTION SEAL</text>

  <line x1="370" y1="322" x2="638" y2="322" stroke="#D4AF37" stroke-width="0.4" opacity="0.3"/>
  <text x="370" y="336" font-family="'Courier New',monospace" font-size="7.5" fill="#8B6914" letter-spacing="1">ISSUED (LIFETIME)</text>
  <text x="370" y="349" font-family="'Courier New',monospace" font-size="10" font-weight="bold" fill="#D4AF37">{{ISSUE_DATE}}</text>

  <rect x="370" y="357" width="258" height="18" fill="#03080F" fill-opacity="0.7"/>
  <rect x="370" y="357" width="258" height="1" fill="url(#aiCyan)" opacity="0.7"/>
  <text x="500" y="370" font-family="'Courier New',monospace" font-size="7.5" fill="#48CAE4" text-anchor="middle" letter-spacing="1.5">SHA-256 · STP SEALED · CONSTITUTION v2.1</text>
  <rect x="370" y="374" width="258" height="0.8" fill="url(#aiCyan)" opacity="0.4"/>

  <!-- Verification panel -->
  <rect x="50" y="428" width="590" height="380" rx="19" fill="url(#verifyBarBg)" stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.55"/>
  <rect x="50" y="428" width="590" height="380" rx="19" fill="url(#engrave)"/>
  <rect x="50" y="428" width="590" height="40" rx="19" fill="#D4AF37" fill-opacity="0.13"/>
  <text x="345" y="454" font-family="'Courier New',monospace" font-size="13" fill="#D4AF37" font-weight="bold" text-anchor="middle" letter-spacing="3">VERIFIED CONSTITUTION SEAL</text>

  <text x="345" y="493" font-family="'Courier New',monospace" font-size="11.5" text-anchor="middle">
    <tspan fill="#DAA520">◈ </tspan>
    <tspan fill="#D4AF37">Holder: {{PERSONAL_NAME}}</tspan>
  </text>

  <circle cx="77" cy="591" r="3.5" fill="#D4AF37" opacity="0.7"/>
  <text x="90" y="595" font-family="'Courier New',monospace" font-size="11.5" fill="#888">Registry ID</text>
  <text x="175" y="595" font-family="'Courier New',monospace" font-size="11.5" fill="#F5E08A" font-weight="bold">{{REGISTRY_ID}}</text>

  <circle cx="77" cy="617" r="3.5" fill="#a855f7" opacity="0.7"/>
  <text x="90" y="621" font-family="'Courier New',monospace" font-size="11.5" fill="#888">SHA-256</text>
  <text x="175" y="621" font-family="'Courier New',monospace" font-size="11" fill="#48CAE4">{{SHA256_FIRST16}}…</text>

  <circle cx="77" cy="643" r="3.5" fill="#f0a500" opacity="0.7"/>
  <text x="90" y="647" font-family="'Courier New',monospace" font-size="11.5" fill="#888">Verify</text>
  <text x="175" y="647" font-family="'Courier New',monospace" font-size="11.5" fill="#48CAE4">{{VERIFY_URL}}</text>

  <line x1="76" y1="661" x2="614" y2="661" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>

  <text x="345" y="696" font-family="'Georgia',serif" font-size="20" font-weight="bold" font-style="italic" fill="#F5E08A" text-anchor="middle" letter-spacing="1.2">{{PERSONAL_NAME}}</text>
  <text x="345" y="711" font-family="'Courier New',monospace" font-size="8.5" fill="#D4AF37" opacity="0.5" text-anchor="middle" letter-spacing="3">AI RELIABILITY ARCHITECT · AIONSYSTEM</text>

  <line x1="76" y1="723" x2="614" y2="723" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.22"/>
  <text x="345" y="737" font-family="'Courier New',monospace" font-size="9" fill="#888" text-anchor="middle" letter-spacing="1.5">ISSUED (LIFETIME)</text>
  <text x="345" y="751" font-family="'Courier New',monospace" font-size="10" fill="#DAA520" text-anchor="middle">{{ISSUE_DATE}}</text>

  <!-- Validity bar -->
  <rect x="50" y="802" width="590" height="72" rx="10" fill="#060610" fill-opacity="0.7" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4"/>
  <text x="76" y="826" font-family="'Courier New',monospace" font-size="7.5" fill="#D4AF37" opacity="0.5" letter-spacing="2">CONSTITUTION v2.1</text>
  <text x="76" y="843" font-family="'Courier New',monospace" font-size="11" fill="#F5E08A" font-weight="bold" letter-spacing="1">SOVEREIGN AI CONSTITUTION SEAL</text>
  <text x="76" y="856" font-family="'Courier New',monospace" font-size="7.5" fill="#555" letter-spacing="1">LIFETIME — SYSTEM VERSION BOUND</text>
  <line x1="340" y1="820" x2="340" y2="876" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="356" y="826" font-family="'Courier New',monospace" font-size="7.5" fill="#D4AF37" opacity="0.5" letter-spacing="2">TRUST REGISTRY</text>
  <text x="356" y="843" font-family="'Courier New',monospace" font-size="11" fill="#F5E08A" font-weight="bold" letter-spacing="1">{{REGISTRY_ID}}</text>
  <text x="356" y="856" font-family="'Courier New',monospace" font-size="7.5" fill="#555" letter-spacing="1">STP SEALED · VERIFIABLE</text>

  <!-- QR block -->
  <rect x="556" y="884" width="74" height="74" rx="9" fill="#060610" stroke="url(#borderRainbow)" stroke-width="1.8"/>
  <image x="562" y="890" width="62" height="62" href="{{QR_CODE_URL}}"/>
  <text x="593" y="970" font-family="'Courier New',monospace" font-size="7.5" fill="#555" text-anchor="middle" letter-spacing="1.5">SCAN</text>

  <!-- Micro‑text -->
  <text x="-120" y="985" font-family="'Courier New',monospace" font-size="5.5" fill="#D4AF37" opacity="0.18" letter-spacing="1.8">AIONSYSTEM · SOVEREIGN AI CONSTITUTION SEAL · PERSONAL TRACK · NON-TRANSFERABLE · SHA-256 · STP SEALED</text>
  <text x="-120" y="995" font-family="'Courier New',monospace" font-size="5.5" fill="#48CAE4" opacity="0.11" letter-spacing="1.8">AIONSYSTEM · SOVEREIGN AI CONSTITUTION SEAL · PERSONAL TRACK · NON-TRANSFERABLE · SHA-256 · STP SEALED</text>

  <rect width="690" height="1010" rx="32" fill="url(#depthField)" clip-path="url(#cardClip)" pointer-events="none"/>
  <rect width="690" height="1010" rx="32" fill="url(#gloss)" clip-path="url(#cardClip)" pointer-events="none"/>
</svg>
