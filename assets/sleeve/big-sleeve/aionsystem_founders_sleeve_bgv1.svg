<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 680 1000" width="680" height="1000">
  <!--
    FOUNDER'S SOVEREIGN SEAL — v2 (bgv1)
    Pitch black · Tricolour ribbon · Matrix watermark
    Only for audits bearing STP‑AUDITOR‑0001
  -->
  <defs>
    <!-- Pitch black background (darker than before) -->
    <linearGradient id="bgDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020203"/>
      <stop offset="35%" stop-color="#050508"/>
      <stop offset="65%" stop-color="#020203"/>
      <stop offset="100%" stop-color="#010101"/>
    </linearGradient>

    <!-- Tricolour outer border (gold/silver/bronze layered) -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="30%" stop-color="#F5E08A"/>
      <stop offset="60%" stop-color="#C5A028"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="silverBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="30%" stop-color="#E8E8E8"/>
      <stop offset="60%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="bronzeBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD7F32"/>
      <stop offset="30%" stop-color="#E8A96A"/>
      <stop offset="60%" stop-color="#B5692A"/>
      <stop offset="100%" stop-color="#7A4010"/>
    </linearGradient>

    <linearGradient id="innerBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#F5E08A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Ribbons (tricolour inspired) -->
    <linearGradient id="ribbonGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="20%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E08A"/>
      <stop offset="80%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="ribbonBlack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="20%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#333333"/>
      <stop offset="80%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Pattern overlays (matrix, hex mesh, AI/ON watermark) – all with higher opacity -->
    <pattern id="matrix" width="32" height="32" patternUnits="userSpaceOnUse">
      <text x="2" y="16" font-family="'Courier New',monospace" font-size="10" fill="#D4AF37" opacity="0.16">0</text>
      <text x="12" y="26" font-family="'Courier New',monospace" font-size="8" fill="#D4AF37" opacity="0.12">1</text>
      <text x="22" y="10" font-family="'Courier New',monospace" font-size="11" fill="#D4AF37" opacity="0.14">;</text>
    </pattern>
    <pattern id="hexMesh" width="38" height="33" patternUnits="userSpaceOnUse">
      <polygon points="19,1 37,9 37,23 19,31 1,23 1,9" fill="none" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.12"/>
    </pattern>
    <pattern id="aionMark" width="272" height="272" patternUnits="userSpaceOnUse" patternTransform="rotate(-28)">
      <text x="0" y="40" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.14" letter-spacing="4">AI/ON</text>
      <text x="136" y="176" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.14" letter-spacing="4">AI/ON</text>
      <text x="68" y="272" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.10" letter-spacing="4">AI/ON</text>
    </pattern>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="680" height="1000" rx="32"/>
    </clipPath>
  </defs>

  <!-- Base pitch black -->
  <rect width="680" height="1000" rx="32" fill="url(#bgDeep)"/>

  <!-- Watermark layers (double brightness) -->
  <rect width="680" height="1000" rx="32" fill="url(#aionMark)" clip-path="url(#cardClip)"/>
  <rect width="680" height="1000" rx="32" fill="url(#hexMesh)" clip-path="url(#cardClip)"/>
  <rect width="680" height="1000" rx="32" fill="url(#matrix)" clip-path="url(#cardClip)"/>

  <!-- Tricolour ribbon border (layered) -->
  <!-- Gold outer -->
  <rect x="2.5" y="2.5" width="675" height="995" rx="31" fill="none" stroke="url(#goldBorder)" stroke-width="6"/>
  <!-- Gap (black) -->
  <rect x="2.5" y="2.5" width="675" height="995" rx="31" fill="none" stroke="#000000" stroke-width="4.5"/>
  <!-- Silver middle -->
  <rect x="2.5" y="2.5" width="675" height="995" rx="31" fill="none" stroke="url(#silverBorder)" stroke-width="4"/>
  <!-- Gap (black) -->
  <rect x="2.5" y="2.5" width="675" height="995" rx="31" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Bronze inner -->
  <rect x="2.5" y="2.5" width="675" height="995" rx="31" fill="none" stroke="url(#bronzeBorder)" stroke-width="3"/>

  <!-- Secondary inner borders -->
  <rect x="11" y="11" width="658" height="978" rx="25" fill="none" stroke="url(#innerBorder)" stroke-width="1.2"/>
  <rect x="16" y="16" width="648" height="968" rx="21" fill="none" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.25"/>

  <!-- Top ribbons (tricolour style) -->
  <!-- Gold ribbon -->
  <rect x="0" y="45" width="680" height="34" fill="url(#ribbonGold)" opacity="0.98"/>
  <text x="340" y="67" font-family="'Georgia','Times New Roman',serif" font-size="15" font-weight="bold" letter-spacing="5" fill="#0a0a14" text-anchor="middle" opacity="0.95">FOUNDER'S SOVEREIGN SEAL</text>

  <!-- Black ribbon with gold text -->
  <rect x="0" y="79" width="680" height="24" fill="url(#ribbonBlack)" opacity="0.94"/>
  <text x="340" y="96" font-family="'Georgia','Times New Roman',serif" font-size="13" font-weight="bold" letter-spacing="4.5" fill="#D4AF37" text-anchor="middle" opacity="0.9">ONLY ISSUED BY STP‑AUDITOR‑0001</text>

  <!-- Corner marks (gold) -->
  <g stroke="#D4AF37" stroke-width="2" stroke-opacity="0.5" stroke-linecap="square" fill="none">
    <path d="M32,32 L32,72 M32,32 L72,32"/>
    <path d="M648,32 L648,72 M648,32 L608,32"/>
    <path d="M32,920 L32,880 M32,920 L72,920"/>
    <path d="M648,920 L648,880 M648,920 L608,920"/>
  </g>

  <!-- Founder's badge image (centre) – replace with your aion_logo2.jpg -->
  <image x="190" y="115" width="300" height="300" href="/assets/badges/stp_auditor_badge_founder.svg"/>

  <!-- VERIFICATION BAR -->
  <rect x="45" y="440" width="590" height="385" rx="20" fill="#020203" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.7"/>
  <rect x="45" y="440" width="590" height="40" rx="20" fill="#D4AF37" fill-opacity="0.12"/>
  <rect x="45" y="460" width="590" height="18" fill="#D4AF37" fill-opacity="0.05"/>
  <line x1="72" y1="480" x2="608" y2="480" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="340" y="467" font-family="'Courier New',monospace" font-size="13" fill="#D4AF37" font-weight="bold" text-anchor="middle" letter-spacing="3">VERIFIED CERTIFICATION · FOUNDER'S SEAL</text>

  <!-- Auditor line -->
  <text x="340" y="512" font-family="'Courier New',monospace" font-size="12" text-anchor="middle">
    <tspan fill="#DAA520">◈ </tspan>
    <tspan fill="#F5E08A">Certified by STP‑AUDITOR‑0001 (Founding Badge)</tspan>
  </text>

  <!-- Tier badge placeholder (keep as is) -->
  <g transform="translate(225, 525) scale(1.15)">
    {{SOVEREIGN_TIER_BADGE_SVG}}
  </g>

  <!-- Audit details -->
  <circle cx="72" cy="612" r="3.5" fill="#D4AF37" opacity="0.7"/>
  <text x="86" y="616" font-family="'Courier New',monospace" font-size="11.5" fill="#888">Entry</text>
  <text x="175" y="616" font-family="'Courier New',monospace" font-size="11.5" fill="#F5E08A" font-weight="bold">{{ENTRY_ID}}</text>

  <circle cx="72" cy="638" r="3.5" fill="#D4AF37" opacity="0.7"/>
  <text x="86" y="642" font-family="'Courier New',monospace" font-size="11.5" fill="#888">SHA‑256</text>
  <text x="175" y="642" font-family="'Courier New',monospace" font-size="11" fill="#48CAE4">{{SHA256_HASH}}</text>

  <circle cx="72" cy="664" r="3.5" fill="#D4AF37" opacity="0.7"/>
  <text x="86" y="668" font-family="'Courier New',monospace" font-size="11.5" fill="#888">Verify at</text>
  <text x="175" y="668" font-family="'Courier New',monospace" font-size="11.5" fill="#48CAE4">{{VERIFY_URL}}</text>

  <line x1="72" y1="685" x2="608" y2="685" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Signature block -->
  <line x1="160" y1="698" x2="340" y2="698" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.35"/>
  <line x1="340" y1="698" x2="520" y2="698" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.35"/>
  <text x="340" y="695" font-family="'Courier New',monospace" font-size="7.5" fill="#D4AF37" fill-opacity="0.45" text-anchor="middle" letter-spacing="2.5">CERTIFIED BY</text>
  <text x="340" y="722" font-family="'Georgia','Times New Roman',serif" font-size="20" font-weight="bold" font-style="italic" fill="#F5E08A" text-anchor="middle" letter-spacing="1.2" opacity="0.93">SHELDON K. SALMON</text>
  <text x="340" y="737" font-family="'Courier New',monospace" font-size="8.5" fill="#D4AF37" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">AI RELIABILITY ARCHITECT · AIONSYSTEM</text>

  <!-- Triple-time dates -->
  <line x1="72" y1="749" x2="608" y2="749" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.22"/>
  <text x="340" y="763" font-family="'Courier New',monospace" font-size="9" fill="#888" text-anchor="middle" letter-spacing="1.5">ISSUED</text>
  <text x="340" y="777" font-family="'Courier New',monospace" font-size="10" fill="#DAA520" text-anchor="middle" letter-spacing="1">{{ISSUE_DATE_GREGORIAN}}</text>
  <text x="340" y="789" font-family="'Courier New',monospace" font-size="9" fill="#888" text-anchor="middle">{{ISSUE_DATE_HEBREW}} · {{ISSUE_DATE_DREAMSPELL}}</text>

  <text x="164" y="804" font-family="'Courier New',monospace" font-size="9.5" fill="#D4AF37" opacity="0.5">◆──────────────────</text>
  <text x="516" y="804" font-family="'Courier New',monospace" font-size="9.5" fill="#D4AF37" opacity="0.5" text-anchor="end">──────────────────◆</text>
  <text x="340" y="819" font-family="'Courier New',monospace" font-size="8.5" fill="#444" text-anchor="middle">Digital signature appended to STP ledger entry</text>

  <!-- Validity + scope bar -->
  <rect x="45" y="828" width="590" height="72" rx="10" fill="#010102" fill-opacity="0.8" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="49" y="832" width="582" height="64" rx="7" fill="none" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.15"/>

  <text x="72" y="852" font-family="'Courier New',monospace" font-size="7.5" fill="#D4AF37" fill-opacity="0.5" letter-spacing="2">VALID THROUGH</text>
  <text x="72" y="869" font-family="'Courier New',monospace" font-size="11" fill="#F5E08A" font-weight="bold" letter-spacing="1">{{VALID_THROUGH}}</text>
  <text x="72" y="882" font-family="'Courier New',monospace" font-size="7.5" fill="#555" letter-spacing="1">90-DAY CERTIFICATION CYCLE</text>

  <line x1="340" y1="836" x2="340" y2="892" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>

  <text x="356" y="852" font-family="'Courier New',monospace" font-size="7.5" fill="#D4AF37" fill-opacity="0.5" letter-spacing="2">AUDIT SCOPE</text>
  <text x="356" y="869" font-family="'Courier New',monospace" font-size="11" fill="#F5E08A" font-weight="bold" letter-spacing="1">{{AUDIT_SCOPE_CODE}}</text>
  <text x="356" y="882" font-family="'Courier New',monospace" font-size="7.5" fill="#555" letter-spacing="1">{{AUDIT_SCOPE_LABEL}}</text>

  <!-- QR code -->
  <rect x="556" y="900" width="74" height="74" rx="9" fill="#020203" stroke="#D4AF37" stroke-width="2"/>
  <image x="562" y="906" width="62" height="62" href="{{QR_CODE_URL}}"/>
  <text x="593" y="986" font-family="'Courier New',monospace" font-size="7.5" fill="#D4AF37" opacity="0.7" text-anchor="middle" letter-spacing="1.5">SCAN</text>

  <!-- Micro‑text (identical to original but with gold) -->
  <text x="-120.8" y="998" font-family="'Courier New',monospace" font-size="5.5" fill="#D4AF37" opacity="0.2" letter-spacing="1.8">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · FOUNDING AUDITOR · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · FOUNDING AUDITOR</text>
  <text x="-120.8" y="1008" font-family="'Courier New',monospace" font-size="5.5" fill="#D4AF37" opacity="0.12" letter-spacing="1.8">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · FOUNDING AUDITOR · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · FOUNDING AUDITOR</text>

  <!-- Final gloss overlay -->
  <rect width="680" height="1000" rx="32" fill="url(#depthField)" clip-path="url(#cardClip)" pointer-events="none"/>
</svg>
