<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 680" width="500" height="680">
  <title>Certified Audit Sleeve — Mock Example (Nexus AI Solutions)</title>
  <desc>A fully filled mock certification sleeve showing how a real Tier 1 audit would be delivered.</desc>
  <defs>
    <linearGradient id="bgDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="35%" stop-color="#111120"/>
      <stop offset="65%" stop-color="#161625"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </linearGradient>
    <radialGradient id="ptLightRad" cx="20%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#4af0ff" stop-opacity="0.09"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="depthField" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="68%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.52"/>
    </radialGradient>
    <linearGradient id="borderRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="20%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#f0a500"/>
      <stop offset="60%" stop-color="#00e5ff"/>
      <stop offset="80%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="innerBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#F5E08A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ribbonGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a3e00"/>
      <stop offset="15%" stop-color="#9a7000"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E08A"/>
      <stop offset="65%" stop-color="#D4AF37"/>
      <stop offset="85%" stop-color="#9a7000"/>
      <stop offset="100%" stop-color="#5a3e00"/>
    </linearGradient>
    <linearGradient id="ribbonSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="20%" stop-color="#6b7a99"/>
      <stop offset="50%" stop-color="#c8d4e8"/>
      <stop offset="80%" stop-color="#6b7a99"/>
      <stop offset="100%" stop-color="#2a3040"/>
    </linearGradient>
    <linearGradient id="holoFoil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00e5ff" stop-opacity="0.07"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#a855f7" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="75%" stop-color="#f0a500" stop-opacity="0.05"/>
      <stop offset="90%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="verifyBarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="holoRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="25%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#f0a500"/>
      <stop offset="75%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <radialGradient id="gemCenter" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="engrave" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(28)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.12"/>
    </pattern>
    <pattern id="hexMesh" width="38" height="33" patternUnits="userSpaceOnUse">
      <polygon points="19,1 37,9 37,23 19,31 1,23 1,9" fill="none" stroke="#4af0ff" stroke-width="0.4" stroke-opacity="0.055"/>
    </pattern>
    <pattern id="matrix" width="32" height="32" patternUnits="userSpaceOnUse">
      <text x="2" y="16" font-family="'Courier New',monospace" font-size="10" fill="#20ff50" opacity="0.04">0</text>
      <text x="12" y="26" font-family="'Courier New',monospace" font-size="8" fill="#20ff50" opacity="0.03">1</text>
      <text x="22" y="10" font-family="'Courier New',monospace" font-size="11" fill="#20ff50" opacity="0.035">;</text>
      <text x="6" y="6" font-family="'Courier New',monospace" font-size="9" fill="#20ff50" opacity="0.025">%</text>
      <text x="16" y="20" font-family="'Courier New',monospace" font-size="10" fill="#20ff50" opacity="0.03">/</text>
    </pattern>
    <pattern id="aionMark" width="272" height="272" patternUnits="userSpaceOnUse" patternTransform="rotate(-28)">
      <text x="0" y="40" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.055" letter-spacing="4">AI/ON</text>
      <text x="136" y="176" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.055" letter-spacing="4">AI/ON</text>
      <text x="68" y="272" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.04" letter-spacing="4">AI/ON</text>
    </pattern>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="500" height="680" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background layers -->
  <rect x="4" y="4" width="492" height="672" rx="28" fill="#000000" fill-opacity="0.45"/>
  <rect width="500" height="680" rx="28" fill="url(#bgDeep)"/>
  <rect width="500" height="680" rx="28" fill="url(#aionMark)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#hexMesh)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#matrix)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#holoFoil)" clip-path="url(#cardClip)" opacity="0.32"/>
  <rect width="500" height="680" rx="28" fill="url(#ptLightRad)" clip-path="url(#cardClip)"/>

  <!-- Borders -->
  <rect x="2.5" y="2.5" width="495" height="675" rx="27" fill="none" stroke="url(#borderRainbow)" stroke-width="2.5"/>
  <rect x="8" y="8" width="484" height="664" rx="23" fill="none" stroke="url(#innerBorder)" stroke-width="1"/>
  <rect x="13" y="13" width="474" height="654" rx="19" fill="none" stroke="#4af0ff" stroke-width="0.3" stroke-opacity="0.12"/>

  <!-- CONDITIONAL RIBBONS -->
  <!-- RIBBON_GOLD_START (Active) -->
  <rect x="0" y="36" width="500" height="22" fill="url(#ribbonGold)" opacity="0.97"/>
  <text x="250" y="51.5" font-family="'Georgia','Times New Roman',serif" font-size="11" font-weight="bold" letter-spacing="4" fill="#0a0a14" text-anchor="middle" opacity="0.92">AI SOVEREIGN CERTIFIED</text>
  <!-- RIBBON_GOLD_END -->
  <!-- RIBBON_SILVER_START (Active) -->
  <rect x="0" y="58" width="500" height="16" fill="url(#ribbonSilver)" opacity="0.92"/>
  <text x="250" y="69.5" font-family="'Georgia','Times New Roman',serif" font-size="9" font-weight="bold" letter-spacing="3" fill="#0a0a14" text-anchor="middle" opacity="0.88">AI CLOUD CERTIFIED</text>
  <!-- RIBBON_SILVER_END -->

  <!-- Corner marks -->
  <g stroke="#D4AF37" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="square" fill="none">
    <path d="M22,22 L22,50 M22,22 L50,22"/>
    <path d="M26,26 L26,44 M26,26 L44,26" stroke="#4af0ff" stroke-width="0.5" stroke-opacity="0.25"/>
    <path d="M478,22 L478,50 M478,22 L450,22"/>
    <path d="M474,26 L474,44 M474,26 L456,26" stroke="#4af0ff" stroke-width="0.5" stroke-opacity="0.25"/>
    <path d="M22,658 L22,630 M22,658 L50,658"/>
    <path d="M26,654 L26,636 M26,654 L44,654" stroke="#4af0ff" stroke-width="0.5" stroke-opacity="0.25"/>
    <path d="M478,658 L478,630 M478,658 L450,658"/>
    <path d="M474,654 L474,636 M474,654 L456,654" stroke="#4af0ff" stroke-width="0.5" stroke-opacity="0.25"/>
  </g>

  <!-- Badge slots -->
  <rect x="30" y="85" width="210" height="200" rx="8" fill="#000000" fill-opacity="0.15"/>
  <image x="30" y="85" width="210" height="200" href="assets/badges/verified-simulator/aion-verified-simulator-badge-v2.svg"/>

  <rect x="260" y="85" width="210" height="200" rx="8" fill="#000000" fill-opacity="0.15"/>
  <image x="260" y="85" width="210" height="200" href="assets/badges/stp_auditor/stp_auditor_badge_sheldon_v1.svg"/>

  <!-- Badge enclosure ring -->
  <rect x="15" y="80" width="470" height="210" rx="14" fill="none" stroke="url(#holoRing)" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="6,4"/>
  <rect x="22" y="87" width="456" height="196" rx="10" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.2"/>
  <rect x="28" y="93" width="444" height="184" rx="7" fill="none" stroke="#4af0ff" stroke-width="0.3" stroke-opacity="0.13"/>

  <!-- Badge separator ticks -->
  <g stroke="#D4AF37" stroke-opacity="0.42" stroke-width="1">
    <line x1="250" y1="80" x2="250" y2="92"/>
    <line x1="250" y1="288" x2="250" y2="300"/>
    <line x1="16" y1="185" x2="28" y2="185"/>
    <line x1="472" y1="185" x2="484" y2="185"/>
    <line x1="44" y1="93" x2="44" y2="105"/>
    <line x1="456" y1="93" x2="456" y2="105"/>
    <line x1="44" y1="277" x2="44" y2="289"/>
    <line x1="456" y1="277" x2="456" y2="289"/>
  </g>

  <!-- Verification bar -->
  <rect x="35" y="315" width="430" height="235" rx="14" fill="url(#verifyBarBg)" stroke="#D4AF37" stroke-width="1.3" stroke-opacity="0.55"/>
  <rect x="35" y="315" width="430" height="235" rx="14" fill="url(#engrave)"/>
  <rect x="35" y="315" width="430" height="30" rx="14" fill="#D4AF37" fill-opacity="0.13"/>
  <rect x="35" y="330" width="430" height="15" fill="#D4AF37" fill-opacity="0.06"/>
  <line x1="55" y1="345" x2="445" y2="345" stroke="#D4AF37" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="55" y1="346" x2="445" y2="346" stroke="#4af0ff" stroke-width="0.3" stroke-opacity="0.2"/>

  <text x="250" y="336" font-family="'Courier New',monospace" font-size="10" fill="#D4AF37" font-weight="bold" text-anchor="middle" letter-spacing="2.5">VERIFIED CERTIFICATION</text>

  <!-- Auditor line -->
  <text x="250" y="363" font-family="'Courier New',monospace" font-size="9" text-anchor="middle">
    <tspan fill="#DAA520">◈ </tspan>
    <tspan fill="#D4AF37">Certified by STP‑AUDITOR‑0001 (Founding Badge)</tspan>
  </text>

  <!-- Tier badge slot (filled with the standard badge) -->
  <rect x="130" y="372" width="240" height="58" rx="8" fill="#0d0d1a" fill-opacity="0.6" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="5,3"/>
  <rect x="133" y="375" width="234" height="52" rx="6" fill="none" stroke="#4af0ff" stroke-width="0.3" stroke-opacity="0.18" stroke-dasharray="3,5"/>
  <text x="250" y="397" font-family="'Courier New',monospace" font-size="6" fill="#D4AF37" fill-opacity="0.38" text-anchor="middle" letter-spacing="2">SOVEREIGN TIER</text>
  <image x="170" y="383" width="160" height="30" href="assets/badges/sovereign-certified/sovereign-certified-badge-v2.svg"/>
  <text x="250" y="424" font-family="'Courier New',monospace" font-size="6" fill="#444" text-anchor="middle" letter-spacing="1">Standard Tier</text>

  <!-- Audit details -->
  <circle cx="57" cy="446" r="2.8" fill="#4af0ff" opacity="0.7"/>
  <text x="67" y="449" font-family="'Courier New',monospace" font-size="9" fill="#888">Entry</text>
  <text x="132" y="449" font-family="'Courier New',monospace" font-size="9" fill="#F5E08A" font-weight="bold">STP-T1-2026-00042</text>

  <circle cx="57" cy="465" r="2.8" fill="#a855f7" opacity="0.7"/>
  <text x="67" y="468" font-family="'Courier New',monospace" font-size="9" fill="#888">SHA-256</text>
  <text x="132" y="468" font-family="'Courier New',monospace" font-size="8.5" fill="#48CAE4">a3f9c12e7d4b8f…</text>

  <circle cx="57" cy="484" r="2.8" fill="#f0a500" opacity="0.7"/>
  <text x="67" y="487" font-family="'Courier New',monospace" font-size="9" fill="#888">Verify</text>
  <text x="132" y="487" font-family="'Courier New',monospace" font-size="9" fill="#48CAE4">aionsystem.github.io/verify/STP-T1-2026-00042</text>

  <line x1="55" y1="497" x2="445" y2="497" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.3"/>

  <!-- Signature block -->
  <line x1="120" y1="508" x2="250" y2="508" stroke="#D4AF37" stroke-width="0.35" stroke-opacity="0.35"/>
  <line x1="250" y1="508" x2="380" y2="508" stroke="#D4AF37" stroke-width="0.35" stroke-opacity="0.35"/>
  <text x="250" y="505" font-family="'Courier New',monospace" font-size="6" fill="#D4AF37" fill-opacity="0.45" text-anchor="middle" letter-spacing="2">CERTIFIED BY</text>
  <text x="250" y="526" font-family="'Georgia','Times New Roman',serif" font-size="15" font-weight="bold" font-style="italic" fill="#F5E08A" text-anchor="middle" letter-spacing="1" opacity="0.93">Sheldon K. Salmon</text>
  <text x="250" y="537" font-family="'Courier New',monospace" font-size="7" fill="#D4AF37" fill-opacity="0.5" text-anchor="middle" letter-spacing="2.5">AI RELIABILITY ARCHITECT · AIONSYSTEM</text>

  <!-- Triple-time date block -->
  <line x1="55" y1="545" x2="445" y2="545" stroke="#D4AF37" stroke-width="0.35" stroke-opacity="0.22"/>
  <text x="250" y="556" font-family="'Courier New',monospace" font-size="7.5" fill="#888" text-anchor="middle" letter-spacing="1.5">ISSUED</text>
  <text x="250" y="567" font-family="'Courier New',monospace" font-size="8" fill="#DAA520" text-anchor="middle" letter-spacing="1">June 2, 2026</text>
  <text x="250" y="576" font-family="'Courier New',monospace" font-size="7.5" fill="#888" text-anchor="middle">16 Sivan 5786 · Day 16, Crystal Moon 9/13</text>

  <text x="120" y="588" font-family="'Courier New',monospace" font-size="8" fill="#D4AF37" opacity="0.5">◆──────────────────</text>
  <text x="380" y="588" font-family="'Courier New',monospace" font-size="8" fill="#D4AF37" opacity="0.5" text-anchor="end">──────────────────◆</text>
  <text x="250" y="599" font-family="'Courier New',monospace" font-size="7" fill="#444" text-anchor="middle">Digital signature appended to STP ledger entry</text>

  <!-- Validity + scope bar -->
  <rect x="35" y="607" width="430" height="55" rx="8" fill="#060610" fill-opacity="0.7" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="38" y="610" width="424" height="49" rx="6" fill="none" stroke="#4af0ff" stroke-width="0.25" stroke-opacity="0.15"/>

  <text x="55" y="625" font-family="'Courier New',monospace" font-size="6" fill="#D4AF37" fill-opacity="0.5" letter-spacing="1.5">VALID THROUGH</text>
  <text x="55" y="638" font-family="'Courier New',monospace" font-size="8.5" fill="#F5E08A" font-weight="bold" letter-spacing="1">2026-09-02</text>
  <text x="55" y="649" font-family="'Courier New',monospace" font-size="6" fill="#555" letter-spacing="1">90-DAY CERTIFICATION CYCLE</text>

  <line x1="250" y1="614" x2="250" y2="658" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.3"/>

  <text x="260" y="625" font-family="'Courier New',monospace" font-size="6" fill="#D4AF37" fill-opacity="0.5" letter-spacing="1.5">AUDIT SCOPE</text>
  <text x="260" y="638" font-family="'Courier New',monospace" font-size="8.5" fill="#F5E08A" font-weight="bold" letter-spacing="1">AI-OUTPUT-T1-PROFESSIONAL</text>
  <text x="260" y="649" font-family="'Courier New',monospace" font-size="6" fill="#555" letter-spacing="1">Professional Depth (50 outputs)</text>

  <!-- QR code (mock) -->
  <rect x="410" y="603" width="58" height="58" rx="7" fill="#060610" stroke="url(#borderRainbow)" stroke-width="1.4"/>
  <rect x="420" y="613" width="38" height="38" rx="2" fill="#0a0a14" stroke="#D4AF37" stroke-width="1"/>
  <text x="439" y="638" font-family="'Courier New',monospace" font-size="12" fill="#D4AF37" text-anchor="middle">QR</text>
  <text x="439" y="669" font-family="'Courier New',monospace" font-size="6" fill="#555" text-anchor="middle" letter-spacing="1.5">SCAN</text>

  <!-- Micro‑text band -->
  <text x="-100" y="720" font-family="'Courier New',monospace" font-size="4.5" fill="#D4AF37" opacity="0.18" letter-spacing="1.5">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AI RELIABILITY ARCHITECTURE · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AI RELIABILITY ARCHITECTURE</text>
  <text x="-100" y="726" font-family="'Courier New',monospace" font-size="4.5" fill="#4af0ff" opacity="0.11" letter-spacing="1.5">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AI RELIABILITY ARCHITECTURE · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AI RELIABILITY ARCHITECTURE</text>

  <!-- Final overlays -->
  <rect width="500" height="680" rx="28" fill="url(#depthField)" clip-path="url(#cardClip)" pointer-events="none"/>
  <rect width="500" height="680" rx="28" fill="url(#gloss)" clip-path="url(#cardClip)" pointer-events="none"/>
  <ellipse cx="250" cy="0" rx="200" ry="60" fill="#ffffff" fill-opacity="0.04" clip-path="url(#cardClip)"/>
</svg>
