<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 680" width="500" height="680">
  <title>Certified Audit Sleeve — Mock Example (Nexus AI Solutions)</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/><stop offset="100%" stop-color="#0a0a15"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/><stop offset="50%" stop-color="#F5E08A"/><stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a5568"/><stop offset="50%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#4a5568"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/><stop offset="50%" stop-color="#f0a500"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="barBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/><stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <!-- Inline founder badge: small gold shield with STP -->
    <linearGradient id="founderGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <!-- Inline standard tier badge: gold rectangle -->
    <linearGradient id="tierGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5A028"/><stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <clipPath id="clip"><rect width="500" height="680" rx="28"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="680" rx="28" fill="url(#bg)"/>
  <rect width="500" height="680" rx="28" fill="#000" opacity="0.35"/>

  <!-- Border -->
  <rect x="3" y="3" width="494" height="674" rx="26" fill="none" stroke="url(#border)" stroke-width="2.5"/>

  <!-- Ribbons -->
  <rect x="0" y="36" width="500" height="22" fill="url(#gold)"/>
  <text x="250" y="51" font-family="'Georgia',serif" font-size="11" font-weight="bold" letter-spacing="4" fill="#0a0a14" text-anchor="middle">AI SOVEREIGN CERTIFIED</text>
  <rect x="0" y="58" width="500" height="16" fill="url(#silver)"/>
  <text x="250" y="69" font-family="'Georgia',serif" font-size="9" font-weight="bold" letter-spacing="3" fill="#0a0a14" text-anchor="middle">AI CLOUD CERTIFIED</text>

  <!-- Left badge: Verified Simulator (inline octagon) -->
  <rect x="30" y="85" width="210" height="200" rx="8" fill="#000" opacity="0.3"/>
  <g transform="translate(60, 105)">
    <polygon points="75,10 115,25 135,60 135,100 115,135 75,150 35,135 15,100 15,60 35,25" fill="#1a1a2e" stroke="url(#gold)" stroke-width="2"/>
    <text x="75" y="65" font-family="'Georgia',serif" font-size="22" font-weight="bold" fill="#D4AF37" text-anchor="middle">AION</text>
    <text x="75" y="85" font-family="'Courier New',monospace" font-size="8" fill="#D4AF37" text-anchor="middle">VERIFIED SIMULATOR</text>
    <text x="75" y="110" font-family="'Courier New',monospace" font-size="6" fill="#F5E08A" text-anchor="middle">SHA‑256 · STP SEALED</text>
  </g>

  <!-- Right badge: Founder Auditor (inline shield) -->
  <rect x="260" y="85" width="210" height="200" rx="8" fill="#000" opacity="0.3"/>
  <g transform="translate(280, 105)">
    <path d="M85,10 L140,25 L140,90 Q140,140 85,165 Q30,140 30,90 L30,25 Z" fill="#12141F" stroke="url(#founderGold)" stroke-width="2"/>
    <text x="85" y="60" font-family="'Georgia',serif" font-size="24" font-weight="bold" fill="#D4AF37" text-anchor="middle">STP</text>
    <text x="85" y="80" font-family="'Georgia',serif" font-size="8" fill="#D4AF37" text-anchor="middle">CERTIFIED AUDITOR</text>
    <text x="85" y="110" font-family="'Courier New',monospace" font-size="9" font-weight="bold" fill="#F5E08A" text-anchor="middle">STP‑AUDITOR‑0001</text>
    <text x="85" y="125" font-family="'Georgia',serif" font-size="9" fill="#E8D5A3" text-anchor="middle">SHELDON K. SALMON</text>
  </g>

  <!-- Verification bar -->
  <rect x="35" y="315" width="430" height="200" rx="14" fill="url(#barBg)" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
  <rect x="35" y="315" width="430" height="28" rx="14" fill="#D4AF37" opacity="0.15"/>
  <text x="250" y="335" font-family="'Courier New',monospace" font-size="10" fill="#D4AF37" font-weight="bold" text-anchor="middle">VERIFIED CERTIFICATION</text>
  <text x="250" y="360" font-family="'Courier New',monospace" font-size="9" text-anchor="middle">
    <tspan fill="#DAA520">◈ </tspan>
    <tspan fill="#D4AF37">Certified by STP‑AUDITOR‑0001 (Founding Badge)</tspan>
  </text>

  <!-- Tier badge: Standard (inline) -->
  <rect x="130" y="370" width="240" height="50" rx="6" fill="#0d0d1a" stroke="#D4AF37" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="180" y="375" width="140" height="24" rx="4" fill="url(#tierGold)"/>
  <text x="250" y="392" font-family="'Georgia',serif" font-size="12" font-weight="bold" fill="#0a0a14" text-anchor="middle">CERTIFIED</text>
  <text x="250" y="412" font-family="'Courier New',monospace" font-size="6" fill="#D4AF37" text-anchor="middle">STANDARD TIER</text>

  <!-- Audit details -->
  <circle cx="57" cy="442" r="2.5" fill="#00d4ff"/>
  <text x="67" y="445" font-family="'Courier New',monospace" font-size="9" fill="#888">Entry</text>
  <text x="132" y="445" font-family="'Courier New',monospace" font-size="9" fill="#F5E08A" font-weight="bold">STP-T1-2026-00042</text>

  <circle cx="57" cy="461" r="2.5" fill="#a855f7"/>
  <text x="67" y="464" font-family="'Courier New',monospace" font-size="9" fill="#888">SHA-256</text>
  <text x="132" y="464" font-family="'Courier New',monospace" font-size="8.5" fill="#48CAE4">a3f9c12e7d4b8f…</text>

  <circle cx="57" cy="480" r="2.5" fill="#f0a500"/>
  <text x="67" y="483" font-family="'Courier New',monospace" font-size="9" fill="#888">Verify</text>
  <text x="132" y="483" font-family="'Courier New',monospace" font-size="9" fill="#48CAE4">aionsystem.github.io/verify/STP-T1-2026-00042</text>

  <line x1="55" y1="495" x2="445" y2="495" stroke="#D4AF37" stroke-width="0.4" opacity="0.3"/>

  <!-- Signature -->
  <text x="250" y="530" font-family="'Georgia',serif" font-size="15" font-weight="bold" font-style="italic" fill="#F5E08A" text-anchor="middle">Sheldon K. Salmon</text>
  <text x="250" y="545" font-family="'Courier New',monospace" font-size="7" fill="#888" text-anchor="middle">AI RELIABILITY ARCHITECT · AIONSYSTEM</text>

  <!-- Dates -->
  <text x="250" y="565" font-family="'Courier New',monospace" font-size="8" fill="#DAA520" text-anchor="middle">Issued: June 2, 2026</text>
  <text x="250" y="580" font-family="'Courier New',monospace" font-size="8" fill="#888" text-anchor="middle">Valid Through: 2026-09-02 · 90-Day Cycle</text>

  <!-- Micro-text -->
  <text x="250" y="625" font-family="'Courier New',monospace" font-size="5" fill="#D4AF37" opacity="0.2" text-anchor="middle">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AI RELIABILITY ARCHITECTURE</text>
</svg>
