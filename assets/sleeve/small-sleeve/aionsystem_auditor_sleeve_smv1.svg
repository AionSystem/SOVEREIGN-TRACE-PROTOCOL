<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 680" width="500" height="680">
  <!--
    CERTIFIED AUDITOR SLEEVE — smv1
    Sovereign Trace Protocol
    All names and identifiers are template placeholders.
  -->
  <defs>
    <linearGradient id="bgDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12141F"/>
      <stop offset="35%" stop-color="#0D0F1A"/>
      <stop offset="65%" stop-color="#111320"/>
      <stop offset="100%" stop-color="#080A12"/>
    </linearGradient>
    <radialGradient id="ptLightRad" cx="20%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#48CAE4" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="depthField" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="68%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.52"/>
    </radialGradient>
    <linearGradient id="borderRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="20%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#f0a500"/>
      <stop offset="60%" stop-color="#48CAE4"/>
      <stop offset="80%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="innerBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD7F32" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#E8A96A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#CD7F32" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ribbonGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a3e00"/>
      <stop offset="15%" stop-color="#9a7000"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E08A"/>
      <stop offset="65%" stop-color="#D4AF37"/>
      <stop offset="85%" stop-color="#9a7000"/>
      <stop offset="100%" stop-color="#5a3e00"/>
    </linearGradient>
    <linearGradient id="ribbonSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="20%" stop-color="#6b7a99"/>
      <stop offset="50%" stop-color="#c8d4e8"/>
      <stop offset="80%" stop-color="#6b7a99"/>
      <stop offset="100%" stop-color="#2a3040"/>
    </linearGradient>
    <linearGradient id="holoFoil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#48CAE4" stop-opacity="0.06"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#a855f7" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="75%" stop-color="#f0a500" stop-opacity="0.04"/>
      <stop offset="90%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="verifyBarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <pattern id="engrave" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(28)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#CD7F32" stroke-width="0.3" stroke-opacity="0.12"/>
    </pattern>
    <pattern id="hexMesh" width="38" height="33" patternUnits="userSpaceOnUse">
      <polygon points="19,1 37,9 37,23 19,31 1,23 1,9" fill="none" stroke="#48CAE4" stroke-width="0.4" stroke-opacity="0.05"/>
    </pattern>
    <pattern id="matrix" width="32" height="32" patternUnits="userSpaceOnUse">
      <text x="2" y="16" font-family="'Courier New',monospace" font-size="10" fill="#20ff50" opacity="0.035">0</text>
      <text x="12" y="26" font-family="'Courier New',monospace" font-size="8" fill="#20ff50" opacity="0.025">1</text>
      <text x="22" y="10" font-family="'Courier New',monospace" font-size="11" fill="#20ff50" opacity="0.03">;</text>
    </pattern>
    <pattern id="aionMark" width="272" height="272" patternUnits="userSpaceOnUse" patternTransform="rotate(-28)">
      <text x="0" y="40" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#CD7F32" opacity="0.05" letter-spacing="4">AI/ON</text>
      <text x="136" y="176" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#CD7F32" opacity="0.05" letter-spacing="4">AI/ON</text>
      <text x="68" y="272" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#CD7F32" opacity="0.035" letter-spacing="4">AI/ON</text>
    </pattern>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="500" height="680" rx="28"/>
    </clipPath>
  </defs>

  <!-- BACKGROUND -->
  <rect width="500" height="680" rx="28" fill="url(#bgDeep)"/>
  <rect width="500" height="680" rx="28" fill="url(#aionMark)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#hexMesh)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#matrix)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#holoFoil)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#ptLightRad)" clip-path="url(#cardClip)"/>

  <!-- BORDERS -->
  <rect x="2.5" y="2.5" width="495" height="675" rx="27" fill="none" stroke="url(#borderRainbow)" stroke-width="2.5"/>
  <rect x="8" y="8" width="484" height="664" rx="23" fill="none" stroke="url(#innerBorder)" stroke-width="1"/>
  <rect x="13" y="13" width="474" height="654" rx="19" fill="none" stroke="#48CAE4" stroke-width="0.3" stroke-opacity="0.12"/>

  <!-- RIBBONS -->
  <rect x="0" y="36" width="500" height="22" fill="url(#ribbonGold)" opacity="0.97"/>
  <text x="250" y="51.5" font-family="'Georgia','Times New Roman',serif" font-size="11" font-weight="bold" letter-spacing="4" fill="#0a0a14" text-anchor="middle" opacity="0.92">AI SOVEREIGN CERTIFIED</text>
  <rect x="0" y="58" width="500" height="16" fill="url(#ribbonSilver)" opacity="0.92"/>
  <text x="250" y="69.5" font-family="'Georgia','Times New Roman',serif" font-size="8" font-weight="bold" letter-spacing="3" fill="#0a0a14" text-anchor="middle" opacity="0.88">SOVEREIGN TRACE PROTOCOL — CERTIFIED AUDITOR</text>

  <!-- CORNER MARKS -->
  <g stroke="#CD7F32" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="square" fill="none">
    <path d="M22,22 L22,50 M22,22 L50,22"/>
    <path d="M26,26 L26,44 M26,26 L44,26" stroke="#48CAE4" stroke-width="0.5" stroke-opacity="0.25"/>
    <path d="M478,22 L478,50 M478,22 L450,22"/>
    <path d="M474,26 L474,44 M474,26 L456,26" stroke="#48CAE4" stroke-width="0.5" stroke-opacity="0.25"/>
    <path d="M22,658 L22,630 M22,658 L50,658"/>
    <path d="M26,654 L26,636 M26,654 L44,654" stroke="#48CAE4" stroke-width="0.5" stroke-opacity="0.25"/>
    <path d="M478,658 L478,630 M478,658 L450,658"/>
    <path d="M474,654 L474,636 M474,654 L456,654" stroke="#48CAE4" stroke-width="0.5" stroke-opacity="0.25"/>
  </g>

  <!-- AUDITOR BADGE -->
  <rect x="90" y="82" width="280" height="280" rx="8" fill="#000000" fill-opacity="0.15"/>
  <image x="95" y="87" width="270" height="270" href="{{AUDITOR_BADGE_URL}}"/>

  <!-- QR CODE — beside badge -->
  <rect x="385" y="190" width="58" height="58" rx="7" fill="#060610" stroke="url(#borderRainbow)" stroke-width="1.4"/>
  <image x="390" y="195" width="48" height="48" href="{{QR_CODE_URL}}"/>
  <text x="414" y="260" font-family="'Courier New',monospace" font-size="6" fill="#555" text-anchor="middle" letter-spacing="1.5">SCAN</text>

  <!-- VERIFICATION PANEL -->
  <rect x="35" y="378" width="430" height="175" rx="14" fill="url(#verifyBarBg)" stroke="#CD7F32" stroke-width="1.4" stroke-opacity="0.55"/>
  <rect x="35" y="378" width="430" height="175" rx="14" fill="url(#engrave)"/>
  <rect x="35" y="378" width="430" height="28" rx="14" fill="#CD7F32" fill-opacity="0.13"/>
  <text x="250" y="397" font-family="'Courier New',monospace" font-size="9.5" fill="#CD7F32" font-weight="bold" text-anchor="middle" letter-spacing="2.5">VERIFIED CERTIFICATION</text>
  <line x1="55" y1="409" x2="445" y2="409" stroke="#CD7F32" stroke-width="0.6" stroke-opacity="0.4"/>

  <text x="250" y="428" font-family="'Courier New',monospace" font-size="8.5" text-anchor="middle">
    <tspan fill="#E8A96A">◈ </tspan>
    <tspan fill="#CD7F32">Certified by {{AUDITOR_BADGE_ID}} ({{AUDITOR_RANK}})</tspan>
  </text>

  <!-- Tier badge slot -->
  <g transform="translate(155, 438) scale(0.75)">
    {{SOVEREIGN_TIER_BADGE_SVG}}
  </g>

  <!-- Audit details -->
  <circle cx="57" cy="488" r="2.5" fill="#48CAE4" opacity="0.7"/>
  <text x="67" y="491" font-family="'Courier New',monospace" font-size="8.5" fill="#888">Entry</text>
  <text x="132" y="491" font-family="'Courier New',monospace" font-size="8.5" fill="#E8A96A" font-weight="bold">{{ENTRY_ID}}</text>

  <circle cx="57" cy="506" r="2.5" fill="#a855f7" opacity="0.7"/>
  <text x="67" y="509" font-family="'Courier New',monospace" font-size="8.5" fill="#888">SHA‑256</text>
  <text x="132" y="509" font-family="'Courier New',monospace" font-size="8" fill="#48CAE4">{{SHA256_FIRST16}}…</text>

  <circle cx="57" cy="524" r="2.5" fill="#f0a500" opacity="0.7"/>
  <text x="67" y="527" font-family="'Courier New',monospace" font-size="8.5" fill="#888">Verify</text>
  <text x="132" y="527" font-family="'Courier New',monospace" font-size="8.5" fill="#48CAE4">{{VERIFY_URL}}</text>

  <!-- SIGNATURE — now a placeholder -->
  <text x="250" y="591" font-family="'Courier New',monospace" font-size="8" fill="#CD7F32" text-anchor="middle">ISSUED BY {{AUDITOR_NAME}} · AIONSYSTEM</text>
  <text x="250" y="605" font-family="'Courier New',monospace" font-size="6.5" fill="#666" text-anchor="middle">Digital signature appended to STP ledger entry</text>

  <!-- VALIDITY + SCOPE BAR -->
  <rect x="35" y="615" width="430" height="42" rx="8" fill="#060610" fill-opacity="0.7" stroke="#CD7F32" stroke-width="0.7" stroke-opacity="0.4"/>
  <text x="52" y="632" font-family="'Courier New',monospace" font-size="6" fill="#CD7F32" fill-opacity="0.5" letter-spacing="1.5">VALID THROUGH</text>
  <text x="52" y="645" font-family="'Courier New',monospace" font-size="8" fill="#E8A96A" font-weight="bold">{{VALID_THROUGH}}</text>
  <line x1="250" y1="621" x2="250" y2="653" stroke="#CD7F32" stroke-width="0.4" stroke-opacity="0.3"/>
  <text x="262" y="632" font-family="'Courier New',monospace" font-size="6" fill="#CD7F32" fill-opacity="0.5" letter-spacing="1.5">SCOPE</text>
  <text x="262" y="645" font-family="'Courier New',monospace" font-size="8" fill="#E8A96A" font-weight="bold">{{AUDIT_SCOPE_CODE}}</text>

  <!-- MICRO‑TEXT -->
  <text x="-100" y="740" font-family="'Courier New',monospace" font-size="4" fill="#CD7F32" opacity="0.18" letter-spacing="1.5">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AUDITOR CREDENTIAL · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AUDITOR CREDENTIAL</text>
  <text x="-100" y="746" font-family="'Courier New',monospace" font-size="4" fill="#48CAE4" opacity="0.11" letter-spacing="1.5">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AUDITOR CREDENTIAL · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · CERTIFIED AUDITOR CREDENTIAL</text>

  <!-- OVERLAYS -->
  <rect width="500" height="680" rx="28" fill="url(#depthField)" clip-path="url(#cardClip)" pointer-events="none"/>
  <rect width="500" height="680" rx="28" fill="url(#gloss)" clip-path="url(#cardClip)" pointer-events="none"/>
</svg>
