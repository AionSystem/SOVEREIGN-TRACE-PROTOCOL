<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 680" width="500" height="680">
  <!--
    FOUNDER'S COMPACT SOVEREIGN SEAL — smv1
    Pitch black · Tricolour border · Matrix watermark
    Only for audits bearing STP‑AUDITOR‑0001
  -->
  <defs>
    <!-- Pitch black background (darker) -->
    <linearGradient id="bgDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020203"/>
      <stop offset="35%" stop-color="#050508"/>
      <stop offset="65%" stop-color="#020203"/>
      <stop offset="100%" stop-color="#010101"/>
    </linearGradient>

    <!-- Tricolour outer border layers -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="30%" stop-color="#F5E08A"/>
      <stop offset="60%" stop-color="#C5A028"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="silverBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="30%" stop-color="#E8E8E8"/>
      <stop offset="60%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="bronzeBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD7F32"/>
      <stop offset="30%" stop-color="#E8A96A"/>
      <stop offset="60%" stop-color="#B5692A"/>
      <stop offset="100%" stop-color="#7A4010"/>
    </linearGradient>

    <linearGradient id="innerBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#F5E08A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Ribbons (tricolour inspired) -->
    <linearGradient id="ribbonGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="20%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E08A"/>
      <stop offset="80%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="ribbonBlack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="20%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#333333"/>
      <stop offset="80%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Watermark layers (double brightness) -->
    <pattern id="matrix" width="32" height="32" patternUnits="userSpaceOnUse">
      <text x="2" y="16" font-family="'Courier New',monospace" font-size="10" fill="#D4AF37" opacity="0.16">0</text>
      <text x="12" y="26" font-family="'Courier New',monospace" font-size="8" fill="#D4AF37" opacity="0.12">1</text>
      <text x="22" y="10" font-family="'Courier New',monospace" font-size="11" fill="#D4AF37" opacity="0.14">;</text>
    </pattern>
    <pattern id="hexMesh" width="38" height="33" patternUnits="userSpaceOnUse">
      <polygon points="19,1 37,9 37,23 19,31 1,23 1,9" fill="none" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.12"/>
    </pattern>
    <pattern id="aionMark" width="272" height="272" patternUnits="userSpaceOnUse" patternTransform="rotate(-28)">
      <text x="0" y="40" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.14" letter-spacing="4">AI/ON</text>
      <text x="136" y="176" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.14" letter-spacing="4">AI/ON</text>
      <text x="68" y="272" font-family="'Courier New',monospace" font-size="35" font-weight="bold" fill="#D4AF37" opacity="0.10" letter-spacing="4">AI/ON</text>
    </pattern>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="500" height="680" rx="28"/>
    </clipPath>
  </defs>

  <!-- Base pitch black -->
  <rect width="500" height="680" rx="28" fill="url(#bgDeep)"/>

  <!-- Watermarks -->
  <rect width="500" height="680" rx="28" fill="url(#aionMark)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#hexMesh)" clip-path="url(#cardClip)"/>
  <rect width="500" height="680" rx="28" fill="url(#matrix)" clip-path="url(#cardClip)"/>

  <!-- Tricolour ribbon border (layered) -->
  <!-- Gold outer -->
  <rect x="2.5" y="2.5" width="495" height="675" rx="27" fill="none" stroke="url(#goldBorder)" stroke-width="5"/>
  <!-- Gap (black) -->
  <rect x="2.5" y="2.5" width="495" height="675" rx="27" fill="none" stroke="#000000" stroke-width="4"/>
  <!-- Silver middle -->
  <rect x="2.5" y="2.5" width="495" height="675" rx="27" fill="none" stroke="url(#silverBorder)" stroke-width="3.5"/>
  <!-- Gap (black) -->
  <rect x="2.5" y="2.5" width="495" height="675" rx="27" fill="none" stroke="#000000" stroke-width="2.5"/>
  <!-- Bronze inner -->
  <rect x="2.5" y="2.5" width="495" height="675" rx="27" fill="none" stroke="url(#bronzeBorder)" stroke-width="2.5"/>

  <!-- Secondary inner borders -->
  <rect x="8" y="8" width="484" height="664" rx="23" fill="none" stroke="url(#innerBorder)" stroke-width="1"/>
  <rect x="13" y="13" width="474" height="654" rx="19" fill="none" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.2"/>

  <!-- TOP RIBBONS (Founder version) -->
  <!-- Gold ribbon -->
  <rect x="0" y="36" width="500" height="24" fill="url(#ribbonGold)" opacity="0.98"/>
  <text x="250" y="52" font-family="'Georgia','Times New Roman',serif" font-size="11.5" font-weight="bold" letter-spacing="4.5" fill="#0a0a14" text-anchor="middle" opacity="0.95">FOUNDER'S SOVEREIGN SEAL</text>

  <!-- Black ribbon with gold text -->
  <rect x="0" y="60" width="500" height="18" fill="url(#ribbonBlack)" opacity="0.94"/>
  <text x="250" y="73.5" font-family="'Georgia','Times New Roman',serif" font-size="9" font-weight="bold" letter-spacing="3.5" fill="#D4AF37" text-anchor="middle" opacity="0.9">ONLY ISSUED BY STP‑AUDITOR‑0001</text>

  <!-- Corner marks (gold) -->
  <g stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.5" stroke-linecap="square" fill="none">
    <path d="M22,22 L22,50 M22,22 L50,22"/>
    <path d="M478,22 L478,50 M478,22 L450,22"/>
    <path d="M22,658 L22,630 M22,658 L50,658"/>
    <path d="M478,658 L478,630 M478,658 L450,658"/>
  </g>

  <!-- FOUNDER'S BADGE (centre) – replace href with your aion_logo2.jpg or SVG -->
  <image x="95" y="87" width="270" height="270" href="/assets/badges/stp_auditor_badge_founder.svg"/>

  <!-- QR CODE (beside badge) -->
  <rect x="385" y="190" width="58" height="58" rx="7" fill="#010102" stroke="#D4AF37" stroke-width="1.6"/>
  <image x="390" y="195" width="48" height="48" href="{{QR_CODE_URL}}"/>
  <text x="414" y="260" font-family="'Courier New',monospace" font-size="6" fill="#555" text-anchor="middle" letter-spacing="1.5">SCAN</text>

  <!-- VERIFICATION PANEL -->
  <rect x="35" y="378" width="430" height="175" rx="14" fill="#020203" stroke="#D4AF37" stroke-width="1.6" stroke-opacity="0.6"/>
  <rect x="35" y="378" width="430" height="28" rx="14" fill="#D4AF37" fill-opacity="0.12"/>
  <text x="250" y="397" font-family="'Courier New',monospace" font-size="9.5" fill="#D4AF37" font-weight="bold" text-anchor="middle" letter-spacing="2.5">VERIFIED CERTIFICATION</text>
  <line x1="55" y1="409" x2="445" y2="409" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Auditor line -->
  <text x="250" y="428" font-family="'Courier New',monospace" font-size="8.5" text-anchor="middle">
    <tspan fill="#DAA520">◈ </tspan>
    <tspan fill="#D4AF37">Certified by STP‑AUDITOR‑0001 (Founding Badge)</tspan>
  </text>

  <!-- Tier badge slot -->
  <g transform="translate(155, 438) scale(0.75)">
    {{SOVEREIGN_TIER_BADGE_SVG}}
  </g>

  <!-- Audit details -->
  <circle cx="57" cy="488" r="2.5" fill="#48CAE4" opacity="0.7"/>
  <text x="67" y="491" font-family="'Courier New',monospace" font-size="8.5" fill="#888">Entry</text>
  <text x="132" y="491" font-family="'Courier New',monospace" font-size="8.5" fill="#E8A96A" font-weight="bold">{{ENTRY_ID}}</text>

  <circle cx="57" cy="506" r="2.5" fill="#D4AF37" opacity="0.7"/>
  <text x="67" y="509" font-family="'Courier New',monospace" font-size="8.5" fill="#888">SHA‑256</text>
  <text x="132" y="509" font-family="'Courier New',monospace" font-size="8" fill="#48CAE4">{{SHA256_FIRST16}}…</text>

  <circle cx="57" cy="524" r="2.5" fill="#D4AF37" opacity="0.7"/>
  <text x="67" y="527" font-family="'Courier New',monospace" font-size="8.5" fill="#888">Verify</text>
  <text x="132" y="527" font-family="'Courier New',monospace" font-size="8.5" fill="#48CAE4">{{VERIFY_URL}}</text>

  <!-- SIGNATURE (FOUNDER) -->
  <text x="250" y="591" font-family="'Courier New',monospace" font-size="8" fill="#D4AF37" text-anchor="middle">ISSUED BY SHELDON K. SALMON · AIONSYSTEM</text>
  <text x="250" y="605" font-family="'Courier New',monospace" font-size="6.5" fill="#666" text-anchor="middle">Digital signature appended to STP ledger entry</text>

  <!-- VALIDITY + SCOPE BAR -->
  <rect x="35" y="615" width="430" height="42" rx="8" fill="#010102" fill-opacity="0.8" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="52" y="632" font-family="'Courier New',monospace" font-size="6" fill="#D4AF37" fill-opacity="0.5" letter-spacing="1.5">VALID THROUGH</text>
  <text x="52" y="645" font-family="'Courier New',monospace" font-size="8" fill="#E8A96A" font-weight="bold">{{VALID_THROUGH}}</text>
  <line x1="250" y1="621" x2="250" y2="653" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.3"/>
  <text x="262" y="632" font-family="'Courier New',monospace" font-size="6" fill="#D4AF37" fill-opacity="0.5" letter-spacing="1.5">SCOPE</text>
  <text x="262" y="645" font-family="'Courier New',monospace" font-size="8" fill="#E8A96A" font-weight="bold">{{AUDIT_SCOPE_CODE}}</text>

  <!-- Micro‑text (gold, double brightness) -->
  <text x="-100" y="740" font-family="'Courier New',monospace" font-size="4" fill="#D4AF37" opacity="0.28" letter-spacing="1.5">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · FOUNDING AUDITOR · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · FOUNDING AUDITOR</text>
  <text x="-100" y="746" font-family="'Courier New',monospace" font-size="4" fill="#48CAE4" opacity="0.16" letter-spacing="1.5">AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · FOUNDING AUDITOR · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · FOUNDING AUDITOR</text>

  <!-- Overlays -->
  <rect width="500" height="680" rx="28" fill="url(#depthField)" clip-path="url(#cardClip)" pointer-events="none"/>
</svg>
