<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 680" width="500" height="680">
  <defs>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F1A"/>
      <stop offset="35%" stop-color="#050810"/>
      <stop offset="65%" stop-color="#0A1020"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>
    <linearGradient id="borderSilverBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="25%" stop-color="#C0C0C0"/>
      <stop offset="50%" stop-color="#A8A8A8"/>
      <stop offset="75%" stop-color="#48CAE4"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="ribbonSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="20%" stop-color="#6b7a99"/>
      <stop offset="50%" stop-color="#c8d4e8"/>
      <stop offset="80%" stop-color="#6b7a99"/>
      <stop offset="100%" stop-color="#2a3040"/>
    </linearGradient>
    <linearGradient id="verifyBarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#05050A"/>
    </linearGradient>
    <radialGradient id="depthField" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="gloss" cx="20%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClip"><rect x="0" y="0" width="500" height="680" rx="28"/></clipPath>
  </defs>

  <rect width="500" height="680" rx="28" fill="url(#bgDark)"/>
  <rect x="2.5" y="2.5" width="495" height="675" rx="27" fill="none" stroke="url(#borderSilverBlue)" stroke-width="2"/>
  <rect x="8" y="8" width="484" height="664" rx="23" fill="none" stroke="#48CAE4" stroke-width="0.6" stroke-opacity="0.4"/>

  <rect x="0" y="36" width="500" height="22" fill="url(#ribbonSilver)" opacity="0.97"/>
  <text x="250" y="52" font-family="'Georgia',serif" font-size="11" font-weight="bold" letter-spacing="4" fill="#0a0a14" text-anchor="middle">PROFESSIONAL AI PRACTITIONER</text>
  <rect x="0" y="58" width="500" height="16" fill="#05080F" opacity="0.9"/>
  <text x="250" y="70" font-family="'Courier New',monospace" font-size="8" letter-spacing="2" fill="#48CAE4" text-anchor="middle">CONSTITUTIONAL AI PRACTITIONER — CAPC</text>

  <!-- CAPC Badge -->
  <rect x="90" y="82" width="280" height="280" rx="8" fill="#05080F" fill-opacity="0.5"/>
  <image x="95" y="87" width="270" height="270" href="{{CAPC_BADGE_URL}}"/>

  <!-- QR Code -->
  <rect x="385" y="190" width="58" height="58" rx="7" fill="#05080F" stroke="url(#borderSilverBlue)" stroke-width="1.2"/>
  <image x="390" y="195" width="48" height="48" href="{{QR_CODE_URL}}"/>
  <text x="414" y="260" font-family="'Courier New',monospace" font-size="6" fill="#48CAE4" text-anchor="middle">SCAN</text>

  <!-- Verification Panel -->
  <rect x="35" y="378" width="430" height="160" rx="14" fill="url(#verifyBarBg)" stroke="#48CAE4" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="35" y="378" width="430" height="28" rx="14" fill="#48CAE4" fill-opacity="0.08"/>
  <text x="250" y="397" font-family="'Courier New',monospace" font-size="9" font-weight="bold" fill="#48CAE4" text-anchor="middle" letter-spacing="2">CAPC — CERTIFIED PRACTITIONER</text>
  <line x1="55" y1="409" x2="445" y2="409" stroke="#48CAE4" stroke-width="0.4" stroke-opacity="0.4"/>

  <text x="250" y="430" font-family="'Courier New',monospace" font-size="8.5" text-anchor="middle">
    <tspan fill="#48CAE4">◈ </tspan>
    <tspan fill="#C0C0C0">Practitioner: {{PRACTITIONER_NAME}}</tspan>
  </text>
  <text x="250" y="447" font-family="'Courier New',monospace" font-size="8.5" fill="#888" text-anchor="middle">Specialization: {{SPECIALIZATION}}</text>

  <circle cx="57" cy="480" r="2.5" fill="#48CAE4" opacity="0.7"/>
  <text x="67" y="483" font-family="'Courier New',monospace" font-size="8" fill="#888">CAPC ID</text>
  <text x="132" y="483" font-family="'Courier New',monospace" font-size="8" fill="#48CAE4" font-weight="bold">{{CAPC_ID}}</text>

  <circle cx="57" cy="498" r="2.5" fill="#C0C0C0" opacity="0.7"/>
  <text x="67" y="501" font-family="'Courier New',monospace" font-size="8" fill="#888">SHA‑256</text>
  <text x="132" y="501" font-family="'Courier New',monospace" font-size="7.5" fill="#48CAE4">{{SHA256_FIRST16}}…</text>

  <circle cx="57" cy="516" r="2.5" fill="#A8A8A8" opacity="0.7"/>
  <text x="67" y="519" font-family="'Courier New',monospace" font-size="8" fill="#888">Verify</text>
  <text x="132" y="519" font-family="'Courier New',monospace" font-size="8" fill="#48CAE4">{{VERIFY_URL}}</text>

  <text x="250" y="565" font-family="'Courier New',monospace" font-size="8" fill="#48CAE4" text-anchor="middle">ISSUED {{ISSUED_DATE}} · EXPIRES {{EXPIRES_DATE}}</text>

  <rect x="35" y="620" width="430" height="35" rx="8" fill="#020408" fill-opacity="0.8" stroke="#48CAE4" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="52" y="637" font-family="'Courier New',monospace" font-size="6" fill="#48CAE4" opacity="0.6">CONSTITUTION v2.1</text>
  <text x="52" y="648" font-family="'Courier New',monospace" font-size="7" fill="#C0C0C0" font-weight="bold">CONSTITUTIONAL AI PRACTITIONER CREDENTIAL</text>
  <text x="440" y="645" font-family="'Courier New',monospace" font-size="6" fill="#48CAE4" text-anchor="end">TRUST REGISTRY SEALED</text>

  <text x="-100" y="690" font-family="'Courier New',monospace" font-size="4" fill="#48CAE4" opacity="0.15" letter-spacing="1">AIONSYSTEM · CAPC · CONSTITUTIONAL AI PRACTITIONER · NON-TRANSFERABLE · SHA-256 · STP SEALED</text>

  <rect width="500" height="680" rx="28" fill="url(#depthField)" clip-path="url(#cardClip)" pointer-events="none"/>
  <rect width="500" height="680" rx="28" fill="url(#gloss)" clip-path="url(#cardClip)" pointer-events="none"/>
</svg>
