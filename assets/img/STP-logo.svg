<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="750" height="750">
  <defs> 
    <!-- Premium Platinum Metallic Gradient -->
    <linearGradient id="platinum" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#E2E8F0"/>
      <stop offset="50%" stop-color="#94A3B8"/>
      <stop offset="80%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <!-- Deep Slate Core Background -->
    <radialGradient id="darkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- Subtle Tech Cyan Accent -->
    <linearGradient id="techCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>

    <!-- Drop Shadow for Premium Depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ================= OUTER BEZEL & RINGS ================= -->
  <!-- Main Thick Platinum Border -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="url(#platinum)" stroke-width="12" filter="url(#shadow)"/>
  
  <!-- Inner Thin Accent Ring -->
  <circle cx="250" cy="250" r="228" fill="none" stroke="url(#platinum)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Precision Tick Marks (Watch Bezel Style) -->
  <circle cx="250" cy="250" r="215" fill="none" stroke="url(#platinum)" stroke-width="6" stroke-dasharray="2 11.56" opacity="0.8"/>
  
  <!-- Inner Boundary for Text Track -->
  <circle cx="250" cy="250" r="208" fill="none" stroke="url(#platinum)" stroke-width="1" opacity="0.3"/>

  <!-- ================= TYPOGRAPHY ================= -->
  <!-- Top Text Path -->
  <path id="topArc" d="M 50,250 A 200,200 0 0,1 450,250" fill="none"/>
  <!-- Bottom Text Path -->
  <path id="bottomArc" d="M 450,250 A 200,200 0 0,1 50,250" fill="none"/>

  <!-- Top Text: SOVEREIGN TRACE PROTOCOL -->
  <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="url(#platinum)" letter-spacing="5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">SOVEREIGN TRACE PROTOCOL</textPath>
  </text>

  <!-- Bottom Text: FROZEN-4.0 • SHA-256 -->
  <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="url(#techCyan)" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">FROZEN-4.0 • SHA-256</textPath>
  </text>

  <!-- Separator Dots (3 & 9 o'clock) -->
  <circle cx="50" cy="250" r="4" fill="url(#platinum)"/>
  <circle cx="450" cy="250" r="4" fill="url(#platinum)"/>

  <!-- ================= INNER CORE ================= -->
  <!-- Dark Premium Background -->
  <circle cx="250" cy="250" r="160" fill="url(#darkCore)" stroke="url(#platinum)" stroke-width="3"/>
  
  <!-- Subtle Cyan Inner Ring -->
  <circle cx="250" cy="250" r="150" fill="none" stroke="url(#techCyan)" stroke-width="1.5" opacity="0.4"/>

  <!-- ================= CENTER EMBLEM ================= -->
  <g transform="translate(250, 250)">
    
    <!-- Modern Geometric Shield Outline -->
    <path d="M 0,-110 L 85,-75 L 85,25 C 85,80 0,130 0,130 C 0,130 -85,80 -85,25 L -85,-75 Z" 
          fill="none" stroke="url(#platinum)" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Inner Shield Accent Line -->
    <path d="M 0,-95 L 72,-65 L 72,20 C 72,65 0,110 0,110 C 0,110 -72,65 -72,20 L -72,-65 Z" 
          fill="none" stroke="url(#techCyan)" stroke-width="1.5" opacity="0.5"/>

    <!-- Minimalist Global Wireframe (Trace/Network Motif) -->
    <g opacity="0.35" stroke="url(#techCyan)" stroke-width="1.5" fill="none">
      <ellipse cx="0" cy="-15" rx="45" ry="15"/>
      <ellipse cx="0" cy="-15" rx="15" ry="45"/>
      <circle cx="0" cy="-15" r="45"/>
    </g>

    <!-- Bold STP Monogram -->
    <text x="0" y="15" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="url(#platinum)" text-anchor="middle" letter-spacing="2">STP</text>
    
    <!-- Triple-Time Seal Indicator (3 Subtle Nodes) -->
    <circle cx="-20" cy="45" r="3.5" fill="url(#techCyan)"/>
    <circle cx="0" cy="55" r="3.5" fill="url(#techCyan)"/>
    <circle cx="20" cy="45" r="3.5" fill="url(#techCyan)"/>
    
  </g>
</svg>
