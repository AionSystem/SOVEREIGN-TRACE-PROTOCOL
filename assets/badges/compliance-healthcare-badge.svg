<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90" role="img">
  <title>Healthcare AI Compliance Badge — AionSystem</title>
  <defs>
    <linearGradient id="hBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001818"/>
      <stop offset="50%" stop-color="#000f10"/>
      <stop offset="100%" stop-color="#00080a"/>
    </linearGradient>
    <linearGradient id="hRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006060"/>
      <stop offset="30%" stop-color="#00c8b4"/>
      <stop offset="55%" stop-color="#e8f8f8"/>
      <stop offset="80%" stop-color="#00a898"/>
      <stop offset="100%" stop-color="#004040"/>
    </linearGradient>
    <linearGradient id="hRimInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003030"/>
      <stop offset="50%" stop-color="#006b5a"/>
      <stop offset="100%" stop-color="#004040"/>
    </linearGradient>
    <linearGradient id="hDiv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c8b4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00c8b4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00c8b4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001818"/>
      <stop offset="30%" stop-color="#00c8b4"/>
      <stop offset="50%" stop-color="#e8f8f8"/>
      <stop offset="70%" stop-color="#00c8b4"/>
      <stop offset="100%" stop-color="#001818"/>
    </linearGradient>
    <radialGradient id="hShield" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#002828"/>
      <stop offset="100%" stop-color="#000c0c"/>
    </radialGradient>
  </defs>

  <!-- outer rim -->
  <rect x="0" y="0" width="320" height="90" rx="5" fill="url(#hRim)" filter="drop-shadow(0 4px 10px rgba(0,0,0,0.9))"/>

  <!-- body -->
  <rect x="2" y="2" width="316" height="86" rx="4" fill="url(#hBg)"/>

  <!-- inner accent -->
  <rect x="4" y="4" width="312" height="82" rx="3" fill="none" stroke="url(#hRimInner)" stroke-width="0.8" opacity="0.6"/>

  <!-- NON‑TRANSFERABLE strip -->
  <rect x="2" y="2" width="316" height="13" rx="4" fill="#000d0e"/>
  <rect x="2" y="14" width="316" height="1" fill="url(#hBar)" opacity="0.7"/>
  <text x="160" y="12" font-family="'Courier New', monospace" font-size="6.5" font-weight="bold" letter-spacing="3" fill="#00c8b4" text-anchor="middle">NON‑TRANSFERABLE</text>

  <!-- left panel -->
  <rect x="2" y="15" width="74" height="73" fill="#00c8b4" fill-opacity="0.03"/>
  <rect x="75" y="15" width="1" height="73" fill="url(#hDiv)"/>

  <!-- medical cross inside shield -->
  <path d="M38,23 L58,29 L58,50 Q58,64 38,72 Q18,64 18,50 L18,29 Z" fill="url(#hShield)" stroke="url(#hRim)" stroke-width="1.5" filter="drop-shadow(0 0 3px rgba(0,200,180,0.4))"/>
  <path d="M38,26 L55,31 L55,50 Q55,62 38,69 Q21,62 21,50 L21,31 Z" fill="none" stroke="#003030" stroke-width="0.5" opacity="0.5"/>

  <!-- medical cross -->
  <rect x="33" y="36" width="10" height="22" rx="1.5" fill="#00c8b4" opacity="0.85"/>
  <rect x="28" y="41" width="20" height="10" rx="1.5" fill="#00c8b4" opacity="0.85"/>
  <rect x="34" y="37" width="3" height="4" rx="0.5" fill="#e8f8f8" opacity="0.4"/>

  <!-- right panel -->
  <text x="198" y="29" font-family="'Georgia','Times New Roman',serif" font-size="7" font-weight="bold" letter-spacing="1.5" fill="#006b5a" text-anchor="middle">CLINICAL AI · CONSTITUTION v2.1</text>

  <line x1="86" y1="33" x2="310" y2="33" stroke="#00c8b4" stroke-width="0.4" opacity="0.3"/>

  <text x="198" y="58" font-family="'Georgia','Times New Roman',serif" font-size="21" font-weight="bold" letter-spacing="3" fill="#00c8b4" text-anchor="middle" filter="drop-shadow(0 0 3px rgba(0,200,180,0.3))">COMPLIANT</text>

  <line x1="86" y1="63" x2="310" y2="63" stroke="#00c8b4" stroke-width="0.4" opacity="0.3"/>
  <rect x="86" y="64" width="224" height="1.5" fill="url(#hRimInner)" opacity="0.6"/>

  <text x="198" y="79" font-family="'Courier New',monospace" font-size="6.5" letter-spacing="1.5" fill="#006b5a" text-anchor="middle">AIONSYSTEM · HEALTHCARE AI · SHA‑256 SEALED</text>

  <!-- node dots -->
  <circle cx="102" cy="72" r="1.2" fill="#e8f8f8" opacity="0.35"/>
  <circle cx="114" cy="70" r="0.8" fill="#e8f8f8" opacity="0.25"/>
  <circle cx="286" cy="72" r="1.2" fill="#e8f8f8" opacity="0.35"/>
  <circle cx="298" cy="70" r="0.8" fill="#e8f8f8" opacity="0.25"/>
  <line x1="102" y1="72" x2="114" y2="70" stroke="#00c8b4" stroke-width="0.4" opacity="0.2"/>
  <line x1="286" y1="72" x2="298" y2="70" stroke="#00c8b4" stroke-width="0.4" opacity="0.2"/>

  <!-- corner marks -->
  <g stroke="#00c8b4" stroke-width="1" opacity="0.4" fill="none">
    <path d="M8,8 L8,14 M8,8 L14,8"/>
    <path d="M312,8 L312,14 M312,8 L306,8"/>
    <path d="M8,82 L8,76 M8,82 L14,82"/>
    <path d="M312,82 L312,76 M312,82 L306,82"/>
  </g>

  <!-- stars -->
  <circle cx="92" cy="21" r="0.6" fill="#e8f8f8" opacity="0.25"/>
  <circle cx="135" cy="18" r="0.4" fill="#00c8b4" opacity="0.3"/>
  <circle cx="260" cy="20" r="0.5" fill="#e8f8f8" opacity="0.22"/>
  <circle cx="295" cy="23" r="0.4" fill="#00c8b4" opacity="0.35"/>
  <circle cx="110" cy="80" r="0.4" fill="#e8f8f8" opacity="0.2"/>
  <circle cx="280" cy="79" r="0.5" fill="#00c8b4" opacity="0.25"/>
</svg>
