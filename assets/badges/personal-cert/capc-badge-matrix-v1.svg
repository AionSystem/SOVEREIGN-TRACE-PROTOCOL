<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 540" width="360" height="540">
  <defs>
    <!-- Matrix dark background gradient -->
    <linearGradient id="matrixBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A140A"/>
      <stop offset="50%" stop-color="#0C1A0C"/>
      <stop offset="100%" stop-color="#050A05"/>
    </linearGradient>

    <!-- Neon green outer border gradient -->
    <linearGradient id="neonBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF41"/>
      <stop offset="40%" stop-color="#39FF14"/>
      <stop offset="70%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00BFFF"/> <!-- cyan twist -->
    </linearGradient>

    <!-- Cyan twist accent -->
    <linearGradient id="cyanTwist" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001F2E"/>
      <stop offset="30%" stop-color="#00FFFF"/>
      <stop offset="50%" stop-color="#00B4D8"/>
      <stop offset="70%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#001F2E"/>
    </linearGradient>

    <!-- Silver/green inner border -->
    <linearGradient id="silverGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF41"/>
      <stop offset="60%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="shadowDeep" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <filter id="cyanGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Dual‑band watermarks (cyan + green) -->
    <linearGradient id="watermarkGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="20%" stop-color="#39FF14" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#39FF14" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="watermarkCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00FFFF" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#00B4D8" stop-opacity="0.12"/>
      <stop offset="75%" stop-color="#00FFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Wave border clip path (sinusoidal on left/right) -->
    <clipPath id="waveClip">
      <path d="
        M 30 20
        L 330 20
        Q 335 20, 335 25
        L 335 515
        Q 335 520, 330 520
        L 30 520
        Q 25 520, 25 515
        L 25 25
        Q 25 20, 30 20
        Z
      "/>
    </clipPath>

    <clipPath id="innerWaveClip">
      <path d="
        M 36 28
        L 324 28
        Q 328 28, 328 32
        L 328 508
        Q 328 512, 324 512
        L 36 512
        Q 32 512, 32 508
        L 32 32
        Q 32 28, 36 28
        Z
      "/>
    </clipPath>
  </defs>

  <!-- Outer wave border (neon green + cyan twist) -->
  <path d="
    M 30 20
    Q 25 20, 25 25
    L 25 515
    Q 25 520, 30 520
    L 330 520
    Q 335 520, 335 515
    L 335 25
    Q 335 20, 330 20
    Z
  " fill="url(#neonBorder)" filter="url(#shadowDeep)"/>

  <!-- Inner rectangle (matrix background) -->
  <path d="
    M 36 28
    Q 32 28, 32 32
    L 32 508
    Q 32 512, 36 512
    L 324 512
    Q 328 512, 328 508
    L 328 32
    Q 328 28, 324 28
    Z
  " fill="url(#matrixBg)"/>

  <!-- Dual‑band watermark layers -->
  <rect x="32" y="140" width="296" height="80" fill="url(#watermarkGreen)" clip-path="url(#innerWaveClip)"/>
  <rect x="32" y="220" width="296" height="80" fill="url(#watermarkCyan)" clip-path="url(#innerWaveClip)"/>

  <!-- Background decorative matrix code rain (subtle) -->
  <g clip-path="url(#innerWaveClip)" opacity="0.08">
    <text x="60" y="100" font-family="'Courier New',monospace" font-size="10" fill="#00FF41">01 10 11 00</text>
    <text x="140" y="150" font-family="'Courier New',monospace" font-size="10" fill="#00FFFF">11 01 10 01</text>
    <text x="220" y="120" font-family="'Courier New',monospace" font-size="10" fill="#00FF41">10 11 00 01</text>
    <text x="280" y="180" font-family="'Courier New',monospace" font-size="10" fill="#00FFFF">01 10 11 00</text>
    <text x="80" y="250" font-family="'Courier New',monospace" font-size="10" fill="#39FF14">10 01 10 11</text>
    <text x="180" y="300" font-family="'Courier New',monospace" font-size="10" fill="#00FFFF">11 00 01 10</text>
    <text x="260" y="350" font-family="'Courier New',monospace" font-size="10" fill="#00FF41">01 11 10 01</text>
    <text x="100" y="420" font-family="'Courier New',monospace" font-size="10" fill="#39FF14">11 10 01 00</text>
  </g>

  <!-- Crystalline facet lines (from auditor badge, adapted) -->
  <g clip-path="url(#innerWaveClip)" opacity="0.15">
    <line x1="32" y1="100" x2="180" y2="160" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="328" y1="100" x2="180" y2="160" stroke="#00FFFF" stroke-width="0.5"/>
    <line x1="32" y1="200" x2="120" y2="240" stroke="#00FF41" stroke-width="0.4"/>
    <line x1="328" y1="200" x2="240" y2="240" stroke="#00FFFF" stroke-width="0.4"/>
    <line x1="32" y1="320" x2="180" y2="380" stroke="#00FF41" stroke-width="0.3"/>
    <line x1="328" y1="320" x2="180" y2="380" stroke="#00FFFF" stroke-width="0.3"/>
  </g>

  <!-- Inner border (silver/green) -->
  <path d="
    M 40 32
    L 320 32
    Q 324 32, 324 36
    L 324 504
    Q 324 508, 320 508
    L 40 508
    Q 36 508, 36 504
    L 36 36
    Q 36 32, 40 32
    Z
  " fill="none" stroke="url(#silverGreen)" stroke-width="1.2" opacity="0.7"/>

  <!-- Micro‑text security band (horizontal) -->
  <g clip-path="url(#innerWaveClip)">
    <text x="180" y="258" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
          fill="#00FF41" text-anchor="middle" opacity="0.22">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · TRIPLE-TIME SEALED · CAPC ·
    </text>
    <text x="180" y="265" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
          fill="#00FFFF" text-anchor="middle" opacity="0.14">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · TRIPLE-TIME SEALED · CAPC ·
    </text>
    <!-- Vertical micro‑text (rotated) -->
    <text x="180" y="258" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
          fill="#00FF41" text-anchor="middle" opacity="0.22"
          transform="rotate(-90, 180, 261)">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · TRIPLE-TIME SEALED · CAPC ·
    </text>
    <text x="180" y="265" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
          fill="#00FFFF" text-anchor="middle" opacity="0.14"
          transform="rotate(-90, 180, 261)">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · TRIPLE-TIME SEALED · CAPC ·
    </text>
  </g>

  <!-- ═══ TOP BANNER: NON-TRANSFERABLE ═══ -->
  <rect x="40" y="36" width="280" height="22" fill="#050A05"/>
  <rect x="40" y="36" width="280" height="1.5" fill="url(#neonBorder)" opacity="0.9"/>
  <rect x="40" y="58" width="280" height="1.5" fill="url(#neonBorder)" opacity="0.9"/>
  <text x="180" y="50" font-family="'Courier New',monospace" font-size="8" font-weight="bold"
        letter-spacing="3" fill="#00FF41" text-anchor="middle" filter="url(#neonGlow)">NON-TRANSFERABLE</text>

  <!-- ═══ MAIN TITLE ═══ -->
  <rect x="40" y="60" width="280" height="28" fill="#0C1A0C"/>
  <rect x="40" y="60" width="280" height="1.5" fill="url(#cyanTwist)" opacity="0.9"/>
  <rect x="40" y="88" width="280" height="1.5" fill="url(#cyanTwist)" opacity="0.5"/>
  <text x="180" y="80" font-family="'Georgia','Times New Roman',serif" font-size="11" font-weight="bold"
        letter-spacing="2" fill="#00FF41" text-anchor="middle" filter="url(#neonGlow)">CONSTITUTIONAL AI PRACTITIONER</text>

  <!-- ═══ TECH BANNER (SHA‑256 / STP) ═══ -->
  <rect x="40" y="88" width="280" height="20" fill="#030703"/>
  <rect x="40" y="88" width="280" height="1" fill="url(#cyanTwist)" opacity="0.4"/>
  <circle cx="60" cy="98" r="1.5" fill="#00FFFF" opacity="0.6"/>
  <circle cx="300" cy="98" r="1.5" fill="#00FFFF" opacity="0.6"/>
  <text x="180" y="102" font-family="'Courier New',monospace" font-size="7.5" letter-spacing="1.5"
        fill="#00FFFF" text-anchor="middle" filter="url(#cyanGlow)">SHA-256 · STP SEALED · CONSTITUTION v2.1</text>

  <!-- ═══ CENTRAL CAPC HEXAGON (matrix style) ═══ -->
  <g transform="translate(0, 8)">
    <polygon points="180,160 240,195 240,265 180,300 120,265 120,195" fill="#0A140A" stroke="#00FF41" stroke-width="1.5"/>
    <polygon points="180,165 235,198 235,262 180,295 125,262 125,198" fill="none" stroke="#00FFFF" stroke-width="0.3" stroke-opacity="0.3"/>
    <circle cx="180" cy="230" r="38" fill="#0C1A0C" stroke="#00FF41" stroke-width="0.5" stroke-opacity="0.4"/>
    <circle cx="180" cy="230" r="32" fill="none" stroke="#00FFFF" stroke-width="0.3" stroke-dasharray="2 6" opacity="0.4"/>
    <text x="180" y="238" font-family="'Georgia','Times New Roman',serif" font-size="36" font-weight="bold"
          fill="#00FF41" text-anchor="middle" filter="url(#neonGlow)">CAPC</text>
  </g>

  <!-- Separator -->
  <line x1="80" y1="312" x2="280" y2="312" stroke="#00FF41" stroke-width="0.5" opacity="0.4"/>

  <!-- Credential ID -->
  <text x="180" y="336" font-family="'Courier New',monospace" font-size="13" font-weight="bold"
        letter-spacing="1.5" fill="#E8E8E8" text-anchor="middle" filter="url(#neonGlow)">CAPC-2026-0000</text>

  <!-- Practitioner name -->
  <text x="180" y="365" font-family="'Georgia','Times New Roman',serif" font-size="16" font-weight="bold"
        letter-spacing="1" fill="#D0D0D0" text-anchor="middle">[PRACTITIONER NAME]</text>

  <!-- Specialization -->
  <text x="180" y="385" font-family="'Georgia',serif" font-size="9" letter-spacing="2"
        fill="#707070" text-anchor="middle">[SPECIALIZATION / DOMAIN]</text>

  <!-- Dates row -->
  <line x1="80" y1="396" x2="280" y2="396" stroke="#00FF41" stroke-width="0.5" opacity="0.35"/>
  <text x="152" y="410" font-family="'Courier New',monospace" font-size="8" letter-spacing="1"
        fill="#707070" text-anchor="middle">ISSUED</text>
  <text x="152" y="422" font-family="'Courier New',monospace" font-size="9" font-weight="bold"
        fill="#C0C0C0" text-anchor="middle">[YYYY-MM-DD]</text>
  <line x1="180" y1="401" x2="180" y2="428" stroke="#00FF41" stroke-width="0.5" opacity="0.4"/>
  <text x="208" y="410" font-family="'Courier New',monospace" font-size="8" letter-spacing="1"
        fill="#707070" text-anchor="middle">EXPIRES</text>
  <text x="208" y="422" font-family="'Courier New',monospace" font-size="9" font-weight="bold"
        fill="#C0C0C0" text-anchor="middle">[YYYY-MM-DD]</text>

  <!-- Trust Registry seal indicator -->
  <circle cx="180" cy="446" r="6" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.6"/>
  <circle cx="180" cy="446" r="2" fill="#00FFFF" opacity="0.9"/>
  <text x="180" y="462" font-family="'Courier New',monospace" font-size="6" letter-spacing="1"
        fill="#00FFFF" text-anchor="middle" opacity="0.7">TRUST REGISTRY SEALED</text>

  <!-- Additional micro‑text security band (bottom) -->
  <g clip-path="url(#innerWaveClip)">
    <text x="180" y="480" font-family="'Courier New',monospace" font-size="4" letter-spacing="1.5"
          fill="#00FF41" text-anchor="middle" opacity="0.2">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · TRIPLE-TIME SEALED · CAPC · MATRIX EDITION ·
    </text>
    <text x="180" y="486" font-family="'Courier New',monospace" font-size="4" letter-spacing="1.5"
          fill="#00FFFF" text-anchor="middle" opacity="0.12">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · TRIPLE-TIME SEALED · CAPC · MATRIX EDITION ·
    </text>
  </g>

  <!-- Corner marks (wave border accents) -->
  <polygon points="46,44 54,44 54,52 46,52" fill="#00FF41" opacity="0.5"/>
  <polygon points="314,44 306,44 306,52 314,52" fill="#00FF41" opacity="0.5"/>
  <polygon points="46,496 54,496 54,504 46,504" fill="#00FFFF" opacity="0.5"/>
  <polygon points="314,496 306,496 306,504 314,504" fill="#00FFFF" opacity="0.5"/>
  <text x="62" y="76" font-family="serif" font-size="8" fill="#00FF41" opacity="0.6" text-anchor="middle">◈</text>
  <text x="298" y="76" font-family="serif" font-size="8" fill="#00FFFF" opacity="0.6" text-anchor="middle">◈</text>
</svg>
