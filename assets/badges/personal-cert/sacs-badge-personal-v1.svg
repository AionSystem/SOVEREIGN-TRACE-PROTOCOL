  <!-- ═══ AI SYSTEM NAME ═══ -->
  <text x="180" y="360" font-family="'Georgia',serif" font-size="9" letter-spacing="2"
        fill="#A08060" text-anchor="middle">[AI SYSTEM NAME]</text>

  <!-- ═══ ISSUED DATE (LIFETIME) ═══ -->
  <line x1="80" y1="372" x2="280" y2="372" stroke="#D4AF37" stroke-width="0.5" opacity="0.35"/>
  <text x="152" y="386" font-family="'Courier New',monospace" font-size="8" letter-spacing="1"
        fill="#A08060" text-anchor="middle">ISSUED (LIFETIME)</text>
  <text x="152" y="398" font-family="'Courier New',monospace" font-size="9" font-weight="bold"
        fill="#C0C0C0" text-anchor="middle">[YYYY-MM-DD]</text>

  <!-- ═══ TRUST REGISTRY SEAL ═══ -->
  <circle cx="180" cy="422" r="6" fill="none" stroke="#CD7F32" stroke-width="1" opacity="0.6"/>
  <circle cx="180" cy="422" r="2" fill="#CD7F32" opacity="0.9"/>
  <text x="180" y="438" font-family="'Courier New',monospace" font-size="6" letter-spacing="1"
        fill="#CD7F32" text-anchor="middle" opacity="0.7">TRUST REGISTRY SEALED</text>

  <!-- ═══ BOTTOM MICRO‑TEXT ═══ -->
  <g clip-path="url(#innerWaveClip)">
    <text x="180" y="470" font-family="'Courier New',monospace" font-size="4" letter-spacing="1.5"
          fill="#D4AF37" text-anchor="middle" opacity="0.2">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · PERSONAL TRACK · SACS · CONSTITUTION v2.1 ·
    </text>
    <text x="180" y="476" font-family="'Courier New',monospace" font-size="4" letter-spacing="1.5"
          fill="#CD7F32" text-anchor="middle" opacity="0.12">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · PERSONAL TRACK · SACS · CONSTITUTION v2.1 ·
    </text>
  </g>

  <!-- ═══ CORNER MARKS ═══ -->
  <polygon points="46,44 54,44 54,52 46,52" fill="#D4AF37" opacity="0.5"/>
  <polygon points="314,44 306,44 306,52 314,52" fill="#D4AF37" opacity="0.5"/>
  <polygon points="46,496 54,496 54,504 46,504" fill="#CD7F32" opacity="0.5"/>
  <polygon points="314,496 306,496 306,504 314,504" fill="#CD7F32" opacity="0.5"/>
  <text x="62" y="76" font-family="serif" font-size="8" fill="#D4AF37" opacity="0.6" text-anchor="middle">◈</text>
  <text x="298" y="76" font-family="serif" font-size="8" fill="#CD7F32" opacity="0.6" text-anchor="middle">◈</text>
</svg>
