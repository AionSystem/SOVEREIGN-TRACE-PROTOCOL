  <!-- Micro‑text security band (horizontal) -->
  <g clip-path="url(#innerWaveClip)">
    <text x="180" y="258" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
          fill="#D4AF37" text-anchor="middle" opacity="0.22">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · PERSONAL TRACK · SACS ·
    </text>
    <text x="180" y="265" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
          fill="#CD7F32" text-anchor="middle" opacity="0.14">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · PERSONAL TRACK · SACS ·
    </text>
    <!-- Vertical micro‑text -->
    <text x="180" y="258" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
          fill="#D4AF37" text-anchor="middle" opacity="0.22"
          transform="rotate(-90, 180, 261)">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · PERSONAL TRACK · SACS ·
    </text>
    <text x="180" y="265" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
          fill="#CD7F32" text-anchor="middle" opacity="0.14"
          transform="rotate(-90, 180, 261)">
      · SHA-256 · AIONSYSTEM · STP SEALED · NON-TRANSFERABLE · PERSONAL TRACK · SACS ·
    </text>
  </g>

  <!-- ═══ TOP BANNER: CONSTITUTION v2.1 ═══ -->
  <rect x="40" y="36" width="280" height="22" fill="#0A0604"/>
  <rect x="40" y="36" width="280" height="1.5" fill="url(#copperBorder)" opacity="0.9"/>
  <rect x="40" y="58" width="280" height="1.5" fill="url(#copperBorder)" opacity="0.9"/>
  <text x="180" y="50" font-family="'Courier New',monospace" font-size="8" font-weight="bold"
