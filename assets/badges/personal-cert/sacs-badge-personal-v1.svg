<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 540" width="360" height="540">
  <defs>
    <!-- Copper/bronze/gold gradients -->
    <linearGradient id="copperBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1A0A"/>
      <stop offset="50%" stop-color="#1E1208"/>
      <stop offset="100%" stop-color="#0A0604"/>
    </linearGradient>

    <linearGradient id="copperBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="30%" stop-color="#CD7F32"/>
      <stop offset="70%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>

    <linearGradient id="copperInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CD7F32"/>
      <stop offset="60%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </linearGradient>

    <linearGradient id="copperAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2A1A0A"/>
      <stop offset="30%" stop-color="#CD7F32"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#CD7F32"/>
      <stop offset="100%" stop-color="#2A1A0A"/>
    </linearGradient>

    <!-- Dual‑band watermark (gold + copper) -->
    <linearGradient id="watermarkGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="25%" stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#CD7F32" stop-opacity="0.08"/>
      <stop offset="75%" stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>

    <filter id="copperGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="shadowDeep" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.9"/>
    </filter>

    <clipPath id="waveClip">
      <path d="
        M 30 20
        L 330 20
        Q 335 20, 335 25
        L 335 515
        Q 335 520, 330 520
        L 30 520
        Q 25 520, 25 515
        L 25 25
        Q 25 20, 30 20
        Z
      "/>
    </clipPath>

    <clipPath id="innerWaveClip">
      <path d="
        M 36 28
        L 324 28
        Q 328 28, 328 32
        L 328 508
        Q 328 512, 324 512
        L 36 512
        Q 32 512, 32 508
        L 32 32
        Q 32 28, 36 28
        Z
      "/>
    </clipPath>
  </defs>

  <!-- Outer wave border -->
  <path d="
    M 30 20
    Q 25 20, 25 25
    L 25 515
    Q 25 520, 30 520
    L 330 520
    Q 335 520, 335 515
    L 335 25
    Q 335 20, 330 20
    Z
  " fill="url(#copperBorder)" filter="url(#shadowDeep)"/>

  <!-- Inner background -->
  <path d="
    M 36 28
    Q 32 28, 32 32
    L 32 508
    Q 32 512, 36 512
    L 324 512
    Q 328 512, 328 508
    L 328 32
    Q 328 28, 324 28
    Z
  " fill="url(#copperBg)"/>

  <!-- Dual‑band watermark -->
  <rect x="32" y="140" width="296" height="60" fill="url(#watermarkGold)" clip-path="url(#innerWaveClip)"/>
  <rect x="32" y="200" width="296" height="60" fill="url(#watermarkGold)" clip-path="url(#innerWaveClip)"/>

  <!-- Decorative crystalline lines -->
  <g clip-path="url(#innerWaveClip)" opacity="0.12">
    <line x1="32" y1="100" x2="180" y2="160" stroke="#D4AF37" stroke-width="0.5"/>
    <line x1="328" y1="100" x2="180" y2="160" stroke="#CD7F32" stroke-width="0.5"/>
    <line x1="32" y1="200" x2="120" y2="240" stroke="#D4AF37" stroke-width="0.4"/>
    <line x1="328" y1="200" x2="240" y2="240" stroke="#CD7F32" stroke-width="0.4"/>
    <line x1="32" y1="320" x2="180" y2="380" stroke="#D4AF37" stroke-width="0.3"/>
    <line x1="328" y1="320" x2="180" y2="380" stroke="#CD7F32" stroke-width="0.3"/>
  </g>

  <!-- Inner border -->
  <path d="
    M 40 32
    L 320 32
    Q 324 32, 324 36
    L 324 504
    Q 324 508, 320 508
    L 40 508
    Q 36 508, 36 504
    L 36 36
    Q 36 32, 40 32
    Z
