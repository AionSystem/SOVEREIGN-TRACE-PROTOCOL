  <rect x="40" y="88" width="280" height="1.5" fill="url(#copperAccent)" opacity="0.5"/>
  <text x="180" y="80" font-family="'Georgia','Times New Roman',serif" font-size="10.5" font-weight="bold"
        letter-spacing="1.5" fill="#D4AF37" text-anchor="middle" filter="url(#copperGlow)">SOVEREIGN AI CONSTITUTION SEAL</text>

  <!-- ═══ TECH BANNER ═══ -->
  <rect x="40" y="88" width="280" height="20" fill="#050302"/>
  <rect x="40" y="88" width="280" height="1" fill="url(#copperAccent)" opacity="0.4"/>
  <circle cx="60" cy="98" r="1.5" fill="#CD7F32" opacity="0.6"/>
  <circle cx="300" cy="98" r="1.5" fill="#CD7F32" opacity="0.6"/>
  <text x="180" y="102" font-family="'Courier New',monospace" font-size="7.5" letter-spacing="1.5"
        fill="#CD7F32" text-anchor="middle" filter="url(#copperGlow)">SHA-256 · STP SEALED · CONSTITUTION v2.1</text>

  <!-- ═══ CENTRAL EMBLEM (open book / constitution) ═══ -->
  <g transform="translate(0, 15)">
    <polygon points="180,170 240,200 240,260 180,290 120,260 120,200" fill="#0A0604" stroke="#D4AF37" stroke-width="1.2"/>
    <polygon points="180,175 235,205 235,255 180,285 125,255 125,205" fill="none" stroke="#CD7F32" stroke-width="0.3" stroke-opacity="0.3"/>
    <circle cx="180" cy="230" r="35" fill="#1E1208" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.4"/>
    <circle cx="180" cy="230" r="28" fill="none" stroke="#CD7F32" stroke-width="0.3" stroke-dasharray="2 6" opacity="0.4"/>

    <!-- Open book symbol -->
    <path d="M180,210 L180,210 L160,218 L160,248 L180,236 L200,248 L200,218 Z"
          fill="none" stroke="#D4AF37" stroke-width="1.1" opacity="0.9"/>
    <path d="M180,210 L180,210 L160,218 L160,248 L180,236 L200,248 L200,218 Z"
          fill="url(#copperInner)" opacity="0.25"/>
    <line x1="180" y1="210" x2="180" y2="236" stroke="#D4AF37" stroke-width="1.2"/>
    <line x1="165" y1="222" x2="175" y2="218" stroke="#CD7F32" stroke-width="0.4"/>
    <line x1="165" y1="228" x2="175" y2="224" stroke="#CD7F32" stroke-width="0.4"/>
    <line x1="195" y1="222" x2="185" y2="218" stroke="#CD7F32" stroke-width="0.4"/>
    <line x1="195" y1="228" x2="185" y2="224" stroke="#CD7F32" stroke-width="0.4"/>

    <text x="180" y="268" font-family="'Georgia','Times New Roman',serif" font-size="13" font-weight="bold"
          fill="#D4AF37" text-anchor="middle" filter="url(#copperGlow)">SACS</text>
    <line x1="145" y1="275" x2="215" y2="275" stroke="#CD7F32" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- ═══ SEPARATOR ═══ -->
  <line x1="70" y1="315" x2="290" y2="315" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>

  <!-- ═══ PERSONAL NAME ═══ -->
  <text x="180" y="340" font-family="'Georgia','Times New Roman',serif" font-size="16" font-weight="bold"
