<text x="200" y="240" font-family="'Georgia','Times New Roman',serif" font-size="9"
      font-weight="normal" letter-spacing="2.5" fill="#D4AF37" text-anchor="middle" opacity="0.8">CERTIFIED  AUDITOR</text>

<text x="172" y="259" font-family="'Georgia',serif" font-size="9" fill="#48CAE4"
