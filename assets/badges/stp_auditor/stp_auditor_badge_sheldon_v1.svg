<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 540" width="400" height="540">
<defs>
  <!-- Pitch black shield background -->
  <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#030408"/>
    <stop offset="50%"  stop-color="#080A12"/>
    <stop offset="100%" stop-color="#010103"/>
  </linearGradient>

  <!-- Tricolour ribbon border (layered with gaps) -->
  <linearGradient id="goldLayer" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#D4AF37"/>
    <stop offset="30%"  stop-color="#F5E08A"/>
    <stop offset="60%"  stop-color="#C5A028"/>
    <stop offset="100%" stop-color="#8B6914"/>
  </linearGradient>
  <linearGradient id="silverLayer" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#C0C0C0"/>
    <stop offset="30%"  stop-color="#E8E8E8"/>
    <stop offset="60%"  stop-color="#A8A8A8"/>
    <stop offset="100%" stop-color="#707070"/>
  </linearGradient>
  <linearGradient id="bronzeLayer" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#CD7F32"/>
    <stop offset="30%"  stop-color="#E8A96A"/>
    <stop offset="60%"  stop-color="#B5692A"/>
    <stop offset="100%" stop-color="#7A4010"/>
  </linearGradient>

  <!-- Inner gold border (after the ribbon) -->
  <linearGradient id="goldInner" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#8B6914"/>
    <stop offset="50%"  stop-color="#D4AF37"/>
    <stop offset="100%" stop-color="#C5A028"/>
  </linearGradient>

  <radialGradient id="emblemGrad" cx="50%" cy="35%" r="65%">
    <stop offset="0%"   stop-color="#1A1F2E"/>
    <stop offset="40%"  stop-color="#0D0F1A"/>
    <stop offset="100%" stop-color="#010103"/>
  </radialGradient>

  <linearGradient id="aiCyan" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#001F2E"/>
    <stop offset="30%"  stop-color="#00B4D8"/>
    <stop offset="50%"  stop-color="#48CAE4"/>
    <stop offset="70%"  stop-color="#00B4D8"/>
    <stop offset="100%" stop-color="#001F2E"/>
  </linearGradient>

  <linearGradient id="crimson" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#6B0000"/>
    <stop offset="50%"  stop-color="#8B0000"/>
    <stop offset="100%" stop-color="#6B0000"/>
  </linearGradient>

  <radialGradient id="innerGlow" cx="50%" cy="28%" r="65%">
    <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="aionGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>

  <filter id="shadowDeep" x="-15%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.95"/>
  </filter>

  <filter id="emboss">
    <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
    <feOffset dx="0" dy="1" in="blur" result="offset"/>
    <feComposite in="SourceGraphic" in2="offset" operator="over"/>
  </filter>

  <filter id="cyanGlow">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="goldGlow">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Matrix watermark (double brightness) -->
  <pattern id="matrix" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
    <rect width="60" height="60" fill="none"/>
    <text x="5" y="20" font-family="'Courier New',monospace" font-size="8" fill="#00B4D8" fill-opacity="0.24">01</text>
    <text x="30" y="40" font-family="'Courier New',monospace" font-size="8" fill="#00B4D8" fill-opacity="0.16">10</text>
    <text x="15" y="55" font-family="'Courier New',monospace" font-size="8" fill="#00B4D8" fill-opacity="0.20">01</text>
  </pattern>

  <clipPath id="shieldClip">
    <path d="M200,20 L358,66 L358,268 Q358,420 200,502 Q42,420 42,268 L42,66 Z"/>
  </clipPath>
  <clipPath id="emblemCircleClip">
    <circle cx="200" cy="220" r="86"/>
  </clipPath>
</defs>

<!-- ===== TRICOLOUR RIBBON BORDER (layered with gaps) ===== -->
<!-- Outer gold layer (widest) -->
<path d="M200,10 L370,60 L370,270 Q370,430 200,515 Q30,430 30,270 L30,60 Z"
      fill="none" stroke="url(#goldLayer)" stroke-width="8" filter="url(#shadowDeep)"/>
<!-- Gap between gold and silver (transparent) -->
<path d="M200,10 L370,60 L370,270 Q370,430 200,515 Q30,430 30,270 L30,60 Z"
      fill="none" stroke="#000000" stroke-width="6"/>
<!-- Silver layer -->
<path d="M200,10 L370,60 L370,270 Q370,430 200,515 Q30,430 30,270 L30,60 Z"
      fill="none" stroke="url(#silverLayer)" stroke-width="5"/>
<!-- Gap between silver and bronze -->
<path d="M200,10 L370,60 L370,270 Q370,430 200,515 Q30,430 30,270 L30,60 Z"
      fill="none" stroke="#000000" stroke-width="3"/>
<!-- Bronze layer (innermost) -->
<path d="M200,10 L370,60 L370,270 Q370,430 200,515 Q30,430 30,270 L30,60 Z"
      fill="none" stroke="url(#bronzeLayer)" stroke-width="4"/>

<!-- MAIN SHIELD BODY (pitch black) -->
<path d="M200,20 L358,66 L358,268 Q358,420 200,502 Q42,420 42,268 L42,66 Z"
      fill="url(#shieldGrad)"/>

<!-- Matrix watermark (diagonal) over the shield -->
<g clip-path="url(#shieldClip)">
  <rect x="0" y="0" width="400" height="540" fill="url(#matrix)"/>
</g>

<!-- CRYSTALLINE FACET LINES (very faint) -->
<g clip-path="url(#shieldClip)">
  <line x1="42"  y1="66"  x2="200" y2="160" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="42"  y1="120" x2="200" y2="160" stroke="#48CAE4" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="42"  y1="180" x2="160" y2="210" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.07"/>
  <line x1="358" y1="66"  x2="200" y2="160" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="358" y1="120" x2="200" y2="160" stroke="#48CAE4" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="358" y1="180" x2="240" y2="210" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.07"/>
  <line x1="42"  y1="268" x2="358" y2="268" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.09"/>
  <line x1="42"  y1="340" x2="200" y2="380" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="358" y1="340" x2="200" y2="380" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="100" y1="66"  x2="300" y2="66"  stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.08"/>
</g>

<!-- INNER GLOW -->
<path d="M200,20 L358,66 L358,268 Q358,420 200,502 Q42,420 42,268 L42,66 Z"
      fill="url(#innerGlow)"/>

<!-- INNER GOLD BORDER (after ribbon) -->
<path d="M200,28 L350,70 L350,266 Q350,412 200,492 Q50,412 50,266 L50,70 Z"
      fill="none" stroke="url(#goldInner)" stroke-width="1.5" opacity="0.7"/>
<path d="M200,34 L344,74 L344,264 Q344,406 200,484 Q56,406 56,264 L56,74 Z"
      fill="none" stroke="#D4AF37" stroke-width="0.4" opacity="0.25"/>

<!-- CROSS MICRO-TEXT (unchanged) -->
<g clip-path="url(#shieldClip)">
  <text x="200" y="258" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
        fill="#D4AF37" text-anchor="middle" opacity="0.22">· SHA-256 · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · NON-TRANSFERABLE · TRIPLE-TIME SEALED · SHA-256 · AIONSYSTEM ·</text>
  <text x="200" y="265" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
        fill="#48CAE4" text-anchor="middle" opacity="0.14">· SHA-256 · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · NON-TRANSFERABLE · TRIPLE-TIME SEALED · SHA-256 · AIONSYSTEM ·</text>
  <text x="200" y="258" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
        fill="#D4AF37" text-anchor="middle" opacity="0.22" transform="rotate(-90, 200, 261)">· SHA-256 · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · NON-TRANSFERABLE · TRIPLE-TIME SEALED · SHA-256 · AIONSYSTEM ·</text>
  <text x="200" y="265" font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
        fill="#48CAE4" text-anchor="middle" opacity="0.14" transform="rotate(-90, 200, 261)">· SHA-256 · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · NON-TRANSFERABLE · TRIPLE-TIME SEALED · SHA-256 · AIONSYSTEM ·</text>
</g>

<!-- NON-TRANSFERABLE -->
<g clip-path="url(#shieldClip)">
  <text x="200" y="74" font-family="'Courier New',monospace" font-size="8" font-weight="bold"
        letter-spacing="3" fill="#48CAE4" text-anchor="middle" filter="url(#cyanGlow)">NON-TRANSFERABLE</text>
</g>
<line x1="100" y1="78" x2="300" y2="78" stroke="#48CAE4" stroke-width="0.5" opacity="0.3"/>

<!-- TOP BANNER -->
<rect x="56" y="84" width="288" height="28" fill="#080A12"/>
<rect x="56" y="84"  width="288" height="1.5" fill="url(#goldLayer)" opacity="0.9"/>
<rect x="56" y="111" width="288" height="1.5" fill="url(#goldLayer)" opacity="0.9"/>
<text x="200" y="102" font-family="'Georgia','Times New Roman',serif" font-size="10.5"
      font-weight="bold" letter-spacing="3.5" fill="#D4AF37" text-anchor="middle"
      filter="url(#emboss)">SOVEREIGN TRACE PROTOCOL</text>

<!-- CYAN SHA BANNER (FROZEN-4.0) -->
<rect x="56" y="111" width="288" height="22" fill="#03080F"/>
<rect x="56" y="111" width="288" height="1.5" fill="url(#aiCyan)" opacity="0.9"/>
<rect x="56" y="132" width="288" height="1.5" fill="url(#aiCyan)" opacity="0.5"/>
<circle cx="74"  cy="122" r="1.5" fill="#48CAE4" opacity="0.5"/>
<circle cx="90"  cy="122" r="1"   fill="#48CAE4" opacity="0.3"/>
<line x1="74" y1="122" x2="90" y2="122" stroke="#48CAE4" stroke-width="0.4" opacity="0.2"/>
<circle cx="326" cy="122" r="1.5" fill="#48CAE4" opacity="0.5"/>
<circle cx="310" cy="122" r="1"   fill="#48CAE4" opacity="0.3"/>
<line x1="326" y1="122" x2="310" y2="122" stroke="#48CAE4" stroke-width="0.4" opacity="0.2"/>
<text x="200" y="126" font-family="'Courier New',monospace" font-size="8" letter-spacing="1.5"
      fill="#48CAE4" text-anchor="middle" filter="url(#cyanGlow)">SHA-256 · FROZEN-4.0 · TRIPLE-TIME SEALED</text>

<!-- ═══ CENTER EMBLEM — all interior content removed, only background circles remain ═══ -->
<g transform="translate(0, 3)">
  <!-- Background circle and decorative rings (no text, no symbols, no infinity mark) -->
  <circle cx="200" cy="220" r="88" fill="url(#emblemGrad)" stroke="url(#goldLayer)" stroke-width="2.5"/>
  <circle cx="200" cy="220" r="82" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.6"/>
  <circle cx="200" cy="220" r="85" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="2 8" opacity="0.5"/>
  <circle cx="200" cy="220" r="78" fill="none" stroke="#48CAE4" stroke-width="0.3" stroke-opacity="0.2" stroke-dasharray="1 12"/>

  <!-- Clean black/transparent space for your logo -->
  <!-- You can insert your aion_logo2.jpg here using an <image> tag -->
  <!-- Example: <image href="aion_logo2.jpg" x="120" y="140" width="160" height="160"/> -->
  <!-- The space is completely empty – nothing else will appear -->
</g>

<!-- CRIMSON ACCENT STRIPE -->
<rect x="56" y="322" width="288" height="3.5" fill="url(#crimson)" opacity="0.65"/>

<!-- AI NODE PANEL (unchanged) -->
<rect x="56" y="325" width="288" height="22" fill="#03080F"/>
<rect x="56" y="346" width="288" height="1" fill="url(#aiCyan)" opacity="0.4"/>
<circle cx="80"  cy="335" r="1.8" fill="#48CAE4" opacity="0.55"/>
<circle cx="112" cy="330" r="1.2" fill="#48CAE4" opacity="0.35"/>
<circle cx="148" cy="337" r="1.5" fill="#48CAE4" opacity="0.45"/>
<circle cx="200" cy="332" r="2.5" fill="#48CAE4" opacity="0.75" filter="url(#cyanGlow)"/>
<circle cx="252" cy="337" r="1.5" fill="#48CAE4" opacity="0.45"/>
<circle cx="288" cy="330" r="1.2" fill="#48CAE4" opacity="0.35"/>
<circle cx="320" cy="335" r="1.8" fill="#48CAE4" opacity="0.55"/>
<line x1="80"  y1="335" x2="112" y2="330" stroke="#48CAE4" stroke-width="0.5" opacity="0.22"/>
<line x1="112" y1="330" x2="148" y2="337" stroke="#48CAE4" stroke-width="0.5" opacity="0.22"/>
<line x1="148" y1="337" x2="200" y2="332" stroke="#48CAE4" stroke-width="0.5" opacity="0.30"/>
<line x1="200" y1="332" x2="252" y2="337" stroke="#48CAE4" stroke-width="0.5" opacity="0.30"/>
<line x1="252" y1="337" x2="288" y2="330" stroke="#48CAE4" stroke-width="0.5" opacity="0.22"/>
<line x1="288" y1="330" x2="320" y2="335" stroke="#48CAE4" stroke-width="0.5" opacity="0.22"/>

<!-- BADGE NUMBER (fixed) -->
<text x="200" y="366" font-family="'Courier New',monospace" font-size="13" font-weight="bold"
      letter-spacing="2" fill="#F5E08A" text-anchor="middle" filter="url(#goldGlow)">STP-AUDITOR-0001</text>

<!-- AUDITOR NAME -->
<text x="200" y="391" font-family="'Georgia','Times New Roman',serif" font-size="16"
      font-weight="bold" letter-spacing="1" fill="#E8D5A3" text-anchor="middle">SHELDON K. SALMON</text>

<!-- SPECIALIZATION -->
<text x="200" y="408" font-family="'Georgia',serif" font-size="9" letter-spacing="2"
      fill="#8B6914" text-anchor="middle">AI OUTPUTS — ARCHITECT</text>

<!-- DATES ROW (unchanged) -->
<line x1="100" y1="418" x2="300" y2="418" stroke="#D4AF37" stroke-width="0.5" opacity="0.35"/>
<text x="168" y="431" font-family="'Courier New',monospace" font-size="8" letter-spacing="1"
      fill="#8B6914" text-anchor="middle">ISSUED</text>
<text x="168" y="443" font-family="'Courier New',monospace" font-size="9" font-weight="bold"
      fill="#D4AF37" text-anchor="middle">2026-03-07</text>
<line x1="200" y1="422" x2="200" y2="447" stroke="#8B6914" stroke-width="0.5" opacity="0.4"/>
<text x="232" y="431" font-family="'Courier New',monospace" font-size="8" letter-spacing="1"
      fill="#8B6914" text-anchor="middle">EXPIRES</text>
<text x="232" y="443" font-family="'Courier New',monospace" font-size="9" font-weight="bold"
      fill="#D4AF37" text-anchor="middle">2027-03-07</text>

<!-- CORNER MARKS (gold) -->
<polygon points="62,80 72,80 72,90 62,90" fill="#D4AF37" opacity="0.5"/>
<polygon points="338,80 328,80 328,90 338,90" fill="#D4AF37" opacity="0.5"/>
<text x="78"  y="107" font-family="serif" font-size="8" fill="#D4AF37" opacity="0.6" text-anchor="middle">✦</text>
<text x="322" y="107" font-family="serif" font-size="8" fill="#D4AF37" opacity="0.6" text-anchor="middle">✦</text>
</svg>
