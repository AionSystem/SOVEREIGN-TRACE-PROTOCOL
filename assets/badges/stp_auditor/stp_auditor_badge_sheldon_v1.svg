<circle cx="112" cy="330" r="1.2" fill="#48CAE4" opacity="0.35"/>
<circle cx="148" cy="337" r="1.5" fill="#48CAE4" opacity="0.45"/>
<circle cx="200" cy="332" r="2.5" fill="#48CAE4" opacity="0.75" filter="url(#cyanGlow)"/>
<circle cx="252" cy="337" r="1.5" fill="#48CAE4" opacity="0.45"/>
