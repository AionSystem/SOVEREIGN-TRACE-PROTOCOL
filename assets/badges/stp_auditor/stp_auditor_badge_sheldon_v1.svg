<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 540" width="400" height="540">

<defs>

  <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#14172A"/>
    <stop offset="50%"  stop-color="#0D0F1A"/>
    <stop offset="100%" stop-color="#080A12"/>
  </linearGradient>

  <linearGradient id="goldOuter" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#D4AF37"/>
    <stop offset="30%"  stop-color="#F5E08A"/>
    <stop offset="60%"  stop-color="#C5A028"/>
    <stop offset="100%" stop-color="#8B6914"/>
  </linearGradient>

  <linearGradient id="goldInner" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#8B6914"/>
    <stop offset="50%"  stop-color="#D4AF37"/>
    <stop offset="100%" stop-color="#C5A028"/>
  </linearGradient>

  <radialGradient id="emblemGrad" cx="50%" cy="35%" r="65%">
    <stop offset="0%"   stop-color="#252A44"/>
    <stop offset="40%"  stop-color="#141828"/>
    <stop offset="100%" stop-color="#06080F"/>
  </radialGradient>

  <linearGradient id="aiCyan" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#001F2E"/>
    <stop offset="30%"  stop-color="#00B4D8"/>
    <stop offset="50%"  stop-color="#48CAE4"/>
    <stop offset="70%"  stop-color="#00B4D8"/>
    <stop offset="100%" stop-color="#001F2E"/>
  </linearGradient>

  <linearGradient id="crimson" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#6B0000"/>
    <stop offset="50%"  stop-color="#8B0000"/>
    <stop offset="100%" stop-color="#6B0000"/>
  </linearGradient>

  <radialGradient id="innerGlow" cx="50%" cy="28%" r="65%">
    <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.09"/>
    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="aionGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="stpGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#F5E08A" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>

  <filter id="shadowDeep" x="-15%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.9"/>
  </filter>

  <filter id="emboss">
    <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
    <feOffset dx="0" dy="1" in="blur" result="offset"/>
    <feComposite in="SourceGraphic" in2="offset" operator="over"/>
  </filter>

  <filter id="cyanGlow">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="goldGlow">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="aionFilter">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <clipPath id="shieldClip">
    <path d="M200,20 L358,66 L358,268 Q358,420 200,502 Q42,420 42,268 L42,66 Z"/>
  </clipPath>

  <clipPath id="emblemCircleClip">
    <circle cx="200" cy="220" r="86"/>
  </clipPath>

</defs>

<!-- ═══ OUTER SHIELD GOLD BEVEL ═══ -->
<path d="M200,10 L370,60 L370,270 Q370,430 200,515 Q30,430 30,270 L30,60 Z"
      fill="url(#goldOuter)" filter="url(#shadowDeep)"/>

<!-- ═══ MAIN SHIELD BODY ═══ -->
<path d="M200,20 L358,66 L358,268 Q358,420 200,502 Q42,420 42,268 L42,66 Z"
      fill="url(#shieldGrad)"/>

<!-- ═══ CRYSTALLINE FACET LINES ═══ -->
<g clip-path="url(#shieldClip)">
  <line x1="42"  y1="66"  x2="200" y2="160" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="42"  y1="120" x2="200" y2="160" stroke="#48CAE4" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="42"  y1="180" x2="160" y2="210" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.07"/>
  <line x1="358" y1="66"  x2="200" y2="160" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="358" y1="120" x2="200" y2="160" stroke="#48CAE4" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="358" y1="180" x2="240" y2="210" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.07"/>
  <line x1="42"  y1="268" x2="358" y2="268" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.09"/>
  <line x1="42"  y1="340" x2="200" y2="380" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="358" y1="340" x2="200" y2="380" stroke="#D4AF37" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="100" y1="66"  x2="300" y2="66"  stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.08"/>
</g>

<!-- ═══ INNER GLOW ═══ -->
<path d="M200,20 L358,66 L358,268 Q358,420 200,502 Q42,420 42,268 L42,66 Z"
      fill="url(#innerGlow)"/>

<!-- ═══ INNER GOLD BORDERS ═══ -->
<path d="M200,28 L350,70 L350,266 Q350,412 200,492 Q50,412 50,266 L50,70 Z"
      fill="none" stroke="url(#goldInner)" stroke-width="1.5" opacity="0.7"/>
<path d="M200,34 L344,74 L344,264 Q344,406 200,484 Q56,406 56,264 L56,74 Z"
      fill="none" stroke="#D4AF37" stroke-width="0.4" opacity="0.25"/>

<!-- ═══ CROSS MICRO-TEXT — clipped to shield, behind all content ═══
     Shield vertical center: top=20, bottom=502 → midpoint y=261
     Shield horizontal center: x=200

     HORIZONTAL STRIP — two lines, centered at y=261, full width, reads left→right
     VERTICAL STRIP   — two lines, centered at x=200, full height, reads top→bottom
     Both use transform rotate on the vertical so SVG text stays horizontal then gets rotated.
-->
<g clip-path="url(#shieldClip)">

  <!-- HORIZONTAL: gold line at y=258, cyan at y=265 — centered on badge midpoint -->
  <text x="200" y="258"
        font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
        fill="#D4AF37" text-anchor="middle" opacity="0.22">
    · SHA-256 · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · NON-TRANSFERABLE · TRIPLE-TIME SEALED · SHA-256 · AIONSYSTEM ·
  </text>
  <text x="200" y="265"
        font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
        fill="#48CAE4" text-anchor="middle" opacity="0.14">
    · SHA-256 · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · NON-TRANSFERABLE · TRIPLE-TIME SEALED · SHA-256 · AIONSYSTEM ·
  </text>

  <!-- VERTICAL: same two lines, rotated -90° around badge center (200, 261)
       After rotation: what was horizontal text centered at x=200,y=258/265
       becomes vertical text centered at x=200 spine, at the badge center.
       Gold offset -3.5 from center spine, cyan +3.5 — mirroring horizontal spacing. -->
  <text x="200" y="258"
        font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
        fill="#D4AF37" text-anchor="middle" opacity="0.22"
        transform="rotate(-90, 200, 261)">
    · SHA-256 · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · NON-TRANSFERABLE · TRIPLE-TIME SEALED · SHA-256 · AIONSYSTEM ·
  </text>
  <text x="200" y="265"
        font-family="'Courier New',monospace" font-size="5" letter-spacing="2.5"
        fill="#48CAE4" text-anchor="middle" opacity="0.14"
        transform="rotate(-90, 200, 261)">
    · SHA-256 · AIONSYSTEM · SOVEREIGN TRACE PROTOCOL · NON-TRANSFERABLE · TRIPLE-TIME SEALED · SHA-256 · AIONSYSTEM ·
  </text>

</g>

<!-- ═══ NON-TRANSFERABLE ═══ -->
<g clip-path="url(#shieldClip)">
  <text x="200" y="74" font-family="'Courier New',monospace" font-size="8" font-weight="bold"
        letter-spacing="3" fill="#48CAE4" text-anchor="middle" filter="url(#cyanGlow)">NON-TRANSFERABLE</text>
</g>
<line x1="100" y1="78" x2="300" y2="78" stroke="#48CAE4" stroke-width="0.5" opacity="0.3"/>

