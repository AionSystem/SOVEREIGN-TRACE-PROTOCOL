<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90" role="img">
  <title>Constitutional Compliance Badge — AionSystem</title>
  <defs>
    <linearGradient id="badgeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120008"/>
      <stop offset="50%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#060008"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#4a0080"/>
    </linearGradient>
    <linearGradient id="rimInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a0000"/>
      <stop offset="50%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#6a0000"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B0000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B0000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2800"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E08A"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#3a2800"/>
    </linearGradient>
    <radialGradient id="nonagonFill" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a0020"/>
      <stop offset="100%" stop-color="#06000e"/>
    </radialGradient>
  </defs>

  <!-- outer rim -->
  <rect x="0" y="0" width="320" height="90" rx="5" fill="url(#rimGrad)" filter="drop-shadow(0 4px 10px rgba(0,0,0,0.9))"/>

  <!-- body -->
  <rect x="2" y="2" width="316" height="86" rx="4" fill="url(#badgeBg)"/>

  <!-- inner accent border -->
  <rect x="4" y="4" width="312" height="82" rx="3" fill="none" stroke="url(#rimInner)" stroke-width="0.8" opacity="0.55"/>

  <!-- NON‑TRANSFERABLE strip -->
  <rect x="2" y="2" width="316" height="13" rx="4" fill="#080004"/>
  <rect x="2" y="14" width="316" height="1" fill="url(#goldBar)" opacity="0.6"/>
  <text x="160" y="12" font-family="'Courier New', monospace" font-size="6.5" font-weight="bold" letter-spacing="3" fill="#D4AF37" text-anchor="middle">NON‑TRANSFERABLE</text>

  <!-- left panel -->
  <rect x="2" y="15" width="74" height="73" fill="#8B0000" fill-opacity="0.04"/>
  <rect x="75" y="15" width="1" height="73" fill="url(#divLine)"/>

  <!-- nonagon — 9 sides = 9 laws -->
  <polygon points="38,24 55,29 62,42 57,57 45,64 31,64 19,57 14,42 21,29" fill="url(#nonagonFill)" stroke="url(#rimGrad)" stroke-width="1.5" filter="drop-shadow(0 0 3px rgba(139,0,0,0.5))"/>
  <polygon points="38,27 52,32 58,42 54,55 44,61 32,61 22,55 18,42 24,32" fill="none" stroke="#4a0000" stroke-width="0.5" opacity="0.5"/>

  <text x="38" y="49" font-family="'Georgia',serif" font-size="9" font-weight="bold" fill="#D4AF37" text-anchor="middle">CONST</text>
  <text x="38" y="60" font-family="'Courier New',monospace" font-size="5.5" fill="#8B0000" text-anchor="middle" letter-spacing="0.5">v2.1</text>

  <!-- right panel -->
  <text x="198" y="29" font-family="'Georgia','Times New Roman',serif" font-size="7" font-weight="bold" letter-spacing="2" fill="#6a0000" text-anchor="middle">THE CONSTITUTION v2.1</text>

  <line x1="86" y1="33" x2="310" y2="33" stroke="#8B0000" stroke-width="0.4" opacity="0.3"/>

  <text x="198" y="59" font-family="'Georgia','Times New Roman',serif" font-size="23" font-weight="bold" letter-spacing="4" fill="#D4AF37" text-anchor="middle" filter="drop-shadow(0 0 3px rgba(212,175,55,0.35))">COMPLIANT</text>

  <line x1="86" y1="64" x2="310" y2="64" stroke="#D4AF37" stroke-width="0.4" opacity="0.3"/>
  <rect x="86" y="65" width="224" height="1.5" fill="url(#rimInner)" opacity="0.55"/>

  <text x="198" y="79" font-family="'Courier New',monospace" font-size="6.5" letter-spacing="1.5" fill="#8B0000" text-anchor="middle">AIONSYSTEM · NINE LAWS · SHA‑256 SEALED</text>

  <!-- node dots -->
  <circle cx="102" cy="72" r="1.2" fill="#4a0080" opacity="0.5"/>
  <circle cx="114" cy="70" r="0.8" fill="#4a0080" opacity="0.35"/>
  <circle cx="286" cy="72" r="1.2" fill="#4a0080" opacity="0.5"/>
  <circle cx="298" cy="70" r="0.8" fill="#4a0080" opacity="0.35"/>
  <line x1="102" y1="72" x2="114" y2="70" stroke="#4a0080" stroke-width="0.4" opacity="0.18"/>
  <line x1="286" y1="72" x2="298" y2="70" stroke="#4a0080" stroke-width="0.4" opacity="0.18"/>

  <!-- corner marks -->
  <g stroke="#D4AF37" stroke-width="1" opacity="0.45" fill="none">
    <path d="M8,8 L8,14 M8,8 L14,8"/>
    <path d="M312,8 L312,14 M312,8 L306,8"/>
    <path d="M8,82 L8,76 M8,82 L14,82"/>
    <path d="M312,82 L312,76 M312,82 L306,82"/>
  </g>

  <!-- stars -->
  <circle cx="92" cy="21" r="0.6" fill="#D4AF37" opacity="0.3"/>
  <circle cx="135" cy="18" r="0.4" fill="#fff" opacity="0.25"/>
  <circle cx="260" cy="20" r="0.5" fill="#D4AF37" opacity="0.3"/>
  <circle cx="295" cy="23" r="0.4" fill="#8B0000" opacity="0.4"/>
  <circle cx="110" cy="80" r="0.4" fill="#fff" opacity="0.2"/>
  <circle cx="280" cy="79" r="0.5" fill="#D4AF37" opacity="0.25"/>
</svg>
