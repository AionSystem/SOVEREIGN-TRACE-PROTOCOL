<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90" role="img">
  <title>Legal &amp; Justice AI Compliance Badge — AionSystem</title>
  <defs>
    <linearGradient id="lBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00080e"/>
      <stop offset="50%" stop-color="#000510"/>
      <stop offset="100%" stop-color="#000308"/>
    </linearGradient>
    <linearGradient id="lRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002060"/>
      <stop offset="25%" stop-color="#4488cc"/>
      <stop offset="50%" stop-color="#c8d8f0"/>
      <stop offset="75%" stop-color="#4488cc"/>
      <stop offset="100%" stop-color="#001040"/>
    </linearGradient>
    <linearGradient id="lRimInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001030"/>
      <stop offset="50%" stop-color="#003070"/>
      <stop offset="100%" stop-color="#001840"/>
    </linearGradient>
    <linearGradient id="lDiv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4488cc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4488cc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4488cc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000820"/>
      <stop offset="30%" stop-color="#4488cc"/>
      <stop offset="50%" stop-color="#c8d8f0"/>
      <stop offset="70%" stop-color="#4488cc"/>
      <stop offset="100%" stop-color="#000820"/>
    </linearGradient>
    <radialGradient id="lShield" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#001030"/>
      <stop offset="100%" stop-color="#000410"/>
    </radialGradient>
  </defs>

  <!-- outer rim -->
  <rect x="0" y="0" width="320" height="90" rx="5" fill="url(#lRim)" filter="drop-shadow(0 4px 10px rgba(0,0,0,0.9))"/>

  <!-- body -->
  <rect x="2" y="2" width="316" height="86" rx="4" fill="url(#lBg)"/>

  <!-- inner accent -->
  <rect x="4" y="4" width="312" height="82" rx="3" fill="none" stroke="url(#lRimInner)" stroke-width="0.8" opacity="0.6"/>

  <!-- NON‑TRANSFERABLE strip -->
  <rect x="2" y="2" width="316" height="13" rx="4" fill="#00040c"/>
  <rect x="2" y="14" width="316" height="1" fill="url(#lBar)" opacity="0.65"/>
  <text x="160" y="12" font-family="'Courier New', monospace" font-size="6.5" font-weight="bold" letter-spacing="3" fill="#4488cc" text-anchor="middle">NON‑TRANSFERABLE</text>

  <!-- left panel -->
  <rect x="2" y="15" width="74" height="73" fill="#4488cc" fill-opacity="0.03"/>
  <rect x="75" y="15" width="1" height="73" fill="url(#lDiv)"/>

  <!-- scales of justice inside shield -->
  <path d="M38,23 L58,29 L58,50 Q58,64 38,72 Q18,64 18,50 L18,29 Z" fill="url(#lShield)" stroke="url(#lRim)" stroke-width="1.5" filter="drop-shadow(0 0 3px rgba(68,136,204,0.4))"/>
  <path d="M38,26 L55,31 L55,50 Q55,62 38,69 Q21,62 21,50 L21,31 Z" fill="none" stroke="#001030" stroke-width="0.5" opacity="0.5"/>

  <!-- scales of justice motif -->
  <line x1="38" y1="32" x2="38" y2="63" stroke="#4488cc" stroke-width="1.2" opacity="0.9"/>
  <line x1="26" y1="39" x2="50" y2="39" stroke="#4488cc" stroke-width="1.2" opacity="0.9"/>
  <line x1="27" y1="39" x2="24" y2="49" stroke="#4488cc" stroke-width="0.8" opacity="0.7"/>
  <ellipse cx="24" cy="50" rx="5" ry="2" fill="none" stroke="#4488cc" stroke-width="0.8" opacity="0.85"/>
  <line x1="49" y1="39" x2="52" y2="49" stroke="#4488cc" stroke-width="0.8" opacity="0.7"/>
  <ellipse cx="52" cy="50" rx="5" ry="2" fill="none" stroke="#4488cc" stroke-width="0.8" opacity="0.85"/>
  <line x1="32" y1="63" x2="44" y2="63" stroke="#4488cc" stroke-width="1" opacity="0.7"/>
  <circle cx="38" cy="39" r="1.2" fill="#c8d8f0" opacity="0.5"/>

  <!-- right panel -->
  <text x="198" y="29" font-family="'Georgia','Times New Roman',serif" font-size="7" font-weight="bold" letter-spacing="2" fill="#003070" text-anchor="middle">LEGAL &amp; JUSTICE AI · CONSTITUTION v2.1</text>

  <line x1="86" y1="33" x2="310" y2="33" stroke="#4488cc" stroke-width="0.4" opacity="0.3"/>

  <text x="198" y="58" font-family="'Georgia','Times New Roman',serif" font-size="21" font-weight="bold" letter-spacing="3" fill="#4488cc" text-anchor="middle" filter="drop-shadow(0 0 3px rgba(68,136,204,0.3))">COMPLIANT</text>

  <line x1="86" y1="63" x2="310" y2="63" stroke="#4488cc" stroke-width="0.4" opacity="0.3"/>
  <rect x="86" y="64" width="224" height="1.5" fill="url(#lRimInner)" opacity="0.6"/>

  <text x="198" y="79" font-family="'Courier New',monospace" font-size="6.5" letter-spacing="1.5" fill="#003070" text-anchor="middle">AIONSYSTEM · LEGAL AI · SHA‑256 SEALED</text>

  <!-- node dots -->
  <circle cx="102" cy="72" r="1.2" fill="#c8d8f0" opacity="0.3"/>
  <circle cx="114" cy="70" r="0.8" fill="#c8d8f0" opacity="0.2"/>
  <circle cx="286" cy="72" r="1.2" fill="#c8d8f0" opacity="0.3"/>
  <circle cx="298" cy="70" r="0.8" fill="#c8d8f0" opacity="0.2"/>
  <line x1="102" y1="72" x2="114" y2="70" stroke="#4488cc" stroke-width="0.4" opacity="0.18"/>
  <line x1="286" y1="72" x2="298" y2="70" stroke="#4488cc" stroke-width="0.4" opacity="0.18"/>

  <!-- corner marks -->
  <g stroke="#4488cc" stroke-width="1" opacity="0.4" fill="none">
    <path d="M8,8 L8,14 M8,8 L14,8"/>
    <path d="M312,8 L312,14 M312,8 L306,8"/>
    <path d="M8,82 L8,76 M8,82 L14,82"/>
    <path d="M312,82 L312,76 M312,82 L306,82"/>
  </g>

  <!-- stars -->
  <circle cx="92" cy="21" r="0.6" fill="#c8d8f0" opacity="0.25"/>
  <circle cx="135" cy="18" r="0.4" fill="#4488cc" opacity="0.3"/>
  <circle cx="260" cy="20" r="0.5" fill="#c8d8f0" opacity="0.22"/>
  <circle cx="295" cy="23" r="0.4" fill="#4488cc" opacity="0.35"/>
  <circle cx="110" cy="80" r="0.4" fill="#c8d8f0" opacity="0.18"/>
  <circle cx="280" cy="79" r="0.5" fill="#4488cc" opacity="0.22"/>
</svg>
