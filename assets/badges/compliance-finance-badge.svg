<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90" role="img">
  <title>Finance AI Compliance Badge — AionSystem</title>
  <defs>
    <linearGradient id="fBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a10"/>
      <stop offset="50%" stop-color="#000f08"/>
      <stop offset="100%" stop-color="#000806"/>
    </linearGradient>
    <linearGradient id="fRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#004d2e"/>
      <stop offset="30%" stop-color="#00c97d"/>
      <stop offset="55%" stop-color="#e6ffe6"/>
      <stop offset="80%" stop-color="#00995c"/>
      <stop offset="100%" stop-color="#00331e"/>
    </linearGradient>
    <linearGradient id="fRimInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003020"/>
      <stop offset="50%" stop-color="#005c3a"/>
      <stop offset="100%" stop-color="#004020"/>
    </linearGradient>
    <linearGradient id="fDiv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c97d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00c97d" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00c97d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001a10"/>
      <stop offset="30%" stop-color="#00c97d"/>
      <stop offset="50%" stop-color="#e6ffe6"/>
      <stop offset="70%" stop-color="#00c97d"/>
      <stop offset="100%" stop-color="#001a10"/>
    </linearGradient>
    <radialGradient id="fShield" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#002818"/>
      <stop offset="100%" stop-color="#000c06"/>
    </radialGradient>
  </defs>

  <!-- outer rim -->
  <rect x="0" y="0" width="320" height="90" rx="5" fill="url(#fRim)" filter="drop-shadow(0 4px 10px rgba(0,0,0,0.9))"/>

  <!-- body -->
  <rect x="2" y="2" width="316" height="86" rx="4" fill="url(#fBg)"/>

  <!-- inner accent -->
  <rect x="4" y="4" width="312" height="82" rx="3" fill="none" stroke="url(#fRimInner)" stroke-width="0.8" opacity="0.6"/>

  <!-- NON‑TRANSFERABLE strip -->
  <rect x="2" y="2" width="316" height="13" rx="4" fill="#000c08"/>
  <rect x="2" y="14" width="316" height="1" fill="url(#fBar)" opacity="0.65"/>
  <text x="160" y="12" font-family="'Courier New', monospace" font-size="6.5" font-weight="bold" letter-spacing="3" fill="#00c97d" text-anchor="middle">NON‑TRANSFERABLE</text>

  <!-- left panel -->
  <rect x="2" y="15" width="74" height="73" fill="#00c97d" fill-opacity="0.03"/>
  <rect x="75" y="15" width="1" height="73" fill="url(#fDiv)"/>

  <!-- shield with rising chart + currency symbol -->
  <path d="M38,23 L58,29 L58,50 Q58,64 38,72 Q18,64 18,50 L18,29 Z" fill="url(#fShield)" stroke="url(#fRim)" stroke-width="1.5" filter="drop-shadow(0 0 3px rgba(0,201,125,0.4))"/>
  <path d="M38,26 L55,31 L55,50 Q55,62 38,69 Q21,62 21,50 L21,31 Z" fill="none" stroke="#003020" stroke-width="0.5" opacity="0.5"/>

  <!-- Rising chart line -->
  <polyline points="23,58 32,50 40,53 48,40 53,40" fill="none" stroke="#00c97d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Dollar sign near the chart -->
  <text x="38" y="56" font-family="'Georgia', serif" font-size="10" font-weight="bold" fill="#e6ffe6" text-anchor="middle" opacity="0.9">$</text>

  <!-- right panel -->
  <text x="198" y="29" font-family="'Georgia','Times New Roman',serif" font-size="7" font-weight="bold" letter-spacing="1.5" fill="#005c3a" text-anchor="middle">FINANCIAL AI · CONSTITUTION v2.1</text>

  <line x1="86" y1="33" x2="310" y2="33" stroke="#00c97d" stroke-width="0.4" opacity="0.3"/>

  <text x="198" y="59" font-family="'Georgia','Times New Roman',serif" font-size="21" font-weight="bold" letter-spacing="3" fill="#00c97d" text-anchor="middle" filter="drop-shadow(0 0 3px rgba(0,201,125,0.3))">COMPLIANT</text>

  <line x1="86" y1="64" x2="310" y2="64" stroke="#00c97d" stroke-width="0.4" opacity="0.3"/>
  <rect x="86" y="65" width="224" height="1.5" fill="url(#fRimInner)" opacity="0.6"/>

  <text x="198" y="79" font-family="'Courier New',monospace" font-size="6.5" letter-spacing="1.5" fill="#005c3a" text-anchor="middle">AIONSYSTEM · FINANCIAL AI · SHA‑256 SEALED</text>

  <!-- node dots -->
  <circle cx="102" cy="72" r="1.2" fill="#e6ffe6" opacity="0.35"/>
  <circle cx="114" cy="70" r="0.8" fill="#e6ffe6" opacity="0.25"/>
  <circle cx="286" cy="72" r="1.2" fill="#e6ffe6" opacity="0.35"/>
  <circle cx="298" cy="70" r="0.8" fill="#e6ffe6" opacity="0.25"/>
  <line x1="102" y1="72" x2="114" y2="70" stroke="#00c97d" stroke-width="0.4" opacity="0.2"/>
  <line x1="286" y1="72" x2="298" y2="70" stroke="#00c97d" stroke-width="0.4" opacity="0.2"/>

  <!-- corner marks -->
  <g stroke="#00c97d" stroke-width="1" opacity="0.4" fill="none">
    <path d="M8,8 L8,14 M8,8 L14,8"/>
    <path d="M312,8 L312,14 M312,8 L306,8"/>
    <path d="M8,82 L8,76 M8,82 L14,82"/>
    <path d="M312,82 L312,76 M312,82 L306,82"/>
  </g>

  <!-- stars -->
  <circle cx="92" cy="21" r="0.6" fill="#e6ffe6" opacity="0.25"/>
  <circle cx="135" cy="18" r="0.4" fill="#00c97d" opacity="0.3"/>
  <circle cx="260" cy="20" r="0.5" fill="#e6ffe6" opacity="0.22"/>
  <circle cx="295" cy="23" r="0.4" fill="#00c97d" opacity="0.35"/>
  <circle cx="110" cy="80" r="0.4" fill="#e6ffe6" opacity="0.2"/>
  <circle cx="280" cy="79" r="0.5" fill="#00c97d" opacity="0.25"/>
</svg>
