[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    anchor: verified calendar anchor — do not modify expected values without re-verifying against Hebcal/Chabad/pyluach
    regression: guard against named defect from a retired frozen version (FROZEN-2.0, FROZEN-3.0, etc.)
    slow: makes many calendar calls or covers large date ranges — excluded from fast CI
    cli: requires subprocess or stdin/stdout capture
    hypothesis: property-based test (auto-applied by hypothesis plugin)
    asyncio: async test function (auto-applied by pytest-asyncio when asyncio_mode=auto)
    concurrency: multi-thread or concurrent access test
    benchmark: timing test — requires baseline to be meaningful
    frozen4: tests specific to FROZEN-4.0 behaviour (optional)

filterwarnings =
    error
    ignore::DeprecationWarning:hypothesis
    ignore::PendingDeprecationWarning:sovereign_trace_stamp
