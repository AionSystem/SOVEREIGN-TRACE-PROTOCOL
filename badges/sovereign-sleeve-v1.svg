<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 680" width="500" height="680">
  <!--
    ╔══════════════════════════════════════════════╗
    ║  CERTIFIED AUDIT SLEEVE — MASTER TEMPLATE   ║
    ║  Sheldon K. Salmon · AionSystem             ║
    ╚══════════════════════════════════════════════╝

    TEMPLATE FIELDS (replace all {{…}} )
    ──────────────────────────────────────
    {{SIMULATOR_BADGE_URL}}        – URL of the simulator badge, or delete the line if none
    {{AUDITOR_BADGE_URL}}          – URL of the auditor’s official badge (gold/silver/blue)
    {{AUDITOR_BADGE_ID}}           – e.g. STP‑AUDITOR‑0001
    {{AUDITOR_RANK}}               – "Founding Badge", "Senior Auditor", "Standard Auditor"
    {{AUDITOR_NAME}}               – Full name of the auditor who verified the work
    {{SOVEREIGN_TIER_BADGE_SVG}}   – inline SVG for the tier badge (Digital, Government, Elite…)
    {{ENTRY_ID}}                   – STP ledger entry ID
    {{SHA256_HASH}}                – full SHA‑256 hash
    {{VERIFY_URL}}                 – verification page URL
    {{QR_CODE_URL}}                – QR code image (fresh for each cert)

    RIBBONS (remove if not applicable):
      · Gold:  AI SOVEREIGN CERTIFIED
      · Silver: AI CLOUD CERTIFIED
  -->

  <defs>
    <linearGradient id="rainbowBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </linearGradient>

    <linearGradient id="lamination" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="sleeveBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="30%" stop-color="#151520"/>
      <stop offset="70%" stop-color="#1e1e2a"/>
      <stop offset="100%" stop-color="#121218"/>
    </linearGradient>

    <pattern id="goldStripes" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.06"/>
    </pattern>

    <pattern id="matrixRain" width="30" height="30" patternUnits="userSpaceOnUse">
      <text x="0" y="15" font-family="'Courier New', monospace" font-size="10" fill="#20ff20" opacity="0.06">0</text>
      <text x="10" y="25" font-family="'Courier New', monospace" font-size="8" fill="#20ff20" opacity="0.04">1</text>
      <text x="20" y="10" font-family="'Courier New', monospace" font-size="12" fill="#20ff20" opacity="0.05">;</text>
      <text x="5" y="5" font-family="'Courier New', monospace" font-size="9" fill="#20ff20" opacity="0.04">%</text>
      <text x="15" y="20" font-family="'Courier New', monospace" font-size="11" fill="#20ff20" opacity="0.05">/</text>
      <text x="25" y="28" font-family="'Courier New', monospace" font-size="10" fill="#20ff20" opacity="0.04">0</text>
      <text x="2" y="22" font-family="'Courier New', monospace" font-size="7" fill="#20ff20" opacity="0.06">1</text>
      <text x="12" y="8" font-family="'Courier New', monospace" font-size="9" fill="#20ff20" opacity="0.05">\</text>
      <text x="22" y="18" font-family="'Courier New', monospace" font-size="10" fill="#20ff20" opacity="0.04">7</text>
    </pattern>

    <pattern id="aionWatermark" width="200" height="200" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
      <text x="0" y="0" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#D4AF37" opacity="0.08">AI/ON</text>
      <text x="100" y="100" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#D4AF37" opacity="0.08">AI/ON</text>
    </pattern>

    <linearGradient id="ribbonGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="20%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E08A"/>
      <stop offset="80%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>

    <linearGradient id="ribbonSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="20%" stop-color="#a0aec0"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="80%" stop-color="#a0aec0"/>
      <stop offset="100%" stop-color="#4a5568"/>
    </linearGradient>

    <filter id="sleeveShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00d4ff" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="500" height="680" rx="24" fill="url(#sleeveBg)" filter="url(#sleeveShadow)"/>
  <rect width="500" height="680" rx="24" fill="url(#goldStripes)"/>
  <rect width="500" height="680" rx="24" fill="url(#matrixRain)"/>
  <rect width="500" height="680" rx="24" fill="url(#aionWatermark)"/>

  <!-- BORDER -->
  <rect x="3" y="3" width="494" height="674" rx="22" fill="none" stroke="url(#rainbowBorder)" stroke-width="3" opacity="0.9"/>

  <!-- LAMINATION -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="500" y2="680" stroke="#ffffff" stroke-width="1"/>
    <line x1="50" y1="0" x2="500" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="500" y2="580" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- RIBBONS (remove lines that don't apply) -->
  <rect x="0" y="38" width="500" height="22" fill="url(#ribbonGold)" opacity="0.95"/>
  <text x="250" y="54" font-family="'Georgia', 'Times New Roman', serif" font-size="11" font-weight="bold" letter-spacing="4" fill="#0a0a14" text-anchor="middle" opacity="0.9">AI SOVEREIGN CERTIFIED</text>

  <rect x="0" y="60" width="500" height="18" fill="url(#ribbonSilver)" opacity="0.9"/>
  <text x="250" y="73" font-family="'Georgia', 'Times New Roman', serif" font-size="9" font-weight="bold" letter-spacing="3" fill="#0a0a14" text-anchor="middle" opacity="0.9">AI CLOUD CERTIFIED</text>

  <!-- SIMULATOR BADGE SLOT (left, fixed) -->
  <image x="30" y="85" width="220" height="220"
         xlink:href="{{SIMULATOR_BADGE_URL}}"/>

  <!-- AUDITOR BADGE SLOT (right, fixed) -->
  <image x="250" y="85" width="220" height="220"
         xlink:href="{{AUDITOR_BADGE_URL}}"/>

  <!-- VERIFICATION BAR -->
  <rect x="40" y="340" width="420" height="200" rx="12" fill="#0a0a14" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="40" y="340" width="420" height="28" rx="12" fill="#D4AF37" fill-opacity="0.15"/>
  <text x="250" y="361" font-family="'Courier New', monospace" font-size="10" fill="#D4AF37" font-weight="bold" text-anchor="middle">VERIFIED CERTIFICATION</text>
  <line x1="60" y1="372" x2="440" y2="372" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- AUDITOR LINE (dynamic rank colour) -->
  <text x="250" y="395" font-family="'Courier New', monospace" font-size="9" text-anchor="middle">
    <tspan fill="#DAA520">◈ </tspan>
    <tspan fill="{{AUDITOR_RANK_COLOR}}">Certified by {{AUDITOR_BADGE_ID}} ({{AUDITOR_RANK}})</tspan>
  </text>

  <!-- TIER BADGE SLOT (center) -->
  <g transform="translate(114, 410) scale(0.85)">
    {{SOVEREIGN_TIER_BADGE_SVG}}
  </g>

  <!-- AUDIT DETAILS -->
  <text x="70" y="505" font-family="'Courier New', monospace" font-size="9" fill="#aaa" opacity="0.8">Entry</text>
  <text x="180" y="505" font-family="'Courier New', monospace" font-size="9" fill="#F5E08A" font-weight="bold">{{ENTRY_ID}}</text>

  <text x="70" y="521" font-family="'Courier New', monospace" font-size="9" fill="#aaa" opacity="0.8">SHA‑256</text>
  <text x="180" y="521" font-family="'Courier New', monospace" font-size="9" fill="#48CAE4">{{SHA256_HASH}}</text>

  <text x="70" y="537" font-family="'Courier New', monospace" font-size="9" fill="#aaa" opacity="0.8">Verify at</text>
  <text x="180" y="537" font-family="'Courier New', monospace" font-size="9" fill="#48CAE4">{{VERIFY_URL}}</text>

  <!-- ISSUER SIGNATURE (dynamic auditor name) -->
  <text x="250" y="600" font-family="'Courier New', monospace" font-size="9" fill="#DAA520" text-anchor="middle">ISSUED BY {{AUDITOR_NAME}} · AIONSYSTEM</text>
  <text x="250" y="620" font-family="'Courier New', monospace" font-size="8" fill="#666" text-anchor="middle">Digital signature appended to STP ledger entry</text>

  <!-- QR CODE -->
  <rect x="420" y="610" width="60" height="60" rx="6" fill="#0a0a14" stroke="url(#rainbowBorder)" stroke-width="2"/>
  <image x="425" y="615" width="50" height="50"
         xlink:href="{{QR_CODE_URL}}"/>
  <text x="450" y="685" font-family="'Courier New', monospace" font-size="6" fill="#aaa" opacity="0.7" text-anchor="middle">SCAN</text>

  <!-- GLOSSY OVERLAY -->
  <rect width="500" height="680" rx="24" fill="url(#lamination)" pointer-events="none"/>
</svg>