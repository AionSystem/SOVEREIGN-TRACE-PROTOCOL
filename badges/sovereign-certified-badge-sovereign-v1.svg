<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90">
  <defs>

    <linearGradient id="bg-sov" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0f14"/>
      <stop offset="50%"  stop-color="#060a10"/>
      <stop offset="100%" stop-color="#04080c"/>
    </linearGradient>

    <linearGradient id="tealPlatinum" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E0FFFF"/>
      <stop offset="30%"  stop-color="#B2EBF2"/>
      <stop offset="70%"  stop-color="#4DD0E1"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>

    <linearGradient id="border-sov" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00CED1" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#B2EBF2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00CED1" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="divider-sov" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00CED1" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00CED1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00CED1" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="shield-stroke-sov" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E0FFFF"/>
      <stop offset="100%" stop-color="#00CED1"/>
    </linearGradient>

    <!-- Cyan strip -->
    <linearGradient id="aiCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#001F2E"/>
      <stop offset="30%"  stop-color="#00B4D8"/>
      <stop offset="50%"  stop-color="#48CAE4"/>
      <stop offset="70%"  stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#001F2E"/>
    </linearGradient>

    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#003030"/>
      <stop offset="50%"  stop-color="#008080"/>
      <stop offset="100%" stop-color="#003030"/>
    </linearGradient>

    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <filter id="tealGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cyanGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══ OUTER CYAN-TEAL BORDER ═══ -->
  <rect width="320" height="90" rx="5" ry="5"
        fill="url(#border-sov)" filter="url(#shadowDeep)"/>

  <!-- ═══ MAIN BODY ═══ -->
  <rect x="2" y="2" width="316" height="86" rx="4" ry="4"
        fill="url(#bg-sov)"/>

  <!-- Subtle teal ambient wash -->
  <rect x="2" y="2" width="316" height="24" rx="4" ry="4"
        fill="#00CED1" fill-opacity="0.04"/>

  <!-- ═══ INNER ACCENT BORDER ═══ -->
  <rect x="4" y="4" width="312" height="82" rx="3" ry="3"
        fill="none" stroke="#B2EBF2" stroke-width="0.4" opacity="0.12"/>

  <!-- ═══ NON-TRANSFERABLE — top strip ═══ -->
  <rect x="2" y="2" width="316" height="13" rx="4" ry="4" fill="#03080F"/>
  <rect x="2" y="14" width="316" height="1" fill="url(#aiCyan)" opacity="0.7"/>
  <text x="160" y="12"
        font-family="'Courier New', monospace"
        font-size="6.5" font-weight="bold" letter-spacing="3"
        fill="#48CAE4" text-anchor="middle"
        filter="url(#cyanGlow)">NON-TRANSFERABLE</text>

  <!-- ═══ LEFT PANEL ═══ -->
  <rect x="2" y="15" width="74" height="73" rx="0" fill="#00CED1" fill-opacity="0.04"/>
  <rect x="75" y="15" width="1" height="73" fill="url(#divider-sov)"/>

  <!-- Mini shield — teal/cyan -->
  <path d="M38,24 L60,30 L60,52 Q60,66 38,74 Q16,66 16,52 L16,30 Z"
        fill="#051015"
        stroke="url(#shield-stroke-sov)"
        stroke-width="1.8"
        filter="url(#tealGlow)"/>
  <path d="M38,27 L57,33 L57,52 Q57,63 38,71 Q19,63 19,52 L19,33 Z"
        fill="none" stroke="#00CED1" stroke-width="0.5" opacity="0.4"/>

  <!-- STP in mini shield — teal platinum -->
  <text x="38" y="54"
        font-family="'Palatino Linotype', 'Palatino', serif"
        font-size="14" font-weight="bold"
        fill="url(#tealPlatinum)" text-anchor="middle"
        filter="url(#tealGlow)">STP</text>

  <!-- ═══ RIGHT PANEL ═══ -->

  <!-- SOVEREIGN TRACE PROTOCOL -->
  <text x="198" y="28"
        font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', serif"
        font-size="7.5" font-weight="400" letter-spacing="3"
        fill="#00CED1" text-anchor="middle" opacity="0.9">SOVEREIGN TRACE PROTOCOL</text>

  <!-- Thin rule -->
  <line x1="86" y1="32" x2="310" y2="32"
        stroke="#00CED1" stroke-width="0.4" opacity="0.3"/>

  <!-- SOVEREIGN — sub label -->
  <text x="198" y="45"
        font-family="'Palatino Linotype', 'Palatino', serif"
        font-size="7" font-weight="400" letter-spacing="5"
        fill="#4DD0E1" text-anchor="middle" opacity="0.7">SOVEREIGN</text>

  <!-- AI AUDIT — teal platinum -->
  <text x="198" y="62"
        font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', serif"
        font-size="20" font-weight="700" letter-spacing="3"
        fill="url(#tealPlatinum)" text-anchor="middle"
        filter="url(#softGlow)">AI AUDIT</text>

  <!-- Thin rule -->
  <line x1="86" y1="65" x2="310" y2="65"
        stroke="#00CED1" stroke-width="0.4" opacity="0.3"/>

  <!-- Teal accent -->
  <rect x="86" y="66" width="224" height="1.5" fill="url(#tealAccent)" opacity="0.5"/>

  <!-- AION SYSTEM · STP SEALED — cyan bottom -->
  <text x="198" y="79"
        font-family="'Courier New', monospace"
        font-size="7" letter-spacing="2.5"
        fill="#48CAE4" text-anchor="middle"
        filter="url(#cyanGlow)">AION SYSTEM · STP SEALED</text>

  <!-- AI node dots flanking bottom text -->
  <circle cx="102" cy="72" r="1"   fill="#48CAE4" opacity="0.25"/>
  <circle cx="114" cy="70" r="0.8" fill="#48CAE4" opacity="0.2"/>
  <circle cx="286" cy="72" r="1"   fill="#48CAE4" opacity="0.25"/>
  <circle cx="298" cy="70" r="0.8" fill="#48CAE4" opacity="0.2"/>
  <line x1="102" y1="72" x2="114" y2="70" stroke="#48CAE4" stroke-width="0.4" opacity="0.12"/>
  <line x1="286" y1="72" x2="298" y2="70" stroke="#48CAE4" stroke-width="0.4" opacity="0.12"/>

  <!-- ═══ CORNER MARKS — teal/cyan ═══ -->
  <g stroke="#B2EBF2" stroke-width="0.8" opacity="0.4">
    <path d="M8,8 L8,14 M8,8 L14,8"/>
    <path d="M312,8 L312,14 M312,8 L306,8"/>
    <path d="M8,82 L8,76 M8,82 L14,82"/>
    <path d="M312,82 L312,76 M312,82 L306,82"/>
  </g>

  <!-- Cyan corner dots -->
  <circle cx="8"   cy="8"  r="1.2" fill="#00CED1" opacity="0.7"/>
  <circle cx="312" cy="8"  r="1.2" fill="#00CED1" opacity="0.7"/>
  <circle cx="8"   cy="82" r="1.2" fill="#00CED1" opacity="0.7"/>
  <circle cx="312" cy="82" r="1.2" fill="#00CED1" opacity="0.7"/>

  <!-- Star field -->
  <g opacity="0.3">
    <circle cx="92"  cy="20" r="0.6" fill="#B2EBF2"/>
    <circle cx="140" cy="18" r="0.4" fill="#00CED1"/>
    <circle cx="258" cy="20" r="0.5" fill="#B2EBF2"/>
    <circle cx="295" cy="23" r="0.4" fill="#00CED1"/>
    <circle cx="112" cy="80" r="0.4" fill="#B2EBF2"/>
    <circle cx="278" cy="79" r="0.5" fill="#00CED1"/>
  </g>

</svg>