<svg xmlns="http://www.w3.org/2000/svg" width="260" height="72" viewBox="0 0 260 72">
  <defs>
    <linearGradient id="bg-e" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="platinum" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#E8E8F0;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#B0B0C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8080A0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border-e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#E8E8F0;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="divider-e" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#9B59B6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shield-stroke-e" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:1" />
    </linearGradient>
    <filter id="platglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow-e">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded-e">
      <rect width="260" height="72" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="260" height="72" rx="6" ry="6" fill="url(#bg-e)"/>

  <!-- Subtle violet ambient wash top -->
  <rect x="0" y="0" width="260" height="20" rx="0" ry="0" fill="#9B59B6" fill-opacity="0.04" clip-path="url(#rounded-e)"/>

  <!-- Border: violet-to-platinum-to-violet -->
  <rect width="260" height="72" rx="6" ry="6" fill="none" stroke="url(#border-e)" stroke-width="1.5"/>
  <rect x="3" y="3" width="254" height="66" rx="4" ry="4" fill="none" stroke="#E8E8F0" stroke-width="0.3" opacity="0.15"/>

  <!-- Left panel -->
  <rect x="0" y="0" width="62" height="72" fill="#9B59B6" fill-opacity="0.05" clip-path="url(#rounded-e)"/>

  <!-- Shield — platinum with violet base -->
  <g transform="translate(31, 36)" filter="url(#platglow)">
    <path d="M0,-20 L14,-14 L14,2 Q14,16 0,22 Q-14,16 -14,2 L-14,-14 Z"
          fill="none" stroke="url(#shield-stroke-e)" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M0,-13 L9,-8.5 L9,2 Q9,11 0,16 Q-9,11 -9,2 L-9,-8.5 Z"
          fill="#9B59B6" fill-opacity="0.10"/>
    <!-- Double-line check for premium feel -->
    <path d="M-4,1 L-1,5 L5,-4" fill="none" stroke="url(#platinum)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-4,1 L-1,5 L5,-4" fill="none" stroke="#9B59B6" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- Divider -->
  <rect x="62" y="8" width="1" height="56" fill="url(#divider-e)"/>

  <!-- Text -->
  <text x="166" y="22"
        font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', serif"
        font-size="7.5"
        font-weight="400"
        letter-spacing="3"
        text-anchor="middle"
        fill="#9B59B6"
        opacity="0.9">SOVEREIGN TRACE PROTOCOL</text>

  <text x="166" y="46"
        font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', serif"
        font-size="19"
        font-weight="700"
        letter-spacing="4"
        text-anchor="middle"
        fill="url(#platinum)"
        filter="url(#softglow-e)">CERTIFIED</text>

  <text x="166" y="61"
        font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', serif"
        font-size="7"
        font-weight="400"
        letter-spacing="2.5"
        text-anchor="middle"
        fill="#5a4a6a"
        opacity="0.9">AION SYSTEM · FROZEN-2.0</text>

  <!-- Corner accents — fine lines, elite precision -->
  <g stroke="#E8E8F0" stroke-width="0.8" opacity="0.4">
    <path d="M6,6 L6,14 M6,6 L14,6"/>
    <path d="M254,6 L254,14 M254,6 L246,6"/>
    <path d="M6,66 L6,58 M6,66 L14,66"/>
    <path d="M254,66 L254,58 M254,66 L246,66"/>
  </g>
  <!-- Violet corner dots -->
  <circle cx="6" cy="6" r="1.2" fill="#9B59B6" opacity="0.7"/>
  <circle cx="254" cy="6" r="1.2" fill="#9B59B6" opacity="0.7"/>
  <circle cx="6" cy="66" r="1.2" fill="#9B59B6" opacity="0.7"/>
  <circle cx="254" cy="66" r="1.2" fill="#9B59B6" opacity="0.7"/>

  <line x1="80" y1="26" x2="252" y2="26" stroke="#9B59B6" stroke-width="0.4" opacity="0.3"/>
  <line x1="80" y1="52" x2="252" y2="52" stroke="#9B59B6" stroke-width="0.4" opacity="0.3"/>

</svg>

