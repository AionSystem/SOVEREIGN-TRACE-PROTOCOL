<svg xmlns="http://www.w3.org/2000/svg" width="260" height="72" viewBox="0 0 260 72">
  <defs>
    <linearGradient id="bg-gov" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#080c08;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#030503;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="olive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8D4A0;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#8FA858;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A5C20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border-gov" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8FA858;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#CC2200;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#8FA858;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="divider-gov" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8FA858;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#8FA858;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#8FA858;stop-opacity:0" />
    </linearGradient>
    <filter id="govglow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded-gov">
      <rect width="260" height="72" rx="6" ry="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="260" height="72" rx="6" ry="6" fill="url(#bg-gov)"/>

  <!-- Subtle camo texture suggestion -->
  <g opacity="0.04" clip-path="url(#rounded-gov)">
    <rect x="0" y="0" width="40" height="20" fill="#4A5C20"/>
    <rect x="50" y="15" width="30" height="25" fill="#4A5C20"/>
    <rect x="90" y="0" width="20" height="15" fill="#4A5C20"/>
    <rect x="130" y="8" width="35" height="20" fill="#4A5C20"/>
    <rect x="180" y="0" width="25" height="18" fill="#4A5C20"/>
    <rect x="220" y="12" width="40" height="22" fill="#4A5C20"/>
    <rect x="10" y="40" width="45" height="32" fill="#4A5C20"/>
    <rect x="70" y="50" width="30" height="22" fill="#4A5C20"/>
    <rect x="115" y="45" width="40" height="27" fill="#4A5C20"/>
    <rect x="170" y="38" width="30" height="34" fill="#4A5C20"/>
  </g>

  <!-- Outer border: olive-to-red-to-olive -->
  <rect width="260" height="72" rx="6" ry="6" fill="none" stroke="url(#border-gov)" stroke-width="1.8"/>
  <rect x="3" y="3" width="254" height="66" rx="4" ry="4" fill="none" stroke="#8FA858" stroke-width="0.3" opacity="0.25"/>

  <!-- Left panel -->
  <rect x="0" y="0" width="62" height="72" fill="#4A5C20" fill-opacity="0.08" clip-path="url(#rounded-gov)"/>

  <!-- Shield — military style, angular -->
  <g transform="translate(31, 36)" filter="url(#govglow)">
    <!-- Outer shield -->
    <path d="M0,-21 L15,-15 L15,1 Q15,17 0,23 Q-15,17 -15,1 L-15,-15 Z"
          fill="none" stroke="url(#olive)" stroke-width="1.8" stroke-linejoin="miter"/>
    <!-- Inner fill -->
    <path d="M0,-14 L10,-9 L10,1 Q10,12 0,17 Q-10,12 -10,1 L-10,-9 Z"
          fill="#4A5C20" fill-opacity="0.15"/>
    <!-- Star in center of shield -->
    <polygon points="0,-8 1.8,-3 7,-3 2.8,0.5 4.5,5.5 0,2.5 -4.5,5.5 -2.8,0.5 -7,-3 -1.8,-3"
             fill="url(#olive)" fill-opacity="0.9"/>
    <!-- Red accent line at base of shield -->
    <line x1="-8" y1="14" x2="8" y2="14" stroke="#CC2200" stroke-width="1.5" opacity="0.8" filter="url(#redglow)"/>
  </g>

  <!-- Divider -->
  <rect x="62" y="8" width="1" height="56" fill="url(#divider-gov)"/>

  <!-- Text — condensed military stencil feel -->
  <text x="166" y="21"
        font-family="'Arial Narrow', 'Arial', sans-serif"
        font-size="7"
        font-weight="700"
        letter-spacing="3.5"
        text-anchor="middle"
        fill="#8FA858"
        opacity="0.9">SOVEREIGN TRACE PROTOCOL</text>

  <!-- Red classified-style bar behind CERTIFIED -->
  <rect x="70" y="28" width="182" height="22" rx="1" fill="#CC2200" fill-opacity="0.08"/>

  <text x="166" y="44"
        font-family="'Arial Narrow', 'Arial', sans-serif"
        font-size="18"
        font-weight="900"
        letter-spacing="5"
        text-anchor="middle"
        fill="url(#olive)"
        filter="url(#govglow)">CERTIFIED</text>

  <!-- Bottom: DEFENSE GRADE -->
  <text x="166" y="58"
        font-family="'Arial Narrow', 'Arial', sans-serif"
        font-size="7.5"
        font-weight="700"
        letter-spacing="3"
        text-anchor="middle"
        fill="#CC2200"
        opacity="0.85"
        filter="url(#redglow)">DEFENSE &amp; GOVERNMENT GRADE</text>

  <!-- Corner accents — military squared -->
  <g stroke="#8FA858" stroke-width="1.2" opacity="0.6">
    <path d="M5,5 L5,16 M5,5 L16,5"/>
    <path d="M255,5 L255,16 M255,5 L244,5"/>
    <path d="M5,67 L5,56 M5,67 L16,67"/>
    <path d="M255,67 L255,56 M255,67 L244,67"/>
  </g>
  <!-- Red corner dots -->
  <circle cx="5" cy="5" r="1.5" fill="#CC2200" opacity="0.8"/>
  <circle cx="255" cy="5" r="1.5" fill="#CC2200" opacity="0.8"/>
  <circle cx="5" cy="67" r="1.5" fill="#CC2200" opacity="0.8"/>
  <circle cx="255" cy="67" r="1.5" fill="#CC2200" opacity="0.8"/>

  <line x1="80" y1="25" x2="252" y2="25" stroke="#8FA858" stroke-width="0.4" opacity="0.25"/>
  <line x1="80" y1="51" x2="252" y2="51" stroke="#CC2200" stroke-width="0.5" opacity="0.3"/>

</svg>

