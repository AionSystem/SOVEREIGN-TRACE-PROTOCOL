<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Rainbow border gradient -->
    <linearGradient id="rainbowBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </linearGradient>
    <linearGradient id="goldLinear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E070"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="65%" stop-color="#C9A028"/>
      <stop offset="100%" stop-color="#8B7520"/>
    </linearGradient>
    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF0A0"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#B8921E"/>
      <stop offset="100%" stop-color="#7A6418"/>
    </linearGradient>
    <radialGradient id="bgFill" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1c1a10"/>
      <stop offset="100%" stop-color="#070705"/>
    </radialGradient>
    <radialGradient id="innerBg" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1c1a13"/>
      <stop offset="100%" stop-color="#0c0b08"/>
    </radialGradient>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#D4AF37" flood-opacity="0.25"/>
    </filter>
    <path id="topArc" d="M 78,200 A 122,122 0 0,1 322,200"/>
    <path id="topSubArc" d="M 98,200 A 102,102 0 0,1 302,200"/>
    <path id="architectArc" d="M 118,200 A 82,82 0 0,1 282,200"/>
    <!-- Circular clip for the logo -->
    <clipPath id="logoClip">
      <circle cx="200" cy="200" r="56"/>
    </clipPath>
  </defs>

  <!-- Octagonal seal base (rainbow border) -->
  <polygon points="368.1,269.6 269.6,368.1 130.4,368.1 31.9,269.6 31.9,130.4 130.4,31.9 269.6,31.9 368.1,130.4"
           fill="url(#bgFill)" stroke="url(#rainbowBorder)" stroke-width="3" filter="url(#badgeShadow)"/>

  <!-- Inner octagon line -->
  <polygon points="358.5,264.9 264.9,358.5 135.1,358.5 41.5,264.9 41.5,135.1 135.1,41.5 264.9,41.5 358.5,135.1"
           fill="none" stroke="url(#goldSheen)" stroke-width="1" stroke-opacity="0.5"/>

  <!-- 24 chronometer ticks -->
  <g>
    <line x1="355" y1="200" x2="368" y2="200" stroke="url(#goldLinear)" stroke-width="1.5"/>
    <line x1="349.7" y1="240.1" x2="356.5" y2="241.9" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="334.2" y1="277.5" x2="340.3" y2="281" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="309.6" y1="309.6" x2="314.6" y2="314.6" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="277.5" y1="334.2" x2="281" y2="340.3" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="240.1" y1="349.7" x2="241.9" y2="356.5" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="200" y1="355" x2="200" y2="368" stroke="url(#goldLinear)" stroke-width="1.5"/>
    <line x1="159.9" y1="349.7" x2="158.1" y2="356.5" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="122.5" y1="334.2" x2="119" y2="340.3" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="90.4" y1="309.6" x2="85.4" y2="314.6" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="65.8" y1="277.5" x2="59.7" y2="281" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="50.3" y1="240.1" x2="43.5" y2="241.9" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="45" y1="200" x2="32" y2="200" stroke="url(#goldLinear)" stroke-width="1.5"/>
    <line x1="50.3" y1="159.9" x2="43.5" y2="158.1" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="65.8" y1="122.5" x2="59.7" y2="119" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="90.4" y1="90.4" x2="85.4" y2="85.4" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="122.5" y1="65.8" x2="119" y2="59.7" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="159.9" y1="50.3" x2="158.1" y2="43.5" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="200" y1="45" x2="200" y2="32" stroke="url(#goldLinear)" stroke-width="1.5"/>
    <line x1="240.1" y1="50.3" x2="241.9" y2="43.5" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="277.5" y1="65.8" x2="281" y2="59.7" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="309.6" y1="90.4" x2="314.6" y2="85.4" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="334.2" y1="122.5" x2="340.3" y2="119" stroke="url(#goldLinear)" stroke-width="0.8"/>
    <line x1="349.7" y1="159.9" x2="356.5" y2="158.1" stroke="url(#goldLinear)" stroke-width="0.8"/>
  </g>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#goldLinear)" stroke-width="2.5"/>
  <circle cx="200" cy="200" r="142" fill="none" stroke="url(#goldSheen)" stroke-width="0.8" stroke-dasharray="3 5" stroke-opacity="0.6"/>

  <!-- Inner seal face -->
  <circle cx="200" cy="200" r="134" fill="url(#innerBg)"/>
  <circle cx="200" cy="200" r="134" fill="none" stroke="url(#goldLinear)" stroke-width="1.5"/>

  <!-- Left and right diamond markers -->
  <polygon points="62,195 57,200 62,205 67,200" fill="url(#goldLinear)" opacity="0.9"/>
  <polygon points="338,195 333,200 338,205 343,200" fill="url(#goldLinear)" opacity="0.9"/>

  <!-- Top and bottom alignment dots -->
  <circle cx="200" cy="66" r="2.5" fill="url(#goldLinear)" opacity="0.8"/>
  <circle cx="200" cy="334" r="2.5" fill="url(#goldLinear)" opacity="0.8"/>

  <!-- Top arc text: AION · VERIFIED -->
  <text font-family="'Times New Roman', Georgia, serif" font-size="15" font-weight="bold" letter-spacing="5" fill="url(#goldSheen)" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">AION · VERIFIED</textPath>
  </text>

  <!-- Sub-arc: · SIMULATOR · -->
  <text font-family="'Times New Roman', Georgia, serif" font-size="11.5" font-weight="normal" letter-spacing="7" fill="#C9A028" text-anchor="middle" opacity="0.85">
    <textPath href="#topSubArc" startOffset="50%">· SIMULATOR ·</textPath>
  </text>

  <!-- AI RELIABILITY ARCHITECT curved above the center -->
  <text font-family="'Times New Roman', Georgia, serif" font-size="9.5" font-weight="bold" letter-spacing="2" fill="url(#goldSheen)" text-anchor="middle">
    <textPath href="#architectArc" startOffset="50%">AI RELIABILITY ARCHITECT</textPath>
  </text>

  <!-- Separator lines -->
  <line x1="78" y1="200" x2="142" y2="200" stroke="#6B5510" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="258" y1="200" x2="322" y2="200" stroke="#6B5510" stroke-opacity="0.2" stroke-width="1"/>
  <polygon points="142,197 137,200 142,203 147,200" fill="#C9A028" opacity="0.6"/>
  <polygon points="258,197 253,200 258,203 263,200" fill="#C9A028" opacity="0.6"/>

  <!-- Center logo (AionSystem) — loaded from the live site so it works everywhere -->
  <circle cx="200" cy="200" r="59" fill="none" stroke="url(#goldSheen)" stroke-width="2"/>
  <circle cx="200" cy="200" r="61" fill="none" stroke="#D4AF37" stroke-opacity="0.3" stroke-width="1"/>
  <image x="144" y="144" width="112" height="112"
         xlink:href="https://aionsystem.github.io/assets/aion-logo.jpg"
         clip-path="url(#logoClip)"
         preserveAspectRatio="xMidYMid slice"/>

  <!-- Bottom text (attribution) -->
  <text x="200" y="275" font-family="'Courier New', Courier, monospace" font-size="7.5" letter-spacing="2" fill="#9A7820" text-anchor="middle" opacity="0.8">AION VERIFIED SIMULATOR</text>
  <text x="200" y="290" font-family="'Courier New', Courier, monospace" font-size="7" letter-spacing="1.5" fill="#6B5510" text-anchor="middle" opacity="0.7">v1.0 · 2026 · STP SEALED</text>
</svg>
