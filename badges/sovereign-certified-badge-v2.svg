<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90">
  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#12141F"/>
      <stop offset="50%"  stop-color="#0D0F1A"/>
      <stop offset="100%" stop-color="#080A12"/>
    </linearGradient>

    <linearGradient id="goldOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D4AF37"/>
      <stop offset="30%"  stop-color="#F5E08A"/>
      <stop offset="60%"  stop-color="#C5A028"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>

    <linearGradient id="goldInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8B6914"/>
      <stop offset="50%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C5A028"/>
    </linearGradient>

    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#D4AF37" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="aiCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#001F2E"/>
      <stop offset="30%"  stop-color="#00B4D8"/>
      <stop offset="50%"  stop-color="#48CAE4"/>
      <stop offset="70%"  stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#001F2E"/>
    </linearGradient>

    <linearGradient id="crimson" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B0000"/>
      <stop offset="50%"  stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#6B0000"/>
    </linearGradient>

    <radialGradient id="shieldFill" cx="50%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#1E2235"/>
      <stop offset="100%" stop-color="#0A0C14"/>
    </radialGradient>

    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cyanGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══ OUTER GOLD BORDER ═══ -->
  <rect width="320" height="90" rx="5" ry="5"
        fill="url(#goldOuter)" filter="url(#shadowDeep)"/>

  <!-- ═══ MAIN BODY ═══ -->
  <rect x="2" y="2" width="316" height="86" rx="4" ry="4"
        fill="url(#bg)"/>

  <!-- ═══ INNER GOLD ACCENT BORDER ═══ -->
  <rect x="4" y="4" width="312" height="82" rx="3" ry="3"
        fill="none" stroke="url(#goldInner)" stroke-width="0.8" opacity="0.5"/>

  <!-- ═══ NON-TRANSFERABLE — top strip ═══ -->
  <rect x="2" y="2" width="316" height="13" rx="4" ry="4" fill="#03080F"/>
  <rect x="2" y="14" width="316" height="1" fill="url(#aiCyan)" opacity="0.7"/>
  <text x="160" y="12"
        font-family="'Courier New', monospace"
        font-size="6.5" font-weight="bold" letter-spacing="3"
        fill="#48CAE4" text-anchor="middle"
        filter="url(#cyanGlow)">NON-TRANSFERABLE</text>

  <!-- ═══ LEFT PANEL — mini shield ═══ -->
  <rect x="2" y="15" width="74" height="73" rx="0" fill="#D4AF37" fill-opacity="0.04"/>
  <rect x="75" y="15" width="1" height="73" fill="url(#divider)"/>

  <!-- Mini shield shape -->
  <path d="M38,24 L60,30 L60,52 Q60,66 38,74 Q16,66 16,52 L16,30 Z"
        fill="url(#shieldFill)"
        stroke="url(#goldOuter)"
        stroke-width="1.5"/>
  <path d="M38,27 L57,33 L57,52 Q57,63 38,71 Q19,63 19,52 L19,33 Z"
        fill="none" stroke="#8B6914" stroke-width="0.5" opacity="0.5"/>

  <!-- STP in mini shield -->
  <text x="38" y="54"
        font-family="'Georgia', serif"
        font-size="14" font-weight="bold"
        fill="#D4AF37" text-anchor="middle"
        filter="url(#goldGlow)">STP</text>

  <!-- ═══ RIGHT PANEL ═══ -->

  <!-- SOVEREIGN TRACE PROTOCOL label -->
  <text x="198" y="28"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="7.5" font-weight="bold" letter-spacing="3"
        fill="#8B6914" text-anchor="middle">SOVEREIGN TRACE PROTOCOL</text>

  <!-- Thin rule -->
  <line x1="86" y1="32" x2="310" y2="32"
        stroke="#D4AF37" stroke-width="0.4" opacity="0.3"/>

  <!-- CERTIFIED — main text -->
  <text x="198" y="58"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="24" font-weight="bold" letter-spacing="5"
        fill="#D4AF37" text-anchor="middle"
        filter="url(#goldGlow)">CERTIFIED</text>

  <!-- Thin rule -->
  <line x1="86" y1="63" x2="310" y2="63"
        stroke="#D4AF37" stroke-width="0.4" opacity="0.3"/>

  <!-- Crimson accent line -->
  <rect x="86" y="64" width="224" height="1.5" fill="url(#crimson)" opacity="0.5"/>

  <!-- AION SYSTEM · FROZEN-2.0 bottom -->
  <text x="198" y="78"
        font-family="'Courier New', monospace"
        font-size="7" letter-spacing="2.5"
        fill="#48CAE4" text-anchor="middle"
        filter="url(#cyanGlow)">AION SYSTEM · FROZEN-2.0</text>

  <!-- AI node dots bottom right -->
  <circle cx="102" cy="71" r="1"   fill="#48CAE4" opacity="0.3"/>
  <circle cx="114" cy="69" r="0.8" fill="#48CAE4" opacity="0.25"/>
  <circle cx="286" cy="71" r="1"   fill="#48CAE4" opacity="0.3"/>
  <circle cx="298" cy="69" r="0.8" fill="#48CAE4" opacity="0.25"/>
  <line x1="102" y1="71" x2="114" y2="69" stroke="#48CAE4" stroke-width="0.4" opacity="0.15"/>
  <line x1="286" y1="71" x2="298" y2="69" stroke="#48CAE4" stroke-width="0.4" opacity="0.15"/>

  <!-- ═══ CORNER MARKS ═══ -->
  <g stroke="#D4AF37" stroke-width="1" opacity="0.5">
    <path d="M8,8 L8,14 M8,8 L14,8"/>
    <path d="M312,8 L312,14 M312,8 L306,8"/>
    <path d="M8,82 L8,76 M8,82 L14,82"/>
    <path d="M312,82 L312,76 M312,82 L306,82"/>
  </g>

  <!-- ═══ STAR FIELD ═══ -->
  <g opacity="0.35">
    <circle cx="92"  cy="20" r="0.6" fill="#ffffff"/>
    <circle cx="135" cy="17" r="0.4" fill="#D4AF37"/>
    <circle cx="260" cy="19" r="0.5" fill="#ffffff"/>
    <circle cx="295" cy="22" r="0.4" fill="#D4AF37"/>
    <circle cx="110" cy="80" r="0.4" fill="#ffffff"/>
    <circle cx="280" cy="78" r="0.5" fill="#D4AF37"/>
  </g>

</svg>
