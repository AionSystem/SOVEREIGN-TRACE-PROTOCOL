[tox]
envlist = py311,py312,lint,bandit,mutmut,chaos,safety
skipsdist = True
isolated_build = True

[testenv]
deps =
    pytest
    pytest-asyncio
    hypothesis
    pytest-cov
commands =
    pytest tests/ -v -m "not slow" --cov=stamp --cov-report=term

[testenv:lint]
deps = flake8 mypy
commands =
    flake8 stamp/ tests/ --max-line-length=100
    mypy stamp/

[testenv:bandit]
deps = bandit
commands = bandit -c pyproject.toml -r stamp/

[testenv:mutmut]
deps = mutmut pytest
commands = mutmut run --paths-to-mutate=stamp/ --tests-dir=tests/ --runner=pytest

[testenv:chaos]
deps = chaostoolkit
commands = chaos run chaos/experiment.json --hypothesis-strategy=deterministic

[testenv:safety]
deps = safety
commands = safety check --full-report --policy-file .safety-policy.yml
