[tox]
envlist = py311,py312,lint,bandit,mutmut,chaos
skipsdist = True

[testenv]
deps = pytest pytest-asyncio hypothesis
commands = pytest tests/ -v -m "not slow"

[testenv:lint]
deps = flake8 mypy
commands = flake8 stamp/ tests/ --max-line-length=100
           mypy stamp/ --ignore-missing-imports

[testenv:bandit]
deps = bandit
commands = bandit -r stamp/ -c pyproject.toml

[testenv:mutmut]
deps = pytest mutmut
commands = mutmut run --paths-to-mutate=stamp/ --tests-dir=tests/

[testenv:chaos]
deps = chaostoolkit
commands = chaos run chaos/experiment.json

[testenv:safety]
deps = safety
commands = safety check --full-report
